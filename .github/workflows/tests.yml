name: tests

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:

permissions:
  contents: read

jobs:
  headless-tests:
    runs-on: ubuntu-latest
    name: headless tests
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run headless test suite
        run: |
          for f in tests/*.test.js; do
            echo "=== $f ==="
            node "$f"
          done
