    const oldQty = getBalance(itemId);
    beginTransaction();
    state.balances[itemId] = newQty;
    finishTransaction({
      id: uid(), type: "recount", date: date || todayISO(), itemId, oldQty, newQty, reason: reason || "",
    });
  }

  // ═══════════════════════════════════════════════════════════════════
  // ITEM CONFIDENCE — read-only estimate trust model (export / ops)
  // ═══════════════════════════════════════════════════════════════════

  function confidenceDaysSince(isoDate) {
    if (!isoDate) return Infinity;
    const a = new Date(isoDate + "T12:00:00");
    const b = new Date(todayISO() + "T12:00:00");
    return Math.floor((b - a) / 86400000);
  }

  function confidenceClamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  function itemRecipeMeta(itemId) {
    let isCoreMom = false;
    let isCoreBaby = false;
    let isOptionalDecrement = false;
    for (const packKey of ["momPack", "babyPack"]) {
      const recipe = RECIPES[packKey];
      if (recipe.core.some(c => c.itemId === itemId)) {
        if (packKey === "momPack") isCoreMom = true;
        else isCoreBaby = true;
      }
      for (const opt of recipe.optional) {
        if (opt.itemId === itemId && opt.decrement) isOptionalDecrement = true;
      }
    }
    return { isCoreMom, isCoreBaby, isCore: isCoreMom || isCoreBaby, isOptionalDecrement };
  }

  function emptyItemActivityStats() {
    return {
      lastRecountDate: null,
      lastRecountNewQty: null,
      hasEverBeenRecounted: false,
      lastRecountVariance: 0,
      lastRecountVariancePct: 0,
      donationLineCount: 0,
      packDeductions: 0,
      buildTouchCount: 0,
      volunteerBuildTouches: 0,
      testerBuildTouches: 0,
      substitutionTouches: 0,
      omissionTouches: 0,
      totalMovements: 0,
    };
  }

  function confidenceTxAfterAnchor(txDate, anchorDate) {
    if (!anchorDate) return true;
    return txDate > anchorDate;
  }

  function buildItemActivityStatsIndex(transactions, { excludeTesterBuilds = false } = {}) {
    const index = {};
    const ensure = id => {
      if (!index[id]) index[id] = emptyItemActivityStats();
      return index[id];
    };

    ITEMS.forEach(i => ensure(i.id));

    (transactions || []).forEach(tx => {
      if (tx.type === "recount" && tx.itemId) {
        const s = ensure(tx.itemId);
        if (!s.lastRecountDate || tx.date >= s.lastRecountDate) {
          const oldQty = Number(tx.oldQty) || 0;
          const newQty = Number(tx.newQty) || 0;
          const variance = Math.abs(newQty - oldQty);
          s.lastRecountDate = tx.date;
          s.lastRecountNewQty = newQty;
          s.hasEverBeenRecounted = true;
          s.lastRecountVariance = variance;
          s.lastRecountVariancePct = variance / Math.max(oldQty, newQty, 1);
        }
      }
    });

    (transactions || []).forEach(tx => {
      if (tx.type === "undo") return;
      if (tx.type === "donation") {
        for (const line of tx.lines || []) {
          if (!line.itemId) continue;
          const s = ensure(line.itemId);
          if (!confidenceTxAfterAnchor(tx.date, s.lastRecountDate)) continue;
          s.donationLineCount += 1;
          s.totalMovements += 1;
        }
        return;
      }
      if (tx.type === "build") {
        const isTester = isTesterUser(tx.packer);
        if (excludeTesterBuilds && isTester) return;
        const { usage } = computeBuildStockPlan(
          tx.packKey, tx.qty, tx.optionalIncluded || [], tx.customExtras || [],
          tx.substitutions || [], tx.omissions || []
        );
        const touched = new Set();
        for (const [itemId, deduct] of Object.entries(usage)) {
          if (deduct <= 0) continue;
          const s = ensure(itemId);
          if (!confidenceTxAfterAnchor(tx.date, s.lastRecountDate)) continue;
          s.packDeductions += deduct;
          if (!touched.has(itemId)) {
            s.buildTouchCount += 1;
            touched.add(itemId);
            s.totalMovements += 1;
          }
          if (isTester) s.testerBuildTouches += 1;
          else s.volunteerBuildTouches += 1;
        }
        for (const sub of tx.substitutions || []) {
          [sub.insteadOf, sub.substitute].forEach(itemId => {
            if (!itemId) return;
            const s = ensure(itemId);
            if (!confidenceTxAfterAnchor(tx.date, s.lastRecountDate)) return;
            s.substitutionTouches += 1;
          });
        }
        for (const omit of tx.omissions || []) {
          if (!omit.itemId) continue;
          const s = ensure(omit.itemId);
          if (!confidenceTxAfterAnchor(tx.date, s.lastRecountDate)) continue;
          s.omissionTouches += 1;
        }
      }
    });

    return index;
  }

  function deriveItemActivityStats(itemId, statsIndex) {
    return statsIndex[itemId] ? { ...statsIndex[itemId] } : emptyItemActivityStats();
  }

  function confidenceBand(score) {
    if (score >= 80) return "trusted";
    if (score >= 60) return "probably_right";
    if (score >= 40) return "uncertain";
    return "needs_checking";
  }

  function confidenceVolunteerLabel(band) {
    if (band === "trusted") return "Trusted";
    if (band === "probably_right") return "Probably right";
    if (band === "uncertain") return "May need checking";
    return "Worth counting soon";
  }

  function confidenceReason(item, stats) {
    const days = confidenceDaysSince(stats.lastRecountDate);
    const meta = itemRecipeMeta(item.id);
    if (stats.hasEverBeenRecounted && days <= 7 && stats.lastRecountVariance <= 2) {
      return "Counted recently.";
    }
    if (stats.hasEverBeenRecounted && days <= 14 && (stats.lastRecountVariancePct > 0.2 || stats.lastRecountVariance > 10)) {
      return "Last count didn't match what we expected.";
    }
    if (!stats.hasEverBeenRecounted) {
      return "Not physically checked in this system yet.";
    }
    if (days > 90) {
      return "Not physically checked for a while.";
    }
    if (stats.totalMovements > 25) {
      return "Many pack movements since last count.";
    }
    if (stats.donationLineCount >= 3) {
      return "Several donations since last count.";
    }
    if (stats.substitutionTouches + stats.omissionTouches >= 2) {
      return "Often swapped or left out when packing.";
    }
    if (meta.isCoreMom) return "Important for Mom Packs.";
    if (meta.isCoreBaby) return "Important for Baby Packs.";
    if (getBalance(item.id) === 0 && !stats.hasEverBeenRecounted) {
      return "Showing zero — worth confirming on the shelf.";
    }
    return "Based on recent storeroom activity.";
  }

  function confidenceRecommendedAction(item, stats, band) {
    const meta = itemRecipeMeta(item.id);
    const packLabel = meta.isCoreMom ? "Mom" : meta.isCoreBaby ? "Baby" : "";
    if (band === "trusted") return "No action needed.";
    if (band === "probably_right") return "Check this when convenient.";
    if (band === "uncertain") {
      return meta.isCore && packLabel
        ? `Worth counting before packing more ${packLabel} Packs.`
        : "Worth counting soon.";
    }
    return meta.isCore && packLabel
      ? `Count this before packing more ${packLabel} Packs.`
      : "Count this when you can.";
  }

  function computeItemConfidence(item, balance, stats, allStats, opts = {}) {
    let score = 70;
    const days = confidenceDaysSince(stats.lastRecountDate);
    const meta = itemRecipeMeta(item.id);

    if (stats.hasEverBeenRecounted) {
      if (days <= 7) score += 25;
      else if (days <= 30) score += 15;
      else if (days <= 90) score += 0;
      else if (days <= 180) score -= 15;
      else score -= 25;
    } else {
      score -= 25;
    }

    if (!stats.hasEverBeenRecounted) score -= 15;

    if (stats.hasEverBeenRecounted && days <= 14) {
      if (stats.lastRecountVariance <= 2) score += 10;
      else if (stats.lastRecountVariancePct > 0.2 || stats.lastRecountVariance > 10) score -= 10;
    }

    const movements = stats.totalMovements;
    if (movements <= 2) score += 10;
    else if (movements <= 10) score += 5;
    else if (movements <= 25) score -= 5;
    else if (movements <= 50) score -= 15;
    else score -= 25;

    score -= Math.min(stats.donationLineCount, 10);
    score -= Math.min((stats.substitutionTouches + stats.omissionTouches) * 3, 15);

    if (meta.isCore && (!stats.hasEverBeenRecounted || days > 60)) score -= 10;
    if (item.fastCount) score += 5;
    if (isOutOfSeason(item)) score -= 5;

    if (balance === 0) {
      if (stats.hasEverBeenRecounted && days <= 30 && stats.lastRecountNewQty === 0) score += 5;
      else if (!stats.hasEverBeenRecounted) score -= 10;
    }

    if (opts.volunteerView && allStats.buildTouchCount > 0 && allStats.volunteerBuildTouches === 0) {
      score = Math.min(score, 55);
    }

    score = confidenceClamp(Math.round(score), 0, 100);

    if (opts.volunteerView && opts.sampleData) {
      score = Math.min(score, 79);
    }

    const band = confidenceBand(score);
    return {
      confidenceScore: score,
      confidenceBand: band,
      confidenceReason: confidenceReason(item, stats),
      recommendedAction: confidenceRecommendedAction(item, stats, band),
      volunteerLabel: confidenceVolunteerLabel(band),
      stats: {
        lastRecountDate: stats.lastRecountDate,
        hasEverBeenRecounted: stats.hasEverBeenRecounted,
        daysSinceRecount: Number.isFinite(days) ? days : null,
        totalMovements: stats.totalMovements,
        donationLineCount: stats.donationLineCount,
        buildTouchCount: stats.buildTouchCount,
        substitutionTouches: stats.substitutionTouches,
        omissionTouches: stats.omissionTouches,
        isCore: meta.isCore,
        isFastCount: !!item.fastCount,
        isSeasonal: !!item.seasonal,
        isOutOfSeason: isOutOfSeason(item),
      },
    };
  }

  function computeAllItemConfidence() {
    const txs = state.transactions || [];
    const volunteerIndex = buildItemActivityStatsIndex(txs, { excludeTesterBuilds: true });
    const allIndex = buildItemActivityStatsIndex(txs, { excludeTesterBuilds: false });
    const sampleData = !!state.sampleData;
    return ITEMS.map(item => {
      const balance = getBalance(item.id);
      const vStats = deriveItemActivityStats(item.id, volunteerIndex);
      const aStats = deriveItemActivityStats(item.id, allIndex);
      return {
        itemId: item.id,
        itemName: item.name,
        balance,
        volunteerConfidence: computeItemConfidence(item, balance, vStats, aStats, { volunteerView: true, sampleData }),
        allMovementsConfidence: computeItemConfidence(item, balance, aStats, aStats, { volunteerView: false, sampleData: false }),
      };
    });
  }

  function buildConfidenceSummary(itemConfidence) {
    const bands = { trusted: 0, probably_right: 0, uncertain: 0, needs_checking: 0 };
    const ranked = itemConfidence.map(row => {
      const c = row.volunteerConfidence;
      bands[c.confidenceBand] = (bands[c.confidenceBand] || 0) + 1;
      return { itemId: row.itemId, itemName: row.itemName, score: c.confidenceScore, band: c.confidenceBand };
    });
    ranked.sort((a, b) => a.score - b.score);
    const allBands = { trusted: 0, probably_right: 0, uncertain: 0, needs_checking: 0 };
    itemConfidence.forEach(row => {
      const b = row.allMovementsConfidence.confidenceBand;
      allBands[b] = (allBands[b] || 0) + 1;
    });
    return {
      volunteer: {
        trusted: bands.trusted,
        probably_right: bands.probably_right,
        uncertain: bands.uncertain,
        needs_checking: bands.needs_checking,
        lowConfidenceCount: bands.uncertain + bands.needs_checking,
      },
      lowestVolunteer: ranked.slice(0, 10),
      itemsNeedingCheck: ranked
        .filter(r => r.band === "needs_checking" && itemRecipeMeta(r.itemId).isCore)
        .slice(0, 10),
      allMovements: {
        ...allBands,
        lowConfidenceCount: allBands.uncertain + allBands.needs_checking,
      },
    };
  }

  // ═══════════════════════════════════════════════════════════════════
  // PACKING HABITS — read-only habit pattern intelligence (export / ops)
  // ═══════════════════════════════════════════════════════════════════

  const PACKING_HABIT_MIN_DENOMINATOR = 5;
  const PACKING_HABIT_MIN_COUNT = 3;
  const PACKING_HABIT_MIN_PERCENT = 40;

  function isProductionBuild(tx) {
    return tx.type === "build" && !isTesterUser(tx.packer);
  }

  function recipeOptionalLabel(packKey, key) {
    const recipe = RECIPES[packKey];
    if (!recipe) return itemName(key);
    for (const opt of recipe.optional || []) {
      if (opt.itemId === key || opt.id === key) {
        return opt.label || itemName(opt.itemId || key);
      }
    }
    return itemName(key);
  }

  function packingHabitConfidenceBand(denominator, percentage) {
    if (denominator >= 20 && percentage >= 70) return "high";
    if (denominator >= 10 && percentage >= 60) return "medium";
    return "low";
  }

  function packingHabitRecommendation(type, packLabel, percentage, confidenceBand) {
    if (confidenceBand === "low" && percentage < 60) return "No action yet.";
    if (type === "optional_usage" && percentage >= 70) return "Consider making this a usual item.";
    if (type === "custom_extra") return "Check whether this is temporary or a new habit.";
    if (type === "substitution" || type === "omission") {
      if (percentage >= 70) return `Review ${packLabel} recipe.`;
      return "Check whether this is temporary or a new habit.";
    }
    return "No action yet.";
  }

  function extractPackingHabitEvents(transactions) {
    const all = transactions || [];
    let excludedTesterBuildCount = 0;
    const productionBuilds = [];
    all.forEach(tx => {
      if (tx.type !== "build") return;
      if (isTesterUser(tx.packer)) {
        excludedTesterBuildCount += 1;
        return;
      }
      productionBuilds.push(tx);
    });
    productionBuilds.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    return {
      productionBuilds,
      productionBuildCount: productionBuilds.length,
      excludedTesterBuildCount,
    };
  }

  function computePackingHabitPatterns(events) {
    const patterns = {};
    const denominatorByPack = {};

    const addPattern = (type, packKey, itemId, replacementItemId, date) => {
      const key = [type, packKey, itemId, replacementItemId || ""].join("|");
      if (!patterns[key]) {
        patterns[key] = { type, packKey, itemId, replacementItemId: replacementItemId || "", dates: [], count: 0 };
      }
      patterns[key].dates.push(date);
      patterns[key].count += 1;
    };

    events.productionBuilds.forEach(tx => {
      const packKey = tx.packKey || "unknown";
      const date = tx.date || "";
      denominatorByPack[packKey] = (denominatorByPack[packKey] || 0) + 1;

      const subsSeen = new Set();
      (tx.substitutions || []).forEach(sub => {
        if (!sub.insteadOf || !sub.substitute || sub.insteadOf === sub.substitute) return;
        const pairKey = sub.insteadOf + "->" + sub.substitute;
        if (subsSeen.has(pairKey)) return;
        subsSeen.add(pairKey);
        addPattern("substitution", packKey, sub.insteadOf, sub.substitute, date);
      });

      const optionalsSeen = new Set();
      (tx.optionalIncluded || []).forEach(optKey => {
        if (!optKey || optionalsSeen.has(optKey)) return;
        optionalsSeen.add(optKey);
        addPattern("optional_usage", packKey, optKey, "", date);
      });

      const extrasSeen = new Set();
      (tx.customExtras || []).forEach(extra => {
        if (!extra.itemId || extrasSeen.has(extra.itemId)) return;
        extrasSeen.add(extra.itemId);
        addPattern("custom_extra", packKey, extra.itemId, "", date);
      });

      const omitsSeen = new Set();
      (tx.omissions || []).forEach(omit => {
        if (!omit.itemId || omitsSeen.has(omit.itemId)) return;
        omitsSeen.add(omit.itemId);
        addPattern("omission", packKey, omit.itemId, "", date);
      });
    });

    return { patterns: Object.values(patterns), denominatorByPack };
  }

  function generatePackingHabitObservations(patternData) {
    const { patterns, denominatorByPack } = patternData;
    const observations = [];

    patterns.forEach(p => {
      const denominator = denominatorByPack[p.packKey] || 0;
      const count = p.count;
      const percentage = denominator > 0 ? Math.round((count / denominator) * 100) : 0;
      if (denominator < PACKING_HABIT_MIN_DENOMINATOR) return;
      if (count < PACKING_HABIT_MIN_COUNT) return;
      if (percentage < PACKING_HABIT_MIN_PERCENT) return;

      const packLabel = RECIPES[p.packKey]?.label || p.packKey;
      const itemNameStr = p.type === "optional_usage"
        ? recipeOptionalLabel(p.packKey, p.itemId)
        : itemName(p.itemId);
      const replacementNameStr = p.replacementItemId ? itemName(p.replacementItemId) : "";
      const dates = p.dates.filter(Boolean).sort();
      const firstSeen = dates[0] || "";
      const lastSeen = dates[dates.length - 1] || "";
      const confidenceBand = packingHabitConfidenceBand(denominator, percentage);
      const recommendation = packingHabitRecommendation(p.type, packLabel, percentage, confidenceBand);

      let volunteerText = "";
      if (p.type === "substitution") {
        volunteerText = `${replacementNameStr} replaced ${itemNameStr} in ${count} of the last ${denominator} ${packLabel}s.`;
      } else if (p.type === "optional_usage") {
        volunteerText = `${itemNameStr} ${habitWasWere(itemNameStr)} included in ${count} of the last ${denominator} ${packLabel}s.`;
      } else if (p.type === "custom_extra") {
        volunteerText = `${itemNameStr} ${habitWasWere(itemNameStr)} added to ${count} of the last ${denominator} ${packLabel}s.`;
      } else if (p.type === "omission") {
        volunteerText = `${itemNameStr} ${habitWasWere(itemNameStr)} left out of ${count} of the last ${denominator} ${packLabel}s.`;
      }

      const adminText = `${volunteerText.slice(0, -1)} (${percentage}%). ${recommendation}`;

      observations.push({
        type: p.type,
        packKey: p.packKey,
        packLabel,
        itemId: p.itemId,
        itemName: itemNameStr,
        replacementItemId: p.replacementItemId || "",
        replacementItemName: replacementNameStr,
        count,
        denominator,
        percentage,
        firstSeen,
        lastSeen,
        volunteerText,
        adminText,
        recommendation,
        confidenceBand,
      });
    });

    observations.sort((a, b) => b.count - a.count || b.percentage - a.percentage);
    return observations;
  }

  // ── Phase 2: behavioural trend intelligence (export / ops only) ──

  function packingHabitPatternKey(type, packKey, itemId, replacementItemId) {
    return [type, packKey, itemId, replacementItemId || ""].join("|");
  }

  function packingHabitPatternMapFromBuilds(builds) {
    const data = computePackingHabitPatterns({ productionBuilds: builds });
    const map = {};
    data.patterns.forEach(p => {
      const key = packingHabitPatternKey(p.type, p.packKey, p.itemId, p.replacementItemId);
      const denom = data.denominatorByPack[p.packKey] || builds.length;
      map[key] = {
        type: p.type,
        packKey: p.packKey,
        itemId: p.itemId,
        replacementItemId: p.replacementItemId || "",
        count: p.count,
        denominator: denom,
        percentage: denom > 0 ? Math.round((p.count / denom) * 100) : 0,
      };
    });
    return map;
  }

  function chooseHabitWindowSize(totalBuilds) {
    if (totalBuilds >= 50) return 25;
    if (totalBuilds >= 40) return 20;
    if (totalBuilds >= 20) return 10;
    return null;
  }

  function deriveHistoricalHabitWindows(productionBuilds) {
    const byPack = {};
    (productionBuilds || []).forEach(tx => {
      const packKey = tx.packKey || "unknown";
      if (!byPack[packKey]) byPack[packKey] = [];
      byPack[packKey].push(tx);
    });

    const windows = {};
    Object.entries(byPack).forEach(([packKey, builds]) => {
      const sorted = builds.slice().sort((a, b) => (a.date || "").localeCompare(b.date || ""));
      const totalBuilds = sorted.length;
      const windowSize = chooseHabitWindowSize(totalBuilds);
      if (!windowSize) {
        windows[packKey] = {
          packKey,
          totalBuilds,
          windowSize: null,
          recentBuilds: [],
          previousBuilds: [],
        };
        return;
      }
      const recentBuilds = sorted.slice(-windowSize);
      const previousBuilds = sorted.slice(-windowSize * 2, -windowSize);
      windows[packKey] = {
        packKey,
        totalBuilds,
        windowSize,
        recentBuilds,
        previousBuilds,
        recentStartDate: recentBuilds[0]?.date || "",
        recentEndDate: recentBuilds[recentBuilds.length - 1]?.date || "",
        previousStartDate: previousBuilds[0]?.date || "",
        previousEndDate: previousBuilds[previousBuilds.length - 1]?.date || "",
      };
    });
    return windows;
  }

  function passesPackingHabitThreshold(count, denominator) {
    const percentage = denominator > 0 ? Math.round((count / denominator) * 100) : 0;
    return denominator >= PACKING_HABIT_MIN_DENOMINATOR
      && count >= PACKING_HABIT_MIN_COUNT
      && percentage >= PACKING_HABIT_MIN_PERCENT;
  }

  function compareHabitWindows(windowsByPack) {
    const comparisons = [];
    Object.values(windowsByPack || {}).forEach(w => {
      if (!w.windowSize) return;
      const recentMap = packingHabitPatternMapFromBuilds(w.recentBuilds);
      const previousMap = packingHabitPatternMapFromBuilds(w.previousBuilds);
      const keys = new Set([...Object.keys(recentMap), ...Object.keys(previousMap)]);
      keys.forEach(key => {
        const recent = recentMap[key] || { count: 0, percentage: 0 };
        const previous = previousMap[key] || { count: 0, percentage: 0 };
        const parts = key.split("|");
        comparisons.push({
          type: parts[0],
          packKey: parts[1],
          itemId: parts[2],
          replacementItemId: parts[3] || "",
          recentCount: recent.count,
          recentPercent: recent.percentage,
          recentDenominator: w.windowSize,
          previousCount: previous.count,
          previousPercent: previous.percentage,
          previousDenominator: w.windowSize,
          deltaPercent: recent.percentage - previous.percentage,
          windowSize: w.windowSize,
          recentStartDate: w.recentStartDate,
          recentEndDate: w.recentEndDate,
        });
      });
    });
    return comparisons;
  }

  function computeHabitEvidenceStage(comparison) {
    const totalObs = comparison.recentCount + comparison.previousCount;
    const maxCount = Math.max(comparison.recentCount, comparison.previousCount);
    const recentPasses = passesPackingHabitThreshold(comparison.recentCount, comparison.recentDenominator);
    const previousPasses = passesPackingHabitThreshold(comparison.previousCount, comparison.previousDenominator);
    const absDelta = Math.abs(comparison.deltaPercent);

    if (totalObs < 4 || maxCount < 2) return "too_early";
    if (!recentPasses && !previousPasses && totalObs < 6) return "early";
    if (recentPasses || previousPasses || (totalObs >= 6 && absDelta >= 5)) return "sufficient";
    return "early";
  }

  function computeHabitTrendClassification(comparison) {
    const evidence = computeHabitEvidenceStage(comparison);
    const delta = comparison.deltaPercent;
    const absDelta = Math.abs(delta);
    const recentPasses = passesPackingHabitThreshold(comparison.recentCount, comparison.recentDenominator);
    let trend;

    if (evidence === "too_early" && absDelta < 15) {
      trend = "too_early_to_tell";
    } else if (absDelta <= 5 && (comparison.recentCount > 0 || comparison.previousCount > 0)) {
      trend = "stable";
    } else if (delta >= 5) {
      if (recentPasses && comparison.recentPercent >= PACKING_HABIT_MIN_PERCENT) {
        trend = "established";
      } else {
        trend = "emerging";
      }
    } else if (delta <= -5) {
      if (passesPackingHabitThreshold(comparison.previousCount, comparison.previousDenominator)
        || comparison.previousCount >= PACKING_HABIT_MIN_COUNT) {
        trend = "declining";
      } else {
        trend = "emerging";
      }
    } else if (evidence === "too_early") {
      trend = "too_early_to_tell";
    } else {
      trend = "stable";
    }
    return { trend, evidence };
  }

  function habitReplayItemZeroDates(itemId, transactions) {
    const balances = {};
    ITEMS.forEach(i => { balances[i.id] = 0; });
    const zeroDates = [];
    const sorted = [...(transactions || [])].filter(t => t.type !== "undo")
      .sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    sorted.forEach(tx => {
      if (tx.type === "recount" && tx.itemId) {
        balances[tx.itemId] = Number(tx.newQty) || 0;
      } else if (tx.type === "donation") {
        (tx.lines || []).forEach(line => {
          if (!line.itemId) return;
          balances[line.itemId] = (balances[line.itemId] || 0) + (line.unitsAdded || Number(line.qty) || 0);
        });
      } else if (tx.type === "build" && !isTesterUser(tx.packer)) {
        const { usage } = computeBuildStockPlan(
          tx.packKey, tx.qty, tx.optionalIncluded || [], tx.customExtras || [],
          tx.substitutions || [], tx.omissions || []
        );
        Object.entries(usage).forEach(([id, deduct]) => {
          if (deduct > 0) balances[id] = (balances[id] || 0) - deduct;
        });
      } else if (tx.type === "deliver" && tx.deliverType === "completeUnit" && tx.itemId) {
        balances[tx.itemId] = (balances[tx.itemId] || 0) - (Number(tx.qty) || 0);
      }
      if ((balances[itemId] ?? 0) <= 0 && tx.date) zeroDates.push(tx.date);
    });
    return zeroDates;
  }

  function itemReachedZeroDuringWindow(itemId, startDate, endDate, transactions) {
    if (!itemId || !startDate || !endDate) return false;
    return habitReplayItemZeroDates(itemId, transactions).some(d => d >= startDate && d <= endDate);
  }

  function habitRecentRecountDiscrepancy(itemId, startDate, endDate, transactions) {
    return (transactions || []).some(tx => {
      if (tx.type !== "recount" || tx.itemId !== itemId) return false;
      if (!tx.date || tx.date < startDate || tx.date > endDate) return false;
      const oldQty = Number(tx.oldQty) || 0;
      const newQty = Number(tx.newQty) || 0;
      const variance = Math.abs(newQty - oldQty);
      const variancePct = variance / Math.max(oldQty, newQty, 1);
      return variance > 10 || variancePct > 0.2;
    });
  }

  function habitItemIsPlural(name) {
    const n = String(name || "").trim();
    if (!n) return false;
    const lower = n.toLowerCase();
    return lower.endsWith("s") && !lower.endsWith("ss") && !lower.endsWith("us");
  }

  function habitWasWere(name) {
    return habitItemIsPlural(name) ? "were" : "was";
  }

  function habitDescribePatternWindow(comparison, which) {
    const packLabel = RECIPES[comparison.packKey]?.label || comparison.packKey;
    const count = which === "recent" ? comparison.recentCount : comparison.previousCount;
    const denom = which === "recent" ? comparison.recentDenominator : comparison.previousDenominator;
    const itemNameStr = comparison.type === "optional_usage"
      ? recipeOptionalLabel(comparison.packKey, comparison.itemId)
      : itemName(comparison.itemId);
    const replacementNameStr = comparison.replacementItemId ? itemName(comparison.replacementItemId) : "";
    if (comparison.type === "substitution") {
      return `${replacementNameStr} replaced ${itemNameStr} in ${count} of the last ${denom} ${packLabel}s`;
    }
    if (comparison.type === "optional_usage") {
      return `${itemNameStr} ${habitWasWere(itemNameStr)} included in ${count} of the last ${denom} ${packLabel}s`;
    }
    if (comparison.type === "custom_extra") {
      return `${itemNameStr} ${habitWasWere(itemNameStr)} added to ${count} of the last ${denom} ${packLabel}s`;
    }
    if (comparison.type === "omission") {
      return `${itemNameStr} ${habitWasWere(itemNameStr)} left out of ${count} of the last ${denom} ${packLabel}s`;
    }
    return `${itemNameStr} in ${count} of the last ${denom} ${packLabel}s`;
  }

  function habitDescribePreviousWindow(comparison) {
    const packLabel = RECIPES[comparison.packKey]?.label || comparison.packKey;
    const count = comparison.previousCount;
    const denom = comparison.previousDenominator;
    return `this happened in ${count} of the previous ${denom} ${packLabel}s`;
  }

  function habitCauseHumanLabel(cause, comparison) {
    const itemLabel = itemName(comparison.type === "substitution" ? comparison.itemId : comparison.itemId);
    if (cause === "stock_shortage") return `${itemLabel} may have been unavailable on the shelf`;
    if (cause === "recount_discrepancy") return "a recent stock count did not match expectations";
    if (cause === "seasonality") return "seasonal timing may be influencing packing choices";
    if (cause === "recipe_change_candidate") return "the written recipe may no longer match storeroom practice";
    if (cause === "volunteer_preference") return "volunteers may be developing a packing preference";
    return "we cannot yet attribute this to a single cause";
  }

  function computeHabitCauseProbabilities(comparison, trend, evidence, transactions) {
    const stockItemId = comparison.itemId;
    const stockItemName = itemName(stockItemId);
    const start = comparison.recentStartDate;
    const end = comparison.recentEndDate;
    const scores = {
      stock_shortage: 0,
      recount_discrepancy: 0,
      volunteer_preference: 0,
      seasonality: 0,
      recipe_change_candidate: 0,
      unknown: 1,
    };
    const reasons = {};

    if (itemReachedZeroDuringWindow(stockItemId, start, end, transactions)) {
      scores.stock_shortage += 5;
      reasons.stock_shortage = `${stockItemName} reached zero during the recent window.`;
    }
    if (habitRecentRecountDiscrepancy(stockItemId, start, end, transactions)) {
      scores.recount_discrepancy += 4;
      reasons.recount_discrepancy = `A recent count for ${stockItemName} did not match what we expected.`;
    }
    if (itemMap[comparison.itemId]?.seasonal) {
      scores.seasonality += 3;
      reasons.seasonality = `${itemName(comparison.itemId)} is seasonal — the timing may explain the change.`;
    }
    if (comparison.type === "substitution") {
      if (comparison.recentPercent >= 70) scores.recipe_change_candidate += 3;
      else if (comparison.recentPercent >= 40) scores.recipe_change_candidate += 1;
      if (comparison.deltaPercent >= 5) scores.recipe_change_candidate += 1;
      if (scores.recipe_change_candidate > 0) {
        reasons.recipe_change_candidate = `This substitution appeared in ${comparison.recentCount} of ${comparison.recentDenominator} recent packs (${comparison.recentPercent}%).`;
      }
    }
    if (comparison.type === "optional_usage"
      && (trend === "emerging" || trend === "established")
      && evidence !== "too_early"
      && !itemReachedZeroDuringWindow(stockItemId, start, end, transactions)) {
      scores.volunteer_preference += 2;
      reasons.volunteer_preference = "No stock shortage alone fully explains this pattern.";
    }
    if (comparison.deltaPercent >= 10 && (trend === "emerging" || trend === "established")) {
      scores.volunteer_preference += 1;
    }
    if (evidence === "too_early" || evidence === "early") {
      scores.unknown += 3;
      reasons.unknown = "There is not yet enough evidence to attribute this to a single cause.";
    } else {
      scores.unknown += 1;
      reasons.unknown = "Other factors may still be contributing.";
    }

    const ranked = Object.entries(scores)
      .map(([cause, score]) => ({ cause, score }))
      .sort((a, b) => b.score - a.score);
    let top = ranked.slice(0, 3).filter(e => e.score > 0);
    if (!top.length) top = [{ cause: "unknown", score: 1 }];
    const total = top.reduce((s, e) => s + e.score, 0);
    const mapped = top.map(e => ({
      cause: e.cause,
      rawConfidence: e.score / total,
      reason: reasons[e.cause] || "Insufficient evidence to identify a specific cause.",
    }));
    let allocated = 0;
    return mapped.map((e, i) => {
      const confidence = i < mapped.length - 1
        ? Math.round(e.rawConfidence * 100) / 100
        : Math.round((1 - allocated) * 100) / 100;
      if (i < mapped.length - 1) allocated += confidence;
      return { cause: e.cause, confidence, reason: e.reason };
    });
  }

  function computeHabitConfidenceProbability(comparison, trend, evidence, possibleCauses) {
    const totalObs = comparison.recentCount + comparison.previousCount;
    let p = 0;
    if (evidence === "sufficient") p += 0.30;
    else if (evidence === "early") p += 0.15;
    else p += 0.05;
    p += (comparison.windowSize / 25) * 0.25;
    p += Math.min(1, totalObs / 12) * 0.20;
    p += Math.min(1, Math.abs(comparison.deltaPercent) / 40) * 0.15;
    const unknownConf = (possibleCauses.find(c => c.cause === "unknown") || {}).confidence || 0.3;
    p += (1 - unknownConf) * 0.10;
    if (trend === "established") p += 0.15;
    if (trend === "too_early_to_tell") p *= 0.5;
    if (trend === "stable" && evidence === "sufficient") p += 0.10;
    return Math.round(Math.min(1, Math.max(0, p)) * 100) / 100;
  }

  function habitConfidenceBandFromProbability(probability) {
    if (probability >= 0.70) return "high";
    if (probability >= 0.55) return "medium";
    return "low";
  }

  function computeInsightQuality(comparison, evidence, confidenceProbability, possibleCauses) {
    const evidenceScore = evidence === "sufficient" ? 1 : evidence === "early" ? 0.5 : 0.2;
    const obsScore = Math.min(1, (comparison.recentCount + comparison.previousCount) / 12);
    const windowScore = comparison.windowSize / 25;
    const unknownConf = (possibleCauses.find(c => c.cause === "unknown") || {}).confidence || 0.5;
    const causeScore = 1 - unknownConf;
    return Math.round(evidenceScore * 40 + obsScore * 20 + windowScore * 20 + causeScore * 20);
  }

  function habitBeliefFromWindow(count, denominator, evidence) {
    const stageWeight = evidence === "sufficient" ? 1 : evidence === "early" ? 0.6 : 0.3;
    const pct = denominator > 0 ? count / denominator : 0;
    return Math.round(Math.min(1, pct * stageWeight) * 100) / 100;
  }

  function buildTrendReason(comparison, trend, evidence) {
    const packLabel = RECIPES[comparison.packKey]?.label || comparison.packKey;
    const rc = comparison.recentCount;
    const pc = comparison.previousCount;
    const rd = comparison.recentDenominator;
    const pd = comparison.previousDenominator;
    const rp = comparison.recentPercent;
    const pp = comparison.previousPercent;
    const delta = comparison.deltaPercent;
    const totalObs = rc + pc;

    let base = `This behaviour appeared in ${rc} of the most recent ${rd} ${packLabel}s (${rp}%), compared with ${pc} of the previous ${pd} (${pp}%).`;

    if (trend === "too_early_to_tell") {
      return `${base} With only ${totalObs} total observations across both windows, it is too early to draw a firm conclusion.`;
    }
    if (trend === "stable") {
      return `${base} The change of ${delta >= 0 ? "+" : ""}${delta} percentage points is within normal variation.`;
    }
    if (trend === "emerging") {
      const dir = delta > 0 ? "increase" : "change";
      const suffix = evidence === "early"
        ? ` Although this represents a noticeable ${dir} of ${Math.abs(delta)} percentage points, there are still too few observations to conclude that this has become a consistent packing habit.`
        : ` This ${dir} of ${Math.abs(delta)} percentage points is becoming more consistent across recent packs.`;
      return base + suffix;
    }
    if (trend === "established") {
      return `${base} At ${rp}% of recent packs, this pattern now appears consistent enough to treat as an established habit.`;
    }
    if (trend === "declining") {
      const suffix = evidence === "early"
        ? ` This decrease of ${Math.abs(delta)} percentage points is visible, but more packs are needed before treating it as a sustained decline.`
        : ` This decrease of ${Math.abs(delta)} percentage points suggests the pattern is becoming less common.`;
      return base + suffix;
    }
    return base;
  }

  function habitSuggestedAction(trend, evidence, insightQualityScore) {
    if (insightQualityScore < 20 || trend === "too_early_to_tell") return "No action recommended yet.";
    if (trend === "established") return "Consider reviewing whether the written recipe still matches storeroom practice.";
    if (trend === "declining" && evidence === "sufficient") return "Worth watching over the next few packing sessions.";
    if (trend === "stable") return "No action recommended.";
    return "No action recommended yet.";
  }

  function habitInterpretationText(trend, evidence) {
    if (trend === "too_early_to_tell") {
      return "We have started to observe this behaviour, but we cannot yet determine whether it represents a genuine trend.";
    }
    if (trend === "emerging" && evidence === "early") {
      return "This may be an emerging packing habit, although there is not yet enough evidence to know whether it will continue.";
    }
    if (trend === "emerging") {
      return "This appears to be an emerging packing habit that is gaining consistency across recent builds.";
    }
    if (trend === "established") {
      return "This appears to have become a consistent packing habit in recent production builds.";
    }
    if (trend === "declining" && evidence === "early") {
      return "This pattern may be fading, although there is not yet enough evidence to be certain.";
    }
    if (trend === "declining") {
      return "This pattern appears to be declining across recent production builds.";
    }
    return "This pattern has remained broadly consistent across both comparison windows.";
  }

  function habitPossibleExplanationText(possibleCauses, comparison) {
    const top = possibleCauses[0];
    if (!top) return "No clear explanation stands out from the available evidence.";
    if (top.cause === "unknown" && top.confidence >= 0.4) {
      return "There is no clear explanation yet.";
    }
    const label = habitCauseHumanLabel(top.cause, comparison);
    const qualifier = top.confidence >= 0.5 ? "The most likely reason is that" : "One possible reason is that";
    return `${qualifier} ${label}. ${top.reason}`;
  }

  function generateHabitInsightText(comparison, trend, evidence, trendReason, possibleCauses, insightQualityScore) {
    const factsRecent = habitDescribePatternWindow(comparison, "recent");
    const factsPrevious = habitDescribePreviousWindow(comparison);
    let headline = "I noticed a change.";
    if (trend === "too_early_to_tell") headline = "I noticed something starting to appear.";
    else if (trend === "established") headline = "I noticed something that has become normal.";
    else if (trend === "stable") headline = "This has stayed remarkably consistent.";
    else if (trend === "declining") headline = "I noticed a change.";

    const interpretation = habitInterpretationText(trend, evidence);
    const explanation = habitPossibleExplanationText(possibleCauses, comparison);
    const action = habitSuggestedAction(trend, evidence, insightQualityScore);

    return [
      headline,
      `${factsRecent}.`,
      `Previously, ${factsPrevious}.`,
      interpretation,
      explanation,
      action,
    ].join("\n\n");
  }

  function habitInsightQualifiesForTopSummary(insight) {
    if (insight.trend === "too_early_to_tell") return false;
    if (insight.insightQualityScore < 20) return false;
    if (insight.confidenceProbability < 0.20 && insight.recentCount + insight.previousCount <= 1) return false;
    if (insight.recentCount <= 1 && insight.previousCount <= 1) return false;
    if (insight.confidenceBand === "medium" || insight.confidenceBand === "high") return true;
    if (insight.recentCount >= 3) return true;
    if (insight.previousCount >= 3) return true;
    if (Math.abs(insight.deltaPercentage) >= 30) return true;
    if (insight.insightQualityScore >= 40) return true;
    return false;
  }

  function filterTopHabitInsights(insights) {
    return (insights || []).filter(habitInsightQualifiesForTopSummary);
  }

  function habitInsightSortKey(insight) {
    return [
      insight.insightQualityScore || 0,
      insight.confidenceProbability || 0,
      (insight.recentCount || 0) + (insight.previousCount || 0),
      insight.windowSize || 0,
    ];
  }

  function compareHabitInsights(a, b) {
    const ka = habitInsightSortKey(a);
    const kb = habitInsightSortKey(b);
    for (let i = 0; i < ka.length; i++) {
      if (kb[i] !== ka[i]) return kb[i] - ka[i];
    }
    return 0;
  }

  function generateHabitInsights(trendRows) {
    return trendRows
      .filter(r => r.recentCount > 0 || r.previousCount > 0)
      .map(r => ({
        type: r.type,
        packKey: r.packKey,
        packLabel: RECIPES[r.packKey]?.label || r.packKey,
        itemId: r.itemId,
        replacementItemId: r.replacementItemId || "",
        trend: r.trend,
        evidence: r.evidence,
        trendReason: r.trendReason,
        recentCount: r.recentCount,
        previousCount: r.previousCount,
        windowSize: r.windowSize,
        deltaPercentage: r.deltaPercent,
        confidenceBand: r.confidenceBand,
        confidenceProbability: r.confidenceProbability,
        insightQualityScore: r.insightQualityScore,
        possibleCauses: r.possibleCauses,
        belief: r.belief,
        beliefPrevious: r.beliefPrevious,
        beliefDelta: r.beliefDelta,
        volunteerText: r.insightText,
      }))
      .sort(compareHabitInsights);
  }

  function packingHabitTrendSummary(events, transactions) {
    const windows = deriveHistoricalHabitWindows(events.productionBuilds);
    const comparisons = compareHabitWindows(windows);
    const trendRows = comparisons.map(c => {
      const { trend, evidence } = computeHabitTrendClassification(c);
      const possibleCauses = computeHabitCauseProbabilities(c, trend, evidence, transactions);
      const confidenceProbability = computeHabitConfidenceProbability(c, trend, evidence, possibleCauses);
      const confidenceBand = habitConfidenceBandFromProbability(confidenceProbability);
      const trendReason = buildTrendReason(c, trend, evidence);
      const insightQualityScore = computeInsightQuality(c, evidence, confidenceProbability, possibleCauses);
      const belief = confidenceProbability;
      const beliefPrevious = habitBeliefFromWindow(c.previousCount, c.previousDenominator, evidence);
      const beliefDelta = Math.round((belief - beliefPrevious) * 100) / 100;
      const insightText = generateHabitInsightText(c, trend, evidence, trendReason, possibleCauses, insightQualityScore);
      return {
        ...c, trend, evidence, trendReason, possibleCauses,
        confidenceBand, confidenceProbability, insightQualityScore,
        belief, beliefPrevious, beliefDelta, insightText,
      };
    });
    const insights = generateHabitInsights(trendRows);
    const counts = {
      too_early_to_tell: 0, emerging: 0, established: 0, declining: 0, stable: 0,
    };
    trendRows.forEach(r => { counts[r.trend] = (counts[r.trend] || 0) + 1; });
    const windowsSummary = {};
    Object.entries(windows).forEach(([packKey, w]) => {
      windowsSummary[packKey] = {
        windowSize: w.windowSize,
        totalBuilds: w.totalBuilds,
        recentBuildCount: w.recentBuilds.length,
        previousBuildCount: w.previousBuilds.length,
      };
    });
    return { windows: windowsSummary, counts, trendRows, insights };
  }

  function packingHabitTrendsConcise(trends) {
    const counts = trends?.counts || {};
    const topInsights = filterTopHabitInsights(trends?.insights || []).slice(0, 3);
    return {
      numberOfEmergingHabits: counts.emerging || 0,
      numberOfEstablishedHabits: counts.established || 0,
      numberOfDecliningHabits: counts.declining || 0,
      numberOfTooEarlyToTell: counts.too_early_to_tell || 0,
      numberOfStableHabits: counts.stable || 0,
      topThreeInsights: topInsights.map(i => ({
        trend: i.trend,
        evidence: i.evidence,
        trendReason: i.trendReason,
        volunteerText: i.volunteerText,
        confidenceBand: i.confidenceBand,
        confidenceProbability: i.confidenceProbability,
        insightQualityScore: i.insightQualityScore,
        possibleCauses: i.possibleCauses,
        recentCount: i.recentCount,
        previousCount: i.previousCount,
        deltaPercentage: i.deltaPercentage,
      })),
    };
  }

  function packingHabitSummary() {
    const transactions = state.transactions || [];
    const events = extractPackingHabitEvents(transactions);
    const patternData = computePackingHabitPatterns(events);
    const observations = generatePackingHabitObservations(patternData);
    const trends = packingHabitTrendSummary(events, transactions);
    const trendByKey = {};
    trends.trendRows.forEach(r => {
      trendByKey[packingHabitPatternKey(r.type, r.packKey, r.itemId, r.replacementItemId)] = r;
    });
    const enrichedObservations = observations.map(obs => {
      const key = packingHabitPatternKey(obs.type, obs.packKey, obs.itemId, obs.replacementItemId);
      const t = trendByKey[key];
      if (!t) {
        return {
          ...obs,
          trend: null,
          evidence: null,
          trendReason: null,
          previousCount: null,
          previousPercentage: null,
          recentCount: null,
          recentPercentage: null,
          deltaPercentage: null,
          possibleCauses: [],
          confidenceBand: null,
          confidenceProbability: null,
          insightQualityScore: null,
          belief: null,
          beliefPrevious: null,
          beliefDelta: null,
          insufficientHistory: true,
        };
      }
      return {
        ...obs,
        trend: t.trend,
        evidence: t.evidence,
        trendReason: t.trendReason,
        previousCount: t.previousCount,
        previousPercentage: t.previousPercent,
        recentCount: t.recentCount,
        recentPercentage: t.recentPercent,
        deltaPercentage: t.deltaPercent,
        possibleCauses: t.possibleCauses,
        confidenceBand: t.confidenceBand,
        confidenceProbability: t.confidenceProbability,
        insightQualityScore: t.insightQualityScore,
        belief: t.belief,
        beliefPrevious: t.beliefPrevious,
        beliefDelta: t.beliefDelta,
        insufficientHistory: false,
      };
    });
    return {
      generatedAt: new Date().toISOString(),
      productionBuildCount: events.productionBuildCount,
      excludedTesterBuildCount: events.excludedTesterBuildCount,
      windows: trends.windows,
      observations: enrichedObservations,
      allInsights: trends.insights,
      trends,
    };
  }

  function packingHabitsSummaryConcise(fullSummary) {
    const byType = { substitution: 0, optional_usage: 0, custom_extra: 0, omission: 0 };
    (fullSummary.observations || []).forEach(o => {
      byType[o.type] = (byType[o.type] || 0) + 1;
    });
    return {
      observationCount: (fullSummary.observations || []).length,
      productionBuildCount: fullSummary.productionBuildCount,
      excludedTesterBuildCount: fullSummary.excludedTesterBuildCount,
      byType,
      topObservations: (fullSummary.observations || []).slice(0, 5).map(o => ({
        type: o.type,
        volunteerText: o.volunteerText,
        confidenceBand: o.confidenceBand,
      })),
    };
  }

  // ═══════════════════════════════════════════════════════════════════
  // OPERATIONAL INTELLIGENCE — Phase 3A measurement foundation (export / ops)
  // ═══════════════════════════════════════════════════════════════════

  const OP_RECOUNT_BUILD_WINDOW_DAYS = 30;

  function opPackQty(tx) {
    return Math.max(0, Number(tx.qty) || 0);
  }

  function opSplitBuilds(transactions) {
    const all = (transactions || []).filter(t => t.type === "build");
    const production = all.filter(t => isProductionBuild(t));
    const tester = all.filter(t => isTesterUser(t.packer));
    return { all, production, tester };
  }

  function opConsumptionFromBuild(tx) {
    return computeBuildStockPlan(
      tx.packKey, opPackQty(tx), tx.optionalIncluded || [], tx.customExtras || [],
      tx.substitutions || [], tx.omissions || []
    );
  }

  function opBaselineUsageFromBuild(tx) {
    return computeBuildStockPlan(
      tx.packKey, opPackQty(tx), tx.optionalIncluded || [], tx.customExtras || [], [], []
    ).usage;
  }

  function opClassifyItemRole(itemId, packKey, tx) {
    const recipe = RECIPES[packKey];
    const subs = normalizeSubstitutions(tx.substitutions || []);
    if (subs.some(s => s.substitute === itemId)) return "substitution";
    if ((tx.customExtras || []).some(e => e.itemId === itemId)) return "custom_extra";
    if (recipe.core.some(c => c.itemId === itemId)) return "core";
    const optionalIncluded = tx.optionalIncluded || [];
    for (const opt of recipe.optional || []) {
      const key = opt.itemId || opt.id;
      if (optionalIncluded.includes(key) && opt.itemId === itemId) return "optional";
    }
    return "core";
  }

  function opRecipeRolesForItem(itemId) {
    const roles = [];
    for (const packKey of Object.keys(RECIPES)) {
      const recipe = RECIPES[packKey];
      const core = recipe.core.find(c => c.itemId === itemId);
      if (core) roles.push({ packKey, packLabel: recipe.label, role: "core", qtyPerPack: core.qty });
      for (const opt of recipe.optional || []) {
        if (opt.itemId === itemId && opt.decrement) {
          roles.push({ packKey, packLabel: recipe.label, role: "optional", qtyPerPack: 1 });
        }
      }
    }
    return roles;
  }

  function opEstimatedPacksForItem(units, packKey, itemId) {
    const recipe = RECIPES[packKey];
    const core = recipe?.core?.find(c => c.itemId === itemId);
    if (!core || core.qty <= 0) return 0;
    return Math.floor(units / core.qty);
  }

  function opSubstitutePackKeysForItem(itemId, transactions) {
    const packKeys = new Set();
    opSplitBuilds(transactions).production.forEach(tx => {
      normalizeSubstitutions(tx.substitutions || []).forEach(sub => {
        if (sub.substitute === itemId) packKeys.add(tx.packKey);
      });
    });
    return [...packKeys];
  }

  function opAvgSubstituteQtyPerPack(itemId, packKey, transactions) {
    let totalUnits = 0;
    let totalPacks = 0;
    opSplitBuilds(transactions).production.forEach(tx => {
      if (tx.packKey !== packKey) return;
      normalizeSubstitutions(tx.substitutions || []).forEach(sub => {
        if (sub.substitute !== itemId) return;
        totalPacks += sub.packCount;
        totalUnits += sub.packCount * sub.qtyPerPack;
      });
    });
    if (totalPacks <= 0) return 1;
    return Math.max(1, Math.round((totalUnits / totalPacks) * 100) / 100);
  }

  function opDonationLineRoleEstimates(itemId, unitsAdded, transactions) {
    const name = itemName(itemId);
    const roles = opRecipeRolesForItem(itemId);
    const corePackEnablement = {};
    const optionalPackSupport = {};
    const substitutionSupport = {};
    const subPackKeys = opSubstitutePackKeysForItem(itemId, transactions);

    roles.filter(r => r.role === "core").forEach(r => {
      const estimatedPacks = Math.floor(unitsAdded / r.qtyPerPack);
      if (estimatedPacks > 0) {
        corePackEnablement[r.packKey] = {
          estimatedPacks,
          description: `This donation added enough ${name} for up to ${estimatedPacks} ${r.packLabel}s.`,
        };
      }
    });

    roles.filter(r => r.role === "optional").forEach(r => {
      const estimatedPacks = Math.floor(unitsAdded / r.qtyPerPack);
      if (estimatedPacks > 0) {
        optionalPackSupport[r.packKey] = {
          estimatedPacks,
          description: `This donation added enough ${name} to include it in up to ${estimatedPacks} ${r.packLabel}s.`,
        };
      }
    });

    subPackKeys.forEach(pk => {
      const packLabel = RECIPES[pk]?.label || pk;
      const qtyPerPack = opAvgSubstituteQtyPerPack(itemId, pk, transactions);
      const estimatedPacks = Math.floor(unitsAdded / qtyPerPack);
      if (estimatedPacks > 0) {
        substitutionSupport[pk] = {
          estimatedPacks,
          description: `This donation added enough ${name} to support up to ${estimatedPacks} ${packLabel}s if used as an extra or substitute.`,
        };
      }
    });

    return { corePackEnablement, optionalPackSupport, substitutionSupport };
  }

  function opDonationLineMaxEnablement(line) {
    const values = [];
    ["corePackEnablement", "optionalPackSupport", "substitutionSupport"].forEach(key => {
      Object.values(line[key] || {}).forEach(entry => {
        if (entry.estimatedPacks > 0) values.push(entry.estimatedPacks);
      });
    });
    return values.length ? Math.max(...values) : 0;
  }

  function opDonationMaxEnablement(donation) {
    const values = (donation.lines || []).map(opDonationLineMaxEnablement);
    return values.length ? Math.max(...values) : 0;
  }

  function opDaysBetween(dateA, dateB) {
    if (!dateA || !dateB) return Infinity;
    const a = new Date(dateA + "T12:00:00");
    const b = new Date(dateB + "T12:00:00");
    return Math.abs(Math.floor((b - a) / 86400000));
  }

  function opUnitsConsumedAfterDate(itemId, afterDate, transactions) {
    let total = 0;
    (transactions || []).forEach(tx => {
      if (tx.type === "undo") return;
      if (tx.type !== "build") return;
      if (afterDate && (tx.date || "") <= afterDate) return;
      const { usage } = opConsumptionFromBuild(tx);
      total += usage[itemId] || 0;
    });
    return total;
  }

  function opLinkHabitFields(packingHabits, type, packKey, itemId, replacementItemId) {
    const key = packingHabitPatternKey(type, packKey, itemId, replacementItemId || "");
    const obs = (packingHabits?.observations || []).find(o =>
      packingHabitPatternKey(o.type, o.packKey, o.itemId, o.replacementItemId || "") === key
    );
    const trend = (packingHabits?.trends?.trendRows || []).find(r =>
      packingHabitPatternKey(r.type, r.packKey, r.itemId, r.replacementItemId || "") === key
    );
    return {
      relatedHabitObservation: obs ? { volunteerText: obs.volunteerText, confidenceBand: obs.confidenceBand } : null,
      relatedTrend: trend ? { trend: trend.trend, evidence: trend.evidence, confidenceBand: trend.confidenceBand } : null,
    };
  }

  function opOperationalMeaning(kind, ctx) {
    if (kind === "substitution") {
      if (ctx.shortageLikely === true) return "May have helped packing continue during a shortage.";
      if (ctx.shortageLikely === false) return "May reflect volunteer preference.";
      if (ctx.highRate) return "May reflect recipe mismatch.";
      return "Insufficient evidence.";
    }
    if (kind === "optional") {
      if (ctx.inclusionRate >= 0.7) return "This optional is becoming operationally significant.";
      if (ctx.unitsConsumed >= 20) return "This optional consumes meaningful stock.";
      if (ctx.inclusionRate < 0.2) return "This optional appears occasional.";
      return "Insufficient evidence.";
    }
    return "Insufficient evidence.";
  }

  function opEmptyPackBuildStats(packKey) {
    return {
      packKey,
      packLabel: RECIPES[packKey]?.label || packKey,
      productionBuildEvents: 0,
      productionPacksCreated: 0,
      testerBuildEventsExcluded: 0,
      testerPacksExcluded: 0,
      totalPacksCreatedAllMovements: 0,
      byPacker: {},
      byDestination: {},
      byDate: {},
      averagePacksPerBuildEvent: 0,
      largestSingleBuild: 0,
      coreStockConsumed: 0,
      optionalStockConsumed: 0,
      customExtraStockConsumed: 0,
      substitutionStockConsumed: 0,
      omittedStockAvoided: 0,
    };
  }

  function computeBuildImpact(transactions) {
    const { all, production, tester } = opSplitBuilds(transactions);
    const packKeys = Object.keys(RECIPES);
    const prodByPack = {};
    const allByPack = {};
    packKeys.forEach(pk => { prodByPack[pk] = opEmptyPackBuildStats(pk); allByPack[pk] = opEmptyPackBuildStats(pk); });

    const itemConsProd = {};
    const itemConsAll = {};
    const ensureItem = (map, itemId) => {
      if (!map[itemId]) {
        map[itemId] = { itemId, itemName: itemName(itemId), unitsConsumed: 0, buildTouchCount: 0, packsAffected: 0, role: "core" };
      }
      return map[itemId];
    };

    function processBuild(tx, byPack, itemMap, isProduction) {
      const pk = tx.packKey;
      if (!byPack[pk]) return;
      const qty = opPackQty(tx);
      const row = byPack[pk];
      row.totalPacksCreatedAllMovements += qty;
      if (isProduction) {
        row.productionBuildEvents += 1;
        row.productionPacksCreated += qty;
      }
      const packer = tx.packer || "unknown";
      const dest = tx.destination || "unknown";
      const date = tx.date || "unknown";
      row.byPacker[packer] = (row.byPacker[packer] || 0) + qty;
      row.byDestination[dest] = (row.byDestination[dest] || 0) + qty;
      row.byDate[date] = (row.byDate[date] || 0) + qty;
      if (qty > row.largestSingleBuild) row.largestSingleBuild = qty;

      const { usage } = opConsumptionFromBuild(tx);
      const baseline = opBaselineUsageFromBuild(tx);
      const touched = new Set();
      Object.entries(usage).forEach(([itemId, units]) => {
        if (units <= 0) return;
        const role = opClassifyItemRole(itemId, pk, tx);
        const entry = ensureItem(itemMap, itemId);
        entry.unitsConsumed += units;
        entry.role = role;
        if (!touched.has(itemId)) {
          entry.buildTouchCount += 1;
          entry.packsAffected += qty;
          touched.add(itemId);
        }
        if (role === "core") row.coreStockConsumed += units;
        else if (role === "optional") row.optionalStockConsumed += units;
        else if (role === "custom_extra") row.customExtraStockConsumed += units;
        else if (role === "substitution") row.substitutionStockConsumed += units;
      });
      Object.entries(baseline).forEach(([itemId, baseUnits]) => {
        const actual = usage[itemId] || 0;
        if (baseUnits > actual) row.omittedStockAvoided += baseUnits - actual;
      });
    }

    production.forEach(tx => processBuild(tx, prodByPack, itemConsProd, true));
    all.forEach(tx => processBuild(tx, allByPack, itemConsAll, isProductionBuild(tx)));

    tester.forEach(tx => {
      const pk = tx.packKey;
      if (!prodByPack[pk]) return;
      prodByPack[pk].testerBuildEventsExcluded += 1;
      prodByPack[pk].testerPacksExcluded += opPackQty(tx);
    });

    packKeys.forEach(pk => {
      const row = prodByPack[pk];
      row.averagePacksPerBuildEvent = row.productionBuildEvents > 0
        ? Math.round((row.productionPacksCreated / row.productionBuildEvents) * 100) / 100
        : 0;
      const allRow = allByPack[pk];
      allRow.averagePacksPerBuildEvent = allRow.productionBuildEvents > 0
        ? Math.round((allRow.productionPacksCreated / allRow.productionBuildEvents) * 100) / 100
        : 0;
    });

    return {
      byPackKey: packKeys.map(pk => prodByPack[pk]),
      allMovements: {
        byPackKey: packKeys.map(pk => allByPack[pk]),
        totalPacksCreatedAllMovements: packKeys.reduce((s, pk) => s + allByPack[pk].totalPacksCreatedAllMovements, 0),
      },
      itemConsumption: {
        productionOnly: Object.values(itemConsProd).sort((a, b) => b.unitsConsumed - a.unitsConsumed),
        allMovements: Object.values(itemConsAll).sort((a, b) => b.unitsConsumed - a.unitsConsumed),
      },
    };
  }

  function computeSubstitutionImpact(transactions, packingHabits) {
    const { production } = opSplitBuilds(transactions);
    const patterns = {};

    production.forEach(tx => {
      const pk = tx.packKey;
      const qty = opPackQty(tx);
      normalizeSubstitutions(tx.substitutions || []).forEach(sub => {
        const key = `${pk}|${sub.insteadOf}|${sub.substitute}`;
        if (!patterns[key]) {
          patterns[key] = {
            packKey: pk,
            packLabel: RECIPES[pk]?.label || pk,
            insteadOfItemId: sub.insteadOf,
            insteadOfItemName: itemName(sub.insteadOf),
            substituteItemId: sub.substitute,
            substituteItemName: itemName(sub.substitute),
            substitutionEvents: 0,
            packsAffected: 0,
            unitsSubstituted: 0,
            firstSeen: tx.date,
            lastSeen: tx.date,
            dates: [],
          };
        }
        const p = patterns[key];
        p.substitutionEvents += 1;
        p.packsAffected += sub.packCount;
        p.unitsSubstituted += sub.packCount * sub.qtyPerPack;
        p.dates.push(tx.date);
        if (tx.date < p.firstSeen) p.firstSeen = tx.date;
        if (tx.date > p.lastSeen) p.lastSeen = tx.date;
      });
    });

    return Object.values(patterns).map(p => {
      const habit = opLinkHabitFields(packingHabits, "substitution", p.packKey, p.insteadOfItemId, p.substituteItemId);
      const zeroDates = habitReplayItemZeroDates(p.insteadOfItemId, transactions);
      const shortageDuring = zeroDates.some(d => d >= p.firstSeen && d <= p.lastSeen);
      const origBal = getBalance(p.insteadOfItemId);
      const subBal = getBalance(p.substituteItemId);
      const subItem = itemMap[p.substituteItemId];
      let unitsOriginalAvoided = 0;
      production.forEach(tx => {
        if (tx.packKey !== p.packKey) return;
        normalizeSubstitutions(tx.substitutions || []).forEach(sub => {
          if (sub.insteadOf !== p.insteadOfItemId || sub.substitute !== p.substituteItemId) return;
          const perPack = recipeQtyPerPack(p.packKey, sub.insteadOf, tx.optionalIncluded || [], tx.customExtras || []);
          unitsOriginalAvoided += sub.packCount * perPack;
        });
      });
      const shortageLikely = shortageDuring ? true : (p.packsAffected >= 3 ? false : "unknown");
      const shortageEvidence = shortageDuring
        ? `${p.insteadOfItemName} reached zero during the observation window.`
        : "No direct stock-shortage evidence in transaction history.";
      const meaning = opOperationalMeaning("substitution", {
        shortageLikely: shortageLikely === "unknown" ? null : shortageLikely,
        highRate: p.packsAffected >= 5,
      });
      return {
        ...p,
        dates: undefined,
        ...habit,
        possibleOperationalMeaning: meaning,
        counterfactualIngredients: {
          originalItemBalanceAtEnd: origBal,
          substituteItemBalanceAtEnd: subBal,
          originalItemCurrentlyZero: origBal <= 0,
          substituteItemCurrentlyLow: subItem ? subBal < subItem.threshold : false,
          packsThatWouldHaveNeededOriginal: p.packsAffected,
          unitsOfOriginalAvoided: unitsOriginalAvoided,
          unitsOfSubstituteUsed: p.unitsSubstituted,
          shortageLikely,
          shortageEvidence,
        },
      };
    }).sort((a, b) => b.packsAffected - a.packsAffected);
  }

  function computeOptionalImpact(transactions, packingHabits) {
    const { production } = opSplitBuilds(transactions);
    const patterns = {};
    let totalProdPacks = 0;

    production.forEach(tx => {
      const pk = tx.packKey;
      const qty = opPackQty(tx);
      totalProdPacks += qty;
      const recipe = RECIPES[pk];
      const included = tx.optionalIncluded || [];
      (recipe.optional || []).forEach(opt => {
        const key = opt.itemId || opt.id;
        if (!opt.itemId || !opt.decrement) return;
        if (!included.includes(key)) return;
        const mapKey = `${pk}|${opt.itemId}`;
        if (!patterns[mapKey]) {
          patterns[mapKey] = {
            packKey: pk,
            packLabel: recipe.label,
            itemId: opt.itemId,
            itemName: itemName(opt.itemId),
            inclusionEvents: 0,
            packsIncluded: 0,
            unitsConsumed: 0,
          };
        }
        const p = patterns[mapKey];
        p.inclusionEvents += 1;
        p.packsIncluded += qty;
        p.unitsConsumed += qty;
      });
    });

    return Object.values(patterns).map(p => {
      const habit = opLinkHabitFields(packingHabits, "optional_usage", p.packKey, p.itemId, "");
      const packTotal = production.filter(t => t.packKey === p.packKey).reduce((s, t) => s + opPackQty(t), 0);
      const inclusionRate = packTotal > 0 ? Math.round((p.packsIncluded / packTotal) * 100) / 100 : 0;
      const bal = getBalance(p.itemId);
      const it = itemMap[p.itemId];
      return {
        ...p,
        inclusionRateByPacks: inclusionRate,
        currentBalance: bal,
        currentLowStock: it ? bal < it.threshold && bal > 0 : false,
        currentZeroStock: bal <= 0,
        ...habit,
        possibleOperationalMeaning: opOperationalMeaning("optional", {
          inclusionRate,
          unitsConsumed: p.unitsConsumed,
        }),
      };
    }).sort((a, b) => b.packsIncluded - a.packsIncluded);
  }

  function computeDonationImpact(transactions) {
    return (transactions || []).filter(t => t.type === "donation").map(tx => {
      const lines = (tx.lines || []).map(line => {
        const unitsAdded = line.unitsAdded || Number(line.qty) || 0;
        const roles = opRecipeRolesForItem(line.itemId);
        const roleEstimates = opDonationLineRoleEstimates(line.itemId, unitsAdded, transactions);
        const estimatedByPack = {};
        Object.entries(roleEstimates.corePackEnablement).forEach(([pk, entry]) => {
          estimatedByPack[pk] = entry.estimatedPacks;
        });
        const descriptions = [
          ...Object.values(roleEstimates.corePackEnablement).map(e => e.description),
          ...Object.values(roleEstimates.optionalPackSupport).map(e => e.description),
          ...Object.values(roleEstimates.substitutionSupport).map(e => e.description),
        ];
        return {
          itemId: line.itemId,
          itemName: itemName(line.itemId),
          unitsAdded,
          currentBalance: getBalance(line.itemId),
          unitsLaterConsumedAfterDonation: opUnitsConsumedAfterDate(line.itemId, tx.date, transactions),
          appearsInRecipe: roles.length > 0,
          recipeRoles: roles,
          corePackEnablement: roleEstimates.corePackEnablement,
          optionalPackSupport: roleEstimates.optionalPackSupport,
          substitutionSupport: roleEstimates.substitutionSupport,
          estimatedPacksEnabledByThisLine: estimatedByPack,
          estimateDescription: descriptions.length
            ? descriptions.join(" ")
            : `${itemName(line.itemId)} does not appear in recipe roles — no pack enablement estimate (measurement only).`,
        };
      });
      const totalUnitsAdded = lines.reduce((s, l) => s + l.unitsAdded, 0);
      const estimatedPackEnablement = {};
      Object.keys(RECIPES).forEach(pk => {
        let minEnable = Infinity;
        lines.forEach(l => {
          const n = l.estimatedPacksEnabledByThisLine[pk];
          if (n > 0) minEnable = Math.min(minEnable, n);
        });
        if (minEnable !== Infinity) estimatedPackEnablement[pk] = minEnable;
      });
      const itemsStillOnHand = lines.filter(l => l.currentBalance > 0).map(l => l.itemId);
      const itemsLaterConsumed = lines.filter(l => l.unitsLaterConsumedAfterDonation > 0).map(l => l.itemId);
      const dates = (transactions || []).map(t => t.date).filter(Boolean).sort();
      return {
        donationId: tx.id,
        date: tx.date,
        donor: tx.donor || "",
        totalUnitsAdded,
        lines,
        estimatedPackEnablement,
        maxEstimatedPackEnablement: opDonationMaxEnablement({ lines }),
        itemsStillOnHand,
        itemsLaterConsumed,
        impactWindow: { from: tx.date, to: dates[dates.length - 1] || tx.date },
      };
    }).sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  }

  function computeRecountImpact(transactions) {
    const { production } = opSplitBuilds(transactions);
    return (transactions || []).filter(t => t.type === "recount").map(tx => {
      const oldQty = Number(tx.oldQty) || 0;
      const newQty = Number(tx.newQty) || 0;
      const variance = newQty - oldQty;
      const varianceAbs = Math.abs(variance);
      const variancePercent = Math.round((varianceAbs / Math.max(oldQty, newQty, 1)) * 100);
      let direction = "same";
      if (variance > 0) direction = "higher_than_expected";
      else if (variance < 0) direction = "lower_than_expected";

      let confidenceEffect = "minor_adjustment";
      if (varianceAbs <= 2) confidenceEffect = "minor_adjustment";
      else if (variance > 0 && variancePercent >= 10) confidenceEffect = "revealed_understatement";
      else if (variance < 0 && variancePercent >= 10) confidenceEffect = "revealed_overstatement";
      else if (varianceAbs > 0 && variancePercent < 10) confidenceEffect = "increased_confidence";

      let operationalRiskEffect = "Small correction.";
      if (direction === "lower_than_expected" && variancePercent >= 15) {
        operationalRiskEffect = "System had overstated available stock.";
      } else if (direction === "higher_than_expected" && variancePercent >= 15) {
        operationalRiskEffect = "System had understated available stock.";
      }

      let relatedBuildsBefore = 0;
      let relatedBuildsAfter = 0;
      production.forEach(btx => {
        const { usage } = opConsumptionFromBuild(btx);
        if (!(usage[tx.itemId] > 0)) return;
        const days = opDaysBetween(btx.date, tx.date);
        const qty = opPackQty(btx);
        if (btx.date < tx.date && days <= OP_RECOUNT_BUILD_WINDOW_DAYS) relatedBuildsBefore += qty;
        if (btx.date > tx.date && days <= OP_RECOUNT_BUILD_WINDOW_DAYS) relatedBuildsAfter += qty;
      });

      return {
        recountId: tx.id,
        date: tx.date,
        itemId: tx.itemId,
        itemName: itemName(tx.itemId),
        oldQty,
        newQty,
        variance,
        varianceAbs,
        variancePercent,
        direction,
        confidenceEffect,
        operationalRiskEffect,
        relatedBuildsBefore,
        relatedBuildsAfter,
      };
    }).sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  }

  function computeStockRisk(transactions, itemConfidence) {
    const statsIndex = buildItemActivityStatsIndex(transactions, { excludeTesterBuilds: true });
    const confMap = {};
    (itemConfidence || []).forEach(row => { confMap[row.itemId] = row.volunteerConfidence; });

    return ITEMS.map(item => {
      const balance = getBalance(item.id);
      const meta = itemRecipeMeta(item.id);
      const roles = opRecipeRolesForItem(item.id);
      const stats = deriveItemActivityStats(item.id, statsIndex);
      const conf = confMap[item.id] || {};
      const confBand = conf.confidenceBand || "needs_checking";
      const confProb = Math.round(((conf.confidenceScore || 0) / 100) * 100) / 100;
      const zeroStock = balance <= 0;
      const lowStock = balance > 0 && balance < item.threshold;

      const riskSignals = [];
      if (zeroStock && meta.isCore) riskSignals.push("zero_stock_core_item");
      if (lowStock && meta.isCore) riskSignals.push("low_stock_core_item");
      if (stats.packDeductions >= 20) riskSignals.push("high_recent_consumption");
      if (confBand === "needs_checking" || confBand === "uncertain") riskSignals.push("confidence_low");
      if (stats.substitutionTouches >= 2) riskSignals.push("substitution_pressure");
      if (stats.donationLineCount >= 3 && stats.packDeductions >= 10) riskSignals.push("donation_dependency");
      if (item.seasonal) riskSignals.push("seasonal_relevance");

      let riskBand = "low";
      if (zeroStock && meta.isCore) riskBand = "critical";
      else if (zeroStock || (lowStock && meta.isCore) || riskSignals.length >= 3) riskBand = "high";
      else if (lowStock || riskSignals.length >= 1) riskBand = "medium";

      return {
        itemId: item.id,
        itemName: item.name,
        balance,
        threshold: item.threshold,
        zeroStock,
        lowStock,
        appearsInRecipes: roles.length > 0,
        recipeRoles: roles,
        recentConsumption: stats.packDeductions,
        recentDonationAdds: stats.donationLineCount,
        recentSubstitutionTouches: stats.substitutionTouches,
        recentOmissionTouches: stats.omissionTouches,
        confidenceBand: confBand,
        confidenceProbability: confProb,
        riskSignals,
        riskBand,
      };
    }).sort((a, b) => {
      const order = { critical: 4, high: 3, medium: 2, low: 1 };
      return (order[b.riskBand] || 0) - (order[a.riskBand] || 0) || a.balance - b.balance;
    });
  }

  function computeImpactReadiness(ctx) {
    const reasons = [];
    const blockers = [];
    const recommendedNextDataToCollect = [];
    let score = 0;

    if (ctx.productionPacksCreated >= 50) { score += 20; reasons.push("At least 50 production packs recorded."); }
    else blockers.push("Fewer than 50 production packs.");

    if (ctx.uniqueBuildDays >= 14) { score += 15; reasons.push("Production builds span multiple weeks."); }
    else blockers.push("Short observation window.");

    if (ctx.donationCount >= 10) { score += 10; reasons.push("At least 10 donations recorded."); }
    else recommendedNextDataToCollect.push("More donation history.");

    if (ctx.recountCount >= 5) { score += 10; reasons.push("At least 5 recounts recorded."); }
    else { blockers.push("Too few recounts."); recommendedNextDataToCollect.push("More physical recounts."); }

    if (ctx.substitutionPatternCount >= 2) { score += 10; reasons.push("Repeated substitution patterns exist."); }
    if (ctx.optionalPatternCount >= 2) { score += 5; reasons.push("Repeated optional inclusion patterns exist."); }

    if (ctx.needsCheckingRatio < 0.5) { score += 15; reasons.push("Item confidence layer is reasonably mature."); }
    else blockers.push("Confidence layer not mature — many items need checking.");

    if (ctx.babyPackProductionPacks >= 10) { score += 10; reasons.push("Baby Pack has sufficient production history."); }
    else recommendedNextDataToCollect.push("More Baby Pack production builds.");

    if (!ctx.testerDominates) { score += 5; reasons.push("Production data is not dominated by tester builds."); }
    else blockers.push("Too many tester events relative to production.");

    if (!ctx.singlePackerDominates) { score += 5; reasons.push("Multiple packers contribute to production builds."); }
    else blockers.push("One packer dominates production builds.");

    if (ctx.unknownSessionRatio < 0.3) { score += 5; reasons.push("Most sessions have a known volunteer identity."); }
    else blockers.push("Too many unknown sessions.");

    if (ctx.synthetic) {
      score = Math.min(score, 35);
      blockers.push("Synthetic sample data.");
    }

    score = Math.min(100, Math.max(0, score));
    const readyForImpactJudgement = !ctx.synthetic && score >= 70 && blockers.length <= 1;

    return {
      readyForImpactJudgement,
      readinessScore: score,
      reasons,
      blockers,
      recommendedNextDataToCollect,
    };
  }

  function opBuildLimitations(ctx) {
    const limits = ["Impact estimates are measurement ingredients, not recommendations."];
    if (ctx.synthetic) limits.push("This export contains synthetic sample data.");
    if (ctx.uniqueBuildDays < 14) limits.push("The observation window is short.");
    if (ctx.singlePackerDominates) limits.push(`Most production builds are from ${ctx.dominantPacker}.`);
    if (ctx.babyPackProductionPacks < 10) limits.push("Baby Pack has insufficient history.");
    if (ctx.testerDominates) limits.push("Tester builds represent a large share of build events.");
    if (ctx.recountCount < 5) limits.push("Few recounts — stock confidence measurements are limited.");
    return limits;
  }

  function opBuildOperationalSummary(buildImpact, substitutionImpact, optionalImpact, donationImpact, recountImpact, stockRisk, impactReadiness) {
    const productionPacksCreated = (buildImpact.byPackKey || []).reduce((s, p) => s + p.productionPacksCreated, 0);
    const testerPacksExcluded = (buildImpact.byPackKey || []).reduce((s, p) => s + p.testerPacksExcluded, 0);
    const highRiskItemCount = stockRisk.filter(r => r.riskBand === "high").length;
    const criticalRiskItemCount = stockRisk.filter(r => r.riskBand === "critical").length;

    return {
      productionPacksCreated,
      testerPacksExcluded,
      topConsumedItems: (buildImpact.itemConsumption?.productionOnly || []).slice(0, 5),
      topSubstitutionPatternsByPacksAffected: substitutionImpact.slice(0, 5),
      topOptionalItemsByPacksIncluded: optionalImpact.slice(0, 5),
      largestDonationsByEstimatedEnablement: [...donationImpact]
        .sort((a, b) => {
          const aMax = Math.max(0, ...Object.values(a.estimatedPackEnablement || {}));
          const bMax = Math.max(0, ...Object.values(b.estimatedPackEnablement || {}));
          return bMax - aMax;
        })
        .slice(0, 5),
      highestVarianceRecounts: [...recountImpact].sort((a, b) => b.varianceAbs - a.varianceAbs).slice(0, 5),
      highestRiskItems: stockRisk.filter(r => r.riskBand === "high" || r.riskBand === "critical").slice(0, 5),
      highRiskItemCount,
      criticalRiskItemCount,
      impactReadiness,
    };
  }

  function computeOperationalIntelligence(deps) {
    deps = deps || {};
    const transactions = state.transactions || [];
    const packingHabits = deps.packingHabits || packingHabitSummary();
    const itemConfidence = deps.itemConfidence || computeAllItemConfidence();

    const buildImpact = computeBuildImpact(transactions);
    const substitutionImpact = computeSubstitutionImpact(transactions, packingHabits);
    const optionalImpact = computeOptionalImpact(transactions, packingHabits);
    const donationImpact = computeDonationImpact(transactions);
    const recountImpact = computeRecountImpact(transactions);
    const stockRisk = computeStockRisk(transactions, itemConfidence);

    const { production, all, tester } = opSplitBuilds(transactions);
    const productionPacks = production.reduce((s, t) => s + opPackQty(t), 0);
    const testerPacks = tester.reduce((s, t) => s + opPackQty(t), 0);
    const buildDates = production.map(t => t.date).filter(Boolean);
    const uniqueBuildDays = new Set(buildDates).size;
    const donationCount = transactions.filter(t => t.type === "donation").length;
    const recountCount = transactions.filter(t => t.type === "recount").length;
    const babyPackProductionPacks = production.filter(t => t.packKey === "babyPack").reduce((s, t) => s + opPackQty(t), 0);

    const packerCounts = {};
    production.forEach(t => { packerCounts[t.packer || "unknown"] = (packerCounts[t.packer || "unknown"] || 0) + opPackQty(t); });
    const dominantPacker = Object.entries(packerCounts).sort((a, b) => b[1] - a[1])[0];
    const singlePackerDominates = Object.keys(packerCounts).length <= 1 && production.length > 3;
    const testerDominates = all.length > 0 && tester.length / all.length > 0.4;

    const confSummary = buildConfidenceSummary(itemConfidence);
    const needsCheckingRatio = itemConfidence.length > 0
      ? (confSummary.volunteer.uncertain + confSummary.volunteer.needs_checking) / itemConfidence.length
      : 1;

    const events = state.analytics?.events || [];
    const sessionInfo = analyticsClassifySessions(events);
    const unknownSessionRatio = (sessionInfo.productionVolunteerSessions + sessionInfo.testerSessions + sessionInfo.unknownSessions) > 0
