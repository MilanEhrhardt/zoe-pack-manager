  function showConfirmModal() {
    const existing = document.getElementById("modal-overlay");
    if (existing) existing.remove();
    const overlay = document.createElement("div");
    overlay.id = "modal-overlay";
    overlay.className = "modal-overlay";
    overlay.innerHTML = `<div class="modal">
      <h2>Please confirm</h2>
      <div id="confirm-body">${confirmAction.summary}</div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="confirm-cancel">Go back</button>
        <button class="btn btn-primary" id="confirm-ok">Yes, save</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);
    document.getElementById("confirm-cancel").onclick = () => {
      analyticsTrack("confirm_modal_cancelled", { view, formPreview: analyticsFormPreview() });
      overlay.remove();
      confirmAction = null;
    };
    document.getElementById("confirm-ok").onclick = () => {
      analyticsTrack("confirm_modal_accepted", { view, formPreview: analyticsFormPreview() });
      const ok = confirmAction.run();
      overlay.remove();
      confirmAction = null;
      if (ok !== false) {
        form = {};
        view = "home";
        errorMsg = "";
      }
      render();
    };
  }

  // ═══════════════════════════════════════════════════════════════════
  // EVENTS
  // ═══════════════════════════════════════════════════════════════════

  function bindEvents() {
    document.querySelectorAll("[data-go]").forEach(el => {
      el.onclick = () => {
        const nextView = el.dataset.go;
        analyticsTrack("navigation_clicked", { from: view, to: nextView, target: analyticsElementMeta(el) });
        if (nextView !== view && analyticsCurrentFlow && !["home"].includes(view)) analyticsAbandonFlow("navigated_away");
        view = nextView;
        form = {};
        errorMsg = "";
        if (["donation", "build", "deliver", "stock"].includes(view)) analyticsStartFlow(view, "navigation");
        if (view === "build") {
          form.packKey = getPackContext();
          initOptionalDefaults(form.packKey);
          form.packer = state.lastSelectedPacker || PACKERS[0];
          if (!analyticsSessionUser) setSelectedPacker(form.packer);
        }
        render();
      };
    });

    const undoBtn = document.getElementById("btn-undo");
    if (undoBtn) undoBtn.onclick = () => { undoLast(); };

    const expBtn = document.getElementById("btn-export");
    if (expBtn) expBtn.onclick = exportBackup;

    const impBtn = document.getElementById("btn-import");
    if (impBtn) impBtn.onclick = () => document.getElementById("import-file").click();

    const sampleBtn = document.getElementById("btn-sample");
    if (sampleBtn) sampleBtn.onclick = () => { analyticsTrack("sample_data_clicked", {}); loadSampleData(); };

    const analyticsCsvBtn = document.getElementById("btn-export-analytics-csv");
    if (analyticsCsvBtn) analyticsCsvBtn.onclick = exportAnalyticsCSV;

    const analyticsJsonBtn = document.getElementById("btn-export-analytics-json");
    if (analyticsJsonBtn) analyticsJsonBtn.onclick = exportAnalyticsJSON;

    const aiPackBtn = document.getElementById("btn-export-ai-pack");
    if (aiPackBtn) aiPackBtn.onclick = exportAIDataPack;

    const toggleAnalyticsBtn = document.getElementById("btn-toggle-analytics");
    if (toggleAnalyticsBtn) toggleAnalyticsBtn.onclick = () => setAnalyticsRecording(!(state.analytics?.recordingEnabled !== false));

    const clearAnalyticsDayBtn = document.getElementById("btn-clear-analytics-day");
    if (clearAnalyticsDayBtn) clearAnalyticsDayBtn.onclick = () => {
      const dateInput = document.getElementById("analytics-clear-date");
      clearAnalyticsForDate(dateInput ? dateInput.value : todayISO());
    };

    document.querySelectorAll("details").forEach(d => {
      if (!d.dataset.analyticsBound) {
        d.dataset.analyticsBound = "1";
        d.addEventListener("toggle", () => {
          const summary = d.querySelector("summary");
          analyticsTrack("details_toggled", {
            open: d.open,
            summary: analyticsSafeText(summary?.innerText || ""),
            target: analyticsElementMeta(summary),
          });
        });
      }
    });

    if (view === "donation") bindDonation();
    if (view === "build") bindBuild();
    if (view === "deliver") bindDeliver();
    if (view === "stock") bindStock();
    if (view === "home") bindPackContextSelector("home-more-pack-context");
  }

  function exportBackup() {
    analyticsTrack("backup_export_requested", { transactionCount: state.transactions.length, analyticsEventCount: state.analytics?.events?.length || 0 });
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `zoe-backup-${todayISO()}.json`;
    a.click();
  }

  document.getElementById("import-file").onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.balances) throw new Error("Invalid backup file");
        if (!confirm("This will replace all current data. Are you sure?")) return;
        analyticsTrack("backup_import_started", {});
        state = analyticsUpgradeState(parsed);
        ITEMS.forEach(i => {
          if (state.balances[i.id] === undefined) state.balances[i.id] = 0;
        });
        if (!state.readyPacks) state.readyPacks = { momPack: 0, babyPack: 0 };
        if (!state.transactions) state.transactions = [];
        if (!state.packContext) state.packContext = "momPack";
        if (!state.donors || !state.donors.length) {
          rebuildDonorsFromTransactions();
        }
        saveState();
        view = "home";
        form = {};
        analyticsTrack("backup_import_success", { transactionCount: state.transactions.length });
        render();
      } catch (err) {
        analyticsTrack("backup_import_failed", { message: err.message || String(err) });
        alert("Could not read backup file. Please check the file and try again.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  function bindDonation() {
    bindPackContextSelector("donation-pack-context", () => readDonationForm());
    const donorEl = document.getElementById("donor");
    if (donorEl) {
      donorEl.oninput = updateDonorHint;
      updateDonorHint();
    }
    document.getElementById("add-line").onclick = () => {
      readDonationForm();
      const qtyErrors = getDonationQtyErrors(form.lines);
      if (Object.keys(qtyErrors).length) {
        form.donationQtyErrors = qtyErrors;
        errorMsg = "Please enter a quantity for each item before adding another.";
        render();
        document.querySelector(".field-error[data-donation-error]")?.scrollIntoView({ behavior: "smooth", block: "nearest" });
        return;
      }
      const first = sortItemsForPack(getPackContext())[0];
      form.lines.push({ itemId: first.id, qty: "", packSize: "12", note: "" });
      form.donationQtyErrors = {};
      errorMsg = "";
      render();
    };
    document.querySelectorAll(".remove-line").forEach(btn => {
      btn.onclick = () => {
        form.lines.splice(parseInt(btn.dataset.idx, 10), 1);
        readDonationForm();
        render();
      };
    });
    document.querySelectorAll(".line-item").forEach(el => {
      el.onchange = () => { readDonationForm(); render(); };
    });
    document.querySelectorAll(".line-qty").forEach(el => {
      el.oninput = () => {
        readDonationForm();
        const idx = parseInt(el.dataset.idx, 10);
        const qty = parseInt(el.value, 10);
        if (form.donationQtyErrors && qty >= 1) {
          delete form.donationQtyErrors[idx];
          if (!Object.keys(form.donationQtyErrors).length) {
            form.donationQtyErrors = {};
            errorMsg = "";
          }
          render();
        }
      };
    });
    document.getElementById("donation-save").onclick = () => {
      readDonationForm();
      const qtyErrors = getDonationQtyErrors(form.lines);
      if (Object.keys(qtyErrors).length) {
        form.donationQtyErrors = qtyErrors;
        errorMsg = "Please enter a quantity for each item.";
        render();
        document.querySelector(".field-error[data-donation-error]")?.scrollIntoView({ behavior: "smooth", block: "nearest" });
        return;
      }
      form.donationQtyErrors = {};
      errorMsg = "";
      const lines = [];
      for (const line of form.lines) {
        const qty = parseInt(line.qty, 10);
        lines.push({ itemId: line.itemId, qty, packSize: line.packSize ? parseInt(line.packSize, 10) : undefined, note: line.note });
      }
      let summary = `<p><strong>Donation</strong> — ${esc(formatDate(form.donationDate))}</p>`;
      if (form.donor) summary += `<p>From: ${esc(form.donor)}</p><ul>`;
      else summary += `<ul>`;
      lines.forEach(l => {
        const it = itemMap[l.itemId];
        let desc = `${esc(it.name)}: `;
        if (it.unit === "packet" && l.packSize) desc += `${l.qty} packets × ${l.packSize} = ${l.qty * l.packSize} units`;
        else desc += `${l.qty}`;
        summary += `<li>${desc}</li>`;
      });
      summary += `</ul>`;
      confirmAction = {
        summary,
        run: () => commitDonation(form.donor, lines, form.donationDate),
      };
      showConfirmModal();
    };
  }

  function readDonationForm() {
    form.donor = document.getElementById("donor")?.value || form.donor || "";
    form.donationDate = document.getElementById("donation-date")?.value || form.donationDate || todayISO();
    form.lines.forEach((line, idx) => {
      const itemEl = document.querySelector(`.line-item[data-idx="${idx}"]`);
      const qtyEl = document.querySelector(`.line-qty[data-idx="${idx}"]`);
      const noteEl = document.querySelector(`.line-note[data-idx="${idx}"]`);
      const packEl = document.querySelector(`.line-packsize[data-idx="${idx}"]`);
      if (itemEl) line.itemId = itemEl.value;
      if (qtyEl) line.qty = qtyEl.value;
      if (noteEl) line.note = noteEl.value;
      if (packEl) line.packSize = packEl.value;
    });
  }

  function bindSubFieldValidation() {
    const refresh = (scrollToError) => {
      readBuildForm();
      const qty = parseInt(form.qty, 10) || 0;
      form.subLineErrors = getSubstitutionLineErrors(qty, form.substitutions);
      render();
      if (scrollToError) {
        document.querySelector(".field-error[data-sub-error]")?.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    };
    const onEnter = (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        refresh(true);
      }
    };
    const buildQty = document.getElementById("build-qty");
    if (buildQty) {
      buildQty.onchange = () => refresh(false);
      buildQty.onkeydown = onEnter;
    }
    document.querySelectorAll(".sub-packs, .sub-qty").forEach(el => {
      el.onchange = () => refresh(false);
      el.onkeydown = onEnter;
    });
    // Omission edits affect the "From the shelf" preview the same way swaps do —
    // keep them live so the shelf totals never lag behind what the volunteer typed.
    document.querySelectorAll(".omit-item, .omit-packs, .omit-qty").forEach(el => {
      el.onchange = () => refresh(false);
      el.onkeydown = onEnter;
    });
    document.querySelectorAll(".sub-instead, .sub-substitute").forEach(el => {
      el.onchange = () => {
        readBuildForm();
        const idx = parseInt(el.dataset.subIdx, 10);
        const sub = form.substitutions[idx];
        if (sub?.insteadOf && el.classList.contains("sub-instead")) {
          const included = Object.keys(form.optional).filter(k => form.optional[k]);
          sub.qtyPerPack = String(recipeQtyPerPack(
            form.packKey, sub.insteadOf, included, form.customExtras.filter(e => e.itemId)
          ));
        }
        form.subLineErrors = getSubstitutionLineErrors(parseInt(form.qty, 10) || 0, form.substitutions);
        render();
      };
    });
  }

  function bindBuild() {
    const exceptionsPanel = document.getElementById("exceptions-panel");
    if (exceptionsPanel) {
      exceptionsPanel.addEventListener("toggle", () => {
        form.exceptionsOpen = exceptionsPanel.open;
      });
    }

    const choiceExtra = document.getElementById("choice-extra");
    if (choiceExtra) choiceExtra.onclick = () => {
      readBuildForm();
      form.exceptionsOpen = true;
      if (!form.customExtras.some(e => !e.itemId)) {
        form.customExtras.push({ itemId: "cup-of-soup-sachets", qtyPerPack: "2" });
      }
      render();
    };

    const choiceLeftOut = document.getElementById("choice-leftout");
    if (choiceLeftOut) choiceLeftOut.onclick = () => {
      readBuildForm();
      form.exceptionsOpen = true;
      if (!form.omissions) form.omissions = [];
      if (!form.omissions.some(o => !o.itemId && !o.packCount)) {
        form.omissions.push({ itemId: "", packCount: "", qtyPerPack: "1" });
      }
      render();
    };

    const choiceSubstitution = document.getElementById("choice-substitution");
    if (choiceSubstitution) choiceSubstitution.onclick = () => {
      readBuildForm();
      form.exceptionsOpen = true;
      const qty = parseInt(form.qty, 10) || 0;
      const included = Object.keys(form.optional || {}).filter(k => form.optional[k]);
      const customExtras = (form.customExtras || []).filter(e => e.itemId);
      const shortages = qty > 0
        ? checkBuild(form.packKey, qty, included, customExtras, form.substitutions || [], form.omissions || [])
        : [];
      const firstShortage = shortages[0];
      if (!form.substitutions.some(s => !s.insteadOf && !s.substitute && !s.packCount)) {
        form.substitutions.push({
          insteadOf: firstShortage?.itemId || "",
          substitute: "",
          packCount: qty > 0 ? String(qty) : "",
          qtyPerPack: firstShortage
            ? String(recipeQtyPerPack(form.packKey, firstShortage.itemId, included, customExtras))
            : "",
        });
      }
      render();
    };

    const buildPackEl = document.getElementById("build-pack");
    if (buildPackEl) buildPackEl.onchange = function() {
      form.packKey = this.value;
      setPackContext(form.packKey);
      initOptionalDefaults(form.packKey);
      readBuildForm();
      render();
    };
    const buildPackerEl = document.getElementById("build-packer");
    if (buildPackerEl) buildPackerEl.onchange = function() {
      setSelectedPacker(this.value);
    };
    document.querySelectorAll(".toggle-btn").forEach(btn => {
      btn.onclick = () => {
        readBuildForm();
        const k = btn.dataset.opt;
        form.optional[k] = !form.optional[k];
        syncBuildStockWarning();
        render();
      };
    });
    document.querySelectorAll(".remove-sub").forEach(btn => {
      btn.onclick = () => {
        readBuildForm();
        form.substitutions.splice(parseInt(btn.dataset.subIdx, 10), 1);
        render();
      };
    });
    document.querySelectorAll(".remove-omit").forEach(btn => {
      btn.onclick = () => {
        readBuildForm();
        form.omissions.splice(parseInt(btn.dataset.omitIdx, 10), 1);
        render();
      };
    });
    bindSubFieldValidation();
    // If a stock-shortage warning is visible and the user changes anything that affects stock,
    // update or hide the warning immediately without forcing them to press Save again.
    document.querySelectorAll("#build-qty, #build-pack, .toggle-btn, .ce-item, .ce-qty, .sub-instead, .sub-substitute, .sub-packs, .sub-qty, .omit-item, .omit-packs, .omit-qty")
      .forEach(el => {
        el.addEventListener("input", updateBuildErrorBannerLive);
        el.addEventListener("change", updateBuildErrorBannerLive);
      });
    document.querySelectorAll(".remove-ce").forEach(btn => {
      btn.onclick = () => {
        readBuildForm();
        form.customExtras.splice(parseInt(btn.dataset.ceIdx, 10), 1);
        render();
      };
    });
    const buildSave = document.getElementById("build-save");
    if (buildSave) buildSave.onclick = () => {
      readBuildForm();
      const qty = parseInt(form.qty, 10);
      if (!qty || qty < 1) { errorMsg = "Please enter how many packs you built."; render(); return; }
      const included = Object.keys(form.optional).filter(k => form.optional[k]);
      const customExtras = form.customExtras.filter(e => e.itemId);
      form.subLineErrors = getSubstitutionLineErrors(qty, form.substitutions);
      if (Object.keys(form.subLineErrors).length) {
        render();
        document.querySelector(".field-error[data-sub-error]")?.scrollIntoView({ behavior: "smooth", block: "nearest" });
        return;
      }
      const dup = customExtras.map(e => e.itemId).filter((id, i, arr) => arr.indexOf(id) !== i);
      if (dup.length) {
        errorMsg = "Each extra item can only be added once. Remove the duplicate.";
        render();
        return;
      }
      const stockError = getBuildStockErrorMessage();
      if (stockError) {
        errorMsg = stockError;
        render();
        return;
      }
      const recipe = RECIPES[form.packKey];
      let summary = `<p><strong>${qty} ${esc(recipe.label)}</strong> — ${esc(formatDate(form.buildDate))}<br>
        Packed by ${esc(form.packer)} for ${esc(form.destination)}</p>`;
      summary += `<div style="font-size:0.95rem;">${formatBuildPreview(form.packKey, qty, included, customExtras, form.substitutions, true, form.omissions)}</div>`;
      for (const opt of recipe.optional) {
        const key = opt.itemId || opt.id;
        if (!included.includes(key)) continue;
        if (opt.decrement && opt.itemId) continue;
        summary += `<p style="margin:8px 0 0;font-size:0.95rem;">${esc(opt.label || itemName(opt.itemId))} included</p>`;
      }
      confirmAction = {
        summary,
        run: () => commitBuild(form.packKey, qty, form.packer, form.destination, included, customExtras, form.substitutions, form.buildDate, form.omissions),
      };
      showConfirmModal();
    };
  }

  function readBuildForm() {
    form.packKey = document.getElementById("build-pack")?.value || form.packKey;
    form.buildDate = document.getElementById("build-date")?.value || form.buildDate || todayISO();
    form.qty = document.getElementById("build-qty")?.value ?? form.qty;
    form.packer = document.getElementById("build-packer")?.value || form.packer;
    form.destination = document.getElementById("build-dest")?.value || form.destination;
    (form.substitutions || []).forEach((sub, idx) => {
      const insteadEl = document.querySelector(`.sub-instead[data-sub-idx="${idx}"]`);
      const substituteEl = document.querySelector(`.sub-substitute[data-sub-idx="${idx}"]`);
      const packsEl = document.querySelector(`.sub-packs[data-sub-idx="${idx}"]`);
      const qtyEl = document.querySelector(`.sub-qty[data-sub-idx="${idx}"]`);
      if (insteadEl) sub.insteadOf = insteadEl.value;
      if (substituteEl) sub.substitute = substituteEl.value;
      if (packsEl) sub.packCount = packsEl.value;
      if (qtyEl) sub.qtyPerPack = qtyEl.value;
    });
    (form.customExtras || []).forEach((extra, idx) => {
      const itemEl = document.querySelector(`.ce-item[data-ce-idx="${idx}"]`);
      const qtyEl = document.querySelector(`.ce-qty[data-ce-idx="${idx}"]`);
      if (itemEl) extra.itemId = itemEl.value;
      if (qtyEl) extra.qtyPerPack = qtyEl.value;
    });
    (form.omissions || []).forEach((omit, idx) => {
      const itemEl = document.querySelector(`.omit-item[data-omit-idx="${idx}"]`);
      const packsEl = document.querySelector(`.omit-packs[data-omit-idx="${idx}"]`);
      const qtyEl = document.querySelector(`.omit-qty[data-omit-idx="${idx}"]`);
      if (itemEl) omit.itemId = itemEl.value;
      if (packsEl) omit.packCount = packsEl.value;
      if (qtyEl) omit.qtyPerPack = qtyEl.value;
    });
  }

  function bindDeliver() {
    document.querySelectorAll(".tab").forEach(tab => {
      tab.onclick = () => { form.deliverTab = tab.dataset.tab; readDeliverForm(); render(); };
    });
    document.getElementById("deliver-save").onclick = () => {
      readDeliverForm();
      if (form.deliverTab === "assembled") {
        const qty = parseInt(form.deliverQty, 10);
        if (!qty || qty < 1) { errorMsg = "Please enter how many packs to deliver."; render(); return; }
        const recipe = RECIPES[form.deliverPack];
        const summary = `<p>Deliver <strong>${qty} ${esc(recipe.label)}</strong> to <strong>${esc(form.deliverDest)}</strong><br>${esc(formatDate(form.deliverDate))}</p>`;
        confirmAction = {
          summary,
          run: () => {
            const err = commitDeliverAssembled(form.deliverPack, qty, form.deliverDest, form.deliverDate);
            if (err) { errorMsg = err; return false; }
            return true;
          },
        };
      } else {
        const qty = parseInt(form.deliverUnitQty, 10);
        if (!qty || qty < 1) { errorMsg = "Please enter how many to deliver."; render(); return; }
        const summary = `<p>Deliver <strong>${qty} ${esc(itemName(form.deliverUnit))}</strong> to <strong>${esc(form.deliverDest)}</strong><br>${esc(formatDate(form.deliverDate))}</p>`;
        confirmAction = {
          summary,
          run: () => {
            const err = commitDeliverUnits(form.deliverUnit, qty, form.deliverDest, form.deliverDate);
            if (err) { errorMsg = err; return false; }
            return true;
          },
        };
      }
      showConfirmModal();
    };
  }

  function readDeliverForm() {
    form.deliverDate = document.getElementById("del-date")?.value || form.deliverDate;
    form.deliverDest = document.getElementById("del-dest")?.value || form.deliverDest;
    if (form.deliverTab === "assembled") {
      form.deliverPack = document.getElementById("del-pack")?.value || form.deliverPack;
      form.deliverQty = document.getElementById("del-qty")?.value ?? form.deliverQty;
    } else {
      form.deliverUnit = document.getElementById("del-unit")?.value || form.deliverUnit;
      form.deliverUnitQty = document.getElementById("del-unit-qty")?.value ?? form.deliverUnitQty;
    }
  }

  function bindStock() {
    bindPackContextSelector("stock-pack-context", (packKey) => {
      readStockForm();
      const shortcuts = PACK_STOCK_SHORTCUTS[packKey];
      if (!shortcuts.includes(form.stockItem)) form.stockItem = shortcuts[0];
    });
    document.querySelectorAll(".stock-shortcut").forEach(btn => {
      btn.onclick = () => { form.stockItem = btn.dataset.id; readStockForm(); render(); };
    });
    document.getElementById("stock-item").onchange = function() {
      form.stockItem = this.value;
      render();
    };
    document.getElementById("stock-save").onclick = () => {
      readStockForm();
      const count = parseInt(form.stockCount, 10);
      if (isNaN(count) || count < 0) { errorMsg = "Please enter the count you found on the shelf."; render(); return; }
      const it = itemMap[form.stockItem];
      const old = getBalance(form.stockItem);
      const summary = `<p><strong>Recount</strong> — ${esc(formatDate(form.stockDate))}</p>
        <p>Set <strong>${esc(it.name)}</strong> from ${old} to <strong>${count}</strong>${form.stockReason ? `<br>Reason: ${esc(form.stockReason)}` : ""}</p>`;
      confirmAction = {
        summary,
        run: () => commitRecount(form.stockItem, count, form.stockReason, form.stockDate),
      };
      showConfirmModal();
    };
  }

  function readStockForm() {
    form.stockItem = document.getElementById("stock-item")?.value || form.stockItem;
    form.stockDate = document.getElementById("stock-date")?.value || form.stockDate || todayISO();
    form.stockCount = document.getElementById("stock-count")?.value ?? form.stockCount;
    form.stockReason = document.getElementById("stock-reason")?.value || form.stockReason;
  }


  // Global analytics capture. This stays structural rather than visual: no screen recording, no third-party scripts.
  function analyticsClickKey(target) {
    const meta = analyticsElementMeta(target);
    return meta.id || meta.dataGo || meta.text || `${meta.tag}:${meta.type}:${meta.classes?.[0] || ""}`;
  }

  function analyticsRecordClickBurst(target) {
    const key = analyticsClickKey(target);
    const now = Date.now();
    if (!analyticsClickBurst[key]) analyticsClickBurst[key] = [];
    analyticsClickBurst[key] = analyticsClickBurst[key].filter(t => now - t < 1500);
    analyticsClickBurst[key].push(now);
    if (analyticsClickBurst[key].length === 3) {
      analyticsTrack("rage_click", { target: analyticsElementMeta(target), count: analyticsClickBurst[key].length, windowMs: now - analyticsClickBurst[key][0] });
    }
  }

  function analyticsStartHoverTimer(target) {
    const key = analyticsClickKey(target) + "|" + view;
    if (analyticsHoverTimers.has(key) || analyticsHoverLogged.has(key)) return;
    const startedAt = Date.now();
    const timer = setTimeout(() => {
      analyticsHoverTimers.delete(key);
      analyticsHoverLogged.add(key);
      analyticsTrack("mouse_hesitation", { target: analyticsElementMeta(target), durationMs: Date.now() - startedAt });
    }, 1800);
    analyticsHoverTimers.set(key, timer);
  }

  function analyticsClearHoverTimer(target) {
    const key = analyticsClickKey(target) + "|" + view;
    const timer = analyticsHoverTimers.get(key);
    if (timer) clearTimeout(timer);
    analyticsHoverTimers.delete(key);
  }

  document.addEventListener("mouseover", function(e) {
    const target = e.target.closest("button, summary, input, select, textarea, a");
    if (!target) return;
    analyticsStartHoverTimer(target);
  }, true);

  document.addEventListener("mouseout", function(e) {
    const target = e.target.closest("button, summary, input, select, textarea, a");
    if (!target) return;
    analyticsClearHoverTimer(target);
  }, true);

  analyticsExposureEnsureClickListener();

  document.addEventListener("click", function(e) {
    const target = e.target.closest("button, summary, a, input, select, textarea");
    if (!target) return;
    analyticsClearHoverTimer(target);
    analyticsRecordClickBurst(target);
    analyticsTrack("click", { target: analyticsElementMeta(target) });
  }, true);

  document.addEventListener("focusin", function(e) {
    const target = e.target;
    if (!target || !["INPUT", "SELECT", "TEXTAREA"].includes(target.tagName)) return;
    const field = analyticsFieldName(target);
    const now = Date.now();
    if (analyticsLastFieldFocus && analyticsLastFieldFocus.field !== field) {
      analyticsTrack("time_between_fields", { fromField: analyticsLastFieldFocus.field, toField: field, durationMs: now - analyticsLastFieldFocus.at });
    }
    analyticsLastFieldFocus = { field, at: now };
    analyticsFocusStartedAt[field] = now;
    analyticsFieldState[field] = { startValue: JSON.stringify(analyticsFieldValue(target)), changed: false, focusedAt: now };
    analyticsTrack("field_focus", { field, value: analyticsFieldValue(target), target: analyticsElementMeta(target) });
  }, true);

  document.addEventListener("focusout", function(e) {
    const target = e.target;
    if (!target || !["INPUT", "SELECT", "TEXTAREA"].includes(target.tagName)) return;
    const field = analyticsFieldName(target);
    const started = analyticsFocusStartedAt[field] || Date.now();
    const durationMs = Date.now() - started;
    const currentValue = analyticsFieldValue(target);
    analyticsTrack("field_blur", { field, durationMs, value: currentValue, target: analyticsElementMeta(target) });
    const fs = analyticsFieldState[field];
    const empty = currentValue?.empty === true || currentValue?.value === "";
    if (fs && !fs.changed && empty && durationMs > 700) {
      analyticsTrack("field_abandoned", { field, durationMs, value: currentValue, target: analyticsElementMeta(target), reason: "focused_empty_field_left_unchanged" });
    }
    delete analyticsFocusStartedAt[field];
    delete analyticsFieldState[field];
  }, true);

  document.addEventListener("change", function(e) {
    const target = e.target;
    if (!target || !["INPUT", "SELECT", "TEXTAREA"].includes(target.tagName)) return;
    const field = analyticsFieldName(target);
    if (analyticsFieldState[field]) analyticsFieldState[field].changed = true;
    analyticsTrack("field_change", { field, value: analyticsFieldValue(target), target: analyticsElementMeta(target) });
  }, true);

  document.addEventListener("input", function(e) {
    const target = e.target;
    if (!target || !["INPUT", "TEXTAREA"].includes(target.tagName)) return;
    const field = analyticsFieldName(target);
    if (analyticsFieldState[field]) analyticsFieldState[field].changed = true;
  }, true);

  window.addEventListener("scroll", function() {
    const now = Date.now();
    const doc = document.documentElement;
    const maxScroll = Math.max(1, doc.scrollHeight - window.innerHeight);
    const pct = Math.max(0, Math.min(100, Math.round((window.scrollY / maxScroll) * 100)));
    if (analyticsScrollState.view !== view) analyticsScrollState = { view, startedAt: now, maxPct: 0, lastPct: 0, lastAt: now, timer: null };
    if (!analyticsScrollState.startedAt) {
      analyticsScrollState.startedAt = now;
      analyticsTrack("scroll_start", { pct });
    }
    if (pct > analyticsScrollState.maxPct) {
      analyticsScrollState.maxPct = pct;
      const crossed = Math.floor(pct / 25) * 25;
      const prevCrossed = Math.floor((analyticsScrollState.lastPct || 0) / 25) * 25;
      if (crossed > prevCrossed) analyticsTrack("scroll_depth", { pct, maxPct: analyticsScrollState.maxPct, crossed });
    }
    analyticsScrollState.lastPct = pct;
    analyticsScrollState.lastAt = now;
    if (analyticsScrollState.timer) clearTimeout(analyticsScrollState.timer);
    analyticsScrollState.timer = setTimeout(() => {
      analyticsTrack("scroll_end", { maxPct: analyticsScrollState.maxPct, durationMs: Date.now() - analyticsScrollState.startedAt });
      analyticsScrollState.startedAt = 0;
      analyticsScrollState.maxPct = pct;
    }, 900);
  }, { passive: true });

  window.addEventListener("beforeunload", function() {
    if (analyticsCurrentFlow) analyticsAbandonFlow("window_closed");
    analyticsTrack("app_close", { view, snapshot: analyticsOperationalSnapshot() });
  });

  // ═══════════════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════════════

  render();
  </script>
</body>
</html>
