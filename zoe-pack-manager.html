<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoe Pack Manager — The Zoe Project</title>
  <!--
    Zoe Pack Manager — The Zoe Project storeroom tool
    Double-click this file to open. No install or internet needed.
    Your work saves automatically on this computer.
    Use Export Backup (footer) to save a copy somewhere safe.
    To add items, change recipes, or clinics: edit the CONFIG block in the script below.
  -->
  <style>
    :root {
      --zoe-purple: #5F43B2;
      --zoe-purple-dark: #3B2677;
      --zoe-pink: #C64A8B;
      --zoe-green: #2F8F5B;
      --zoe-blue: #316B9E;
      --bg: #F7F5F0;
      --surface: rgba(255,255,255,0.92);
      --surface-solid: #FFFFFF;
      --text: #141414;
      --text-muted: #6B7280;
      --border: #E7E1D6;
      --border-strong: #D8D0C4;
      --shadow: 0 24px 70px rgba(20,20,20,0.08), 0 2px 10px rgba(20,20,20,0.04);
      --shadow-soft: 0 10px 32px rgba(20,20,20,0.06);
      --radius: 22px;
      --radius-sm: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(95,67,178,0.10), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(198,74,139,0.08), transparent 24%),
        linear-gradient(180deg, #FFFCF7 0%, var(--bg) 100%);
      color: var(--text);
      font-size: 18px;
      line-height: 1.5;
      min-height: 100vh;
      letter-spacing: -0.01em;
    }
    .wrap {
      width: min(980px, calc(100vw - 44px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }
    .view-content {
      background: var(--surface);
      border: 1px solid rgba(216,208,196,0.85);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 42px;
      backdrop-filter: blur(10px);
    }
    h1, h2, h3 { letter-spacing: -0.045em; }
    h1 { font-size: 1.5rem; font-weight: 650; margin: 0 0 8px; color: var(--zoe-purple-dark); }
    h2 { font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1.02; font-weight: 650; margin: 0 0 12px; color: var(--text); }
    h3 { font-size: 1rem; font-weight: 650; margin: 0 0 14px; color: var(--text); }
    p { margin-top: 0; }
    .today-date { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 24px; }

    /* App header */
    .app-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
      margin-bottom: 22px;
      padding: 0 6px;
    }
    .header-row { display: contents; }
    .header-spacer { width: auto; min-width: 44px; }
    .header-brand { display: flex; justify-content: center; align-items: center; }
    .header-logo { height: 54px; width: auto; display: block; }
    .app-header--home .header-logo { height: 72px; }
    .header-back {
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.72);
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
      font-size: 1.35rem;
      color: var(--zoe-purple);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .header-back:hover { border-color: var(--zoe-purple); }
    .header-tagline { display: none; }
    .header-title { display: none; }
    .header-date {
      grid-column: 3;
      grid-row: 1;
      justify-self: end;
      font-size: 0.95rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* Home */
    .view-content--home {
      padding: 52px 42px 36px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(255,252,247,0.88) 100%);
    }
    .home-screen {
      max-width: 640px;
      margin: 0 auto;
      min-height: min(68vh, 720px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .home-question {
      font-size: clamp(2.4rem, 5vw, 4.6rem);
      line-height: 1.02;
      letter-spacing: -0.06em;
      font-weight: 650;
      text-align: center;
      color: var(--text);
      margin: 0 0 48px;
    }
    .home-actions { display: grid; gap: 14px; max-width: 640px; margin: 0 auto; }
    .home-action-btn {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      align-items: center;
      gap: 18px;
      width: 100%;
      min-height: 94px;
      padding: 22px 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text);
      background: var(--surface-solid);
      font-family: inherit;
      font-size: 1.65rem;
      font-weight: 620;
      letter-spacing: -0.035em;
      text-align: left;
      box-shadow: var(--shadow-soft);
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }
    .home-action-btn::after { content: "→"; color: var(--text-muted); font-weight: 400; font-size: 1.35rem; }
    .home-action-btn:hover { transform: translateY(-1px); border-color: #CFC6BA; box-shadow: var(--shadow); }
    .home-action-btn--build { background: linear-gradient(135deg, #FFFFFF 0%, #F7FFF9 100%); }
    .home-action-btn--donation { background: linear-gradient(135deg, #FFFFFF 0%, #FFF7FB 100%); }
    .home-action-btn--deliver { background: linear-gradient(135deg, #FFFFFF 0%, #F6FAFF 100%); }
    .home-action-icon {
      flex-shrink: 0;
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(95,67,178,0.08);
      color: var(--zoe-purple);
    }
    .home-action-icon svg { width: 30px; height: 30px; stroke: currentColor; fill: none; }
    .home-action-btn--build .home-action-icon { color: var(--zoe-green); background: rgba(47,143,91,0.10); }
    .home-action-btn--donation .home-action-icon { color: var(--zoe-pink); background: rgba(198,74,139,0.10); }
    .home-action-btn--deliver .home-action-icon { color: var(--zoe-blue); background: rgba(49,107,158,0.10); }
    .home-action-btn--stock { background: linear-gradient(135deg, #FFFFFF 0%, #FFFBF5 100%); }
    .home-action-btn--stock .home-action-icon { color: #8B7355; background: rgba(139,115,85,0.10); }
    .home-action-label { text-align: left; padding-right: 0; }
    .stat-cards { display: none; }

    /* Home — discreet secondary */
    .home-more-wrap {
      margin-top: 56px;
      text-align: center;
    }
    .home-more {
      display: inline-block;
      text-align: left;
      max-width: 100%;
    }
    .home-more > summary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      cursor: pointer;
      color: var(--text-muted);
      font-weight: 550;
      font-size: 0.92rem;
      list-style: none;
      border: 1px solid transparent;
      border-radius: 999px;
      background: transparent;
      transition: color 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }
    .home-more > summary:hover {
      color: var(--zoe-purple);
      border-color: var(--border);
      background: rgba(255,255,255,0.55);
    }
    .home-more[open] > summary {
      color: var(--zoe-purple);
      margin-bottom: 12px;
    }
    .home-more > summary::-webkit-details-marker { display: none; }
    .home-more-body {
      padding: 18px 20px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.72);
      box-shadow: var(--shadow-soft);
      min-width: min(100%, 420px);
    }
    .home-more-section { margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .home-more-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .home-more-section h3 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin: 0 0 10px;
      font-weight: 650;
    }
    .home-secondary { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 8px 0 0; }
    .home-link, .home-undo, .footer button, .link-button {
      background: none;
      border: none;
      color: var(--zoe-purple);
      font-size: 0.92rem;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      padding: 0;
    }
    .home-link:hover, .home-undo:hover, .footer button:hover { text-decoration: underline; }
    .panel, .hero {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-soft);
    }
    .low-item { color: #A13A34; font-weight: 600; margin: 5px 0; }
    .nudge { color: var(--zoe-green); margin: 5px 0; font-size: 0.95rem; }
    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.86rem;
      color: var(--text-muted);
    }
    .footer p { margin-bottom: 10px; }
    .footer button { margin-right: 14px; }
    .footer-tools { display: flex; flex-wrap: wrap; gap: 14px; }

    /* Form surfaces */
    .form-shell { max-width: 720px; margin: 0 auto; }
    .screen-kicker { color: var(--zoe-purple); font-weight: 650; margin-bottom: 8px; letter-spacing: -0.02em; }
    .screen-subtitle { color: var(--text-muted); font-size: 1.05rem; margin-bottom: 28px; }
    .form-grid { display: grid; gap: 16px; }
    .field-card, .donation-line, .custom-extra-line, .core-preview {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 18px;
      box-shadow: var(--shadow-soft);
    }
    label {
      display: block;
      margin: 0 0 7px;
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 650;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    input[type="text"], input[type="number"], input[type="date"], select {
      width: 100%;
      padding: 15px 16px;
      font-size: 1.05rem;
      font-family: inherit;
      border: 1px solid var(--border-strong);
      border-radius: 13px;
      background: #fff;
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(20,20,20,0.02);
    }
    input[type="number"] { font-variant-numeric: tabular-nums; }
    input:focus, select:focus {
      outline: 3px solid rgba(95,67,178,0.18);
      border-color: var(--zoe-purple);
    }
    .primary-number {
      font-size: clamp(2.4rem, 5vw, 4.2rem) !important;
      font-weight: 650;
      color: var(--zoe-purple) !important;
      text-align: center;
      letter-spacing: -0.055em;
      padding: 18px !important;
    }
    .row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; align-items: end; margin-bottom: 12px; }
    .actions { display: flex; flex-direction: column; gap: 12px; margin: 24px 0 0; }
    .btn {
      display: block;
      width: 100%;
      padding: 18px 24px;
      font-size: 1.08rem;
      font-family: inherit;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.15s, transform 0.12s;
      font-weight: 650;
    }
    .btn:hover { opacity: 0.94; transform: translateY(-1px); }
    .btn-primary { background: var(--text); color: #fff; }
    .btn-secondary { background: var(--surface-solid); color: var(--text); border: 1px solid var(--border-strong); }
    .btn-deliver { background: var(--zoe-blue); color: #fff; }
    .btn-small {
      padding: 10px 14px;
      font-size: 0.92rem;
      width: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-solid);
      border: 1px solid var(--border-strong);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      margin-right: 8px;
      font-family: inherit;
    }
    .btn-undo { background: #8B7355; color: #fff; margin-top: 12px; }
    .advanced-section {
      margin-top: 16px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      overflow: visible;
    }
    .advanced-section[open] {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.62);
      overflow: hidden;
    }
    .advanced-section > summary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 15px;
      cursor: pointer;
      color: var(--zoe-purple);
      font-weight: 650;
      list-style: none;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: var(--surface-solid);
      box-shadow: 0 1px 4px rgba(20, 16, 32, 0.06);
      font-size: 0.92rem;
    }
    .advanced-section[open] > summary {
      margin: 14px 18px 8px;
    }
    .advanced-section > summary::-webkit-details-marker { display: none; }
    .advanced-body { padding: 0 18px 18px; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
    }
    .toggle-row label { margin: 0; flex: 1; color: var(--text); text-transform: none; font-size: 1rem; letter-spacing: -0.01em; }
    .toggle-btn {
      padding: 9px 18px;
      font-size: 0.95rem;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
      min-width: 70px;
      font-family: inherit;
    }
    .toggle-btn.on { background: var(--zoe-purple); color: #fff; border-color: var(--zoe-purple); }
    .common-extras {
      margin-top: 20px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.62);
    }
    .common-extras h3 {
      margin: 0 0 4px;
      font-size: 1.05rem;
      color: var(--zoe-purple);
    }
    .common-extras .screen-subtitle { margin: 0 0 12px; }
    .add-item-strip {
      margin-top: 20px;
      padding: 14px 0 0;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
    }
    .add-item-strip span { color: var(--text-muted); font-size: 0.95rem; }
    .exceptions-panel > summary { width: 100%; justify-content: flex-start; }
    .exception-section { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
    .exception-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .exception-section h4 { margin: 0 0 12px; font-size: 0.95rem; color: var(--zoe-purple); font-weight: 650; }
    .toggle-label-col { flex: 1; }
    .toggle-label-col label { display: block; }
    .optional-stock-warn { color: #A13A34; font-size: 0.88rem; margin-top: 4px; font-weight: 600; }
    .optional-stock-hint { color: var(--text-muted); font-size: 0.86rem; margin-top: 4px; }
    select optgroup { font-weight: 650; color: var(--text-muted); font-style: normal; }
    .banner, .error {
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }
    .banner { background: #FFF8E7; border: 1px solid #E8D5A0; }
    .banner-draft { background: #FFF0F0; border-color: #E8A0A0; }
    .error { color: #8B1E16; background: #FFF0F0; border: 1px solid #E9B2AE; }
    .field-error { color: #A13A34; font-size: 0.92rem; margin: 6px 0 10px; }
    input.field-error-input, select.field-error-input { border-color: #A13A34; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .tab {
      padding: 14px;
      border: 1px solid var(--border-strong);
      background: #fff;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .tab.active { border-color: var(--zoe-purple); background: rgba(95,67,178,0.08); font-weight: 650; color: var(--zoe-purple-dark); }
    .shortcut-btns { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 16px; }
    .shortcut-btns button { padding: 10px 14px; font-size: 0.92rem; background: rgba(95,67,178,0.06); border: 1px solid rgba(95,67,178,0.24); border-radius: 999px; cursor: pointer; font-family: inherit; }
    .stock-fold summary { cursor: pointer; color: var(--text-muted); margin-top: 12px; }
    .stock-list { font-size: 0.9rem; color: var(--text-muted); max-height: 360px; overflow-y: auto; margin-top: 8px; }
    .hidden { display: none !important; }
    .donor-hint { color: var(--text-muted); font-size: 0.9rem; margin: 6px 0 12px; }
    #import-file { display: none; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(20,20,20,0.42); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
    .modal { background: #fff; border-radius: 24px; padding: 28px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow); }
    .modal h2 { margin-top: 0; font-size: 2rem; }
    .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
    .modal-actions .btn { flex: 1; }
    @media (max-width: 700px) {
      .wrap { width: min(100vw - 22px, 980px); padding-top: 12px; }
      .view-content { padding: 24px 18px; border-radius: 22px; }
      .app-header { grid-template-columns: auto 1fr auto; }
      .header-logo { height: 44px; }
      .app-header--home .header-logo { height: 56px; }
      .header-date { font-size: 0.8rem; }
      .view-content--home { padding: 28px 18px 24px; }
      .home-screen { min-height: auto; }
      .home-question { margin-bottom: 32px; }
      .home-more-wrap { margin-top: 36px; }
      .home-action-btn { min-height: 82px; font-size: 1.28rem; padding: 18px; grid-template-columns: 46px 1fr auto; }
      .home-action-icon { width: 46px; height: 46px; border-radius: 15px; }
      .row { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>
  <div class="wrap" id="app"></div>
  <input type="file" id="import-file" accept=".json,application/json">

  <script>
  // ═══════════════════════════════════════════════════════════════════
  // CONFIG — edit here for items, recipes, clinics, thresholds
  // ═══════════════════════════════════════════════════════════════════

  const PACKERS = ["Janet", "Judy", "Milan"];

  const CLINICS = ["Retreat", "Mowbray", "Gugulethu", "Mitchell's Plain", "Zimbabwe"];

  const COMPLETE_UNIT_ITEMS = ["nappy-bags", "avo-packs", "lions-packs"];

  const PACK_CATEGORY_ORDER = {
    momPack: ["Moms", "Baby Products", "Miscellaneous", "Baby Clothes", "Blankets", "Toys"],
    babyPack: ["Baby Clothes", "Baby Products", "Blankets", "Toys", "Miscellaneous", "Moms"],
  };

  const PACK_STOCK_SHORTCUTS = {
    momPack: ["pads", "face-cloths", "toothbrush"],
    babyPack: ["baby-gro", "vest", "leggings"],
  };

  // Optional extras only: stock must exceed threshold × this before "Use-it-up" nudges
  const SURPLUS_NUDGE_MULTIPLIER = 2;

  function item(id, name, category, unit, threshold, extra = {}) {
    return { id, name, category, unit, threshold, ...extra };
  }

  const ITEMS = [
    // Baby Clothes
    item("baby-gro", "Baby Gro", "Baby Clothes", "each", 15, { fastCount: true }),
    item("vest", "Vest", "Baby Clothes", "each", 20, { fastCount: true }),
    item("socks", "Socks", "Baby Clothes", "each", 15),
    item("cotton-hat", "Cotton Hat", "Baby Clothes", "each", 10),
    item("leggings", "Leggings", "Baby Clothes", "each", 15, { fastCount: true }),
    item("fleece-gro", "Fleece Gro", "Baby Clothes", "each", 15),
    item("shorts", "Shorts", "Baby Clothes", "each", 10),
    item("t-shirts", "T-Shirts", "Baby Clothes", "each", 10),
    item("dress", "Dress", "Baby Clothes", "each", 8),
    item("skirt", "Skirt", "Baby Clothes", "each", 8),
    item("preemie", "Preemie", "Baby Clothes", "each", 8),
    item("bits-n-bobs", "Bits 'n Bobs", "Baby Clothes", "each", 5),
    item("jerseys", "Jerseys", "Baby Clothes", "each", 20),
    item("mother-teresa", "Mother Teresa", "Baby Clothes", "each", 8),
    item("knit-legs", "Knit Legs", "Baby Clothes", "each", 8),
    item("knit-gro", "Knit Gro", "Baby Clothes", "each", 8),
    item("xmas", "Xmas", "Baby Clothes", "each", 5),
    item("extra-0-3", "0–3 Extra", "Baby Clothes", "each", 15),
    item("extra-3-6", "3–6 Extra", "Baby Clothes", "each", 15),
    item("extra-6-9", "6–9 Extra", "Baby Clothes", "each", 15),
    item("boy-summer-extra", "Boy Summer Extra", "Baby Clothes", "each", 10, { seasonal: true, season: "summer", gender: "boy" }),
    item("girl-summer-extra", "Girl Summer Extra", "Baby Clothes", "each", 10, { seasonal: true, season: "summer", gender: "girl" }),
    item("neutral-summer-extra", "Neutral Summer Extra", "Baby Clothes", "each", 10, { seasonal: true, season: "summer", gender: "neutral" }),
    item("boy-winter-extra", "Boy Winter Extra", "Baby Clothes", "each", 10, { seasonal: true, season: "winter", gender: "boy" }),
    item("girl-winter-extra", "Girl Winter Extra", "Baby Clothes", "each", 10, { seasonal: true, season: "winter", gender: "girl" }),

  function recipeItemIds(packKey) {
    const recipe = RECIPES[packKey];
    const ids = recipe.core.map(c => c.itemId);
    recipe.optional.forEach(opt => { if (opt.itemId) ids.push(opt.itemId); });
    return ids;
  }

  function packItemIdsForSubstitution(packKey, optionalIncluded, customExtras) {
    const recipe = RECIPES[packKey];
    const ids = recipe.core.map(c => c.itemId);
    recipe.optional.forEach(opt => {
      const key = opt.itemId || opt.id;
      if (optionalIncluded.includes(key) && opt.itemId) ids.push(opt.itemId);
    });
    (customExtras || []).forEach(e => { if (e.itemId) ids.push(e.itemId); });
    return [...new Set(ids)];
  }

  function categoryRank(packKey, category) {
    const order = PACK_CATEGORY_ORDER[packKey] || [];
    const idx = order.indexOf(category);
    return idx === -1 ? 99 : idx;
  }

  function sortItemsForPack(packKey, opts = {}) {
    const recipeIds = new Set(opts.recipeFirst ? recipeItemIds(packKey) : []);
    return [...ITEMS].sort((a, b) => {
      const aRecipe = recipeIds.has(a.id) ? 0 : 1;
      const bRecipe = recipeIds.has(b.id) ? 0 : 1;
      if (aRecipe !== bRecipe) return aRecipe - bRecipe;
      const aCat = categoryRank(packKey, a.category);
      const bCat = categoryRank(packKey, b.category);
      if (aCat !== bCat) return aCat - bCat;
      return a.name.localeCompare(b.name);
    });
  }

  function sortCategoriesForPack(categories, packKey) {
    return [...categories].sort((a, b) => {
      const diff = categoryRank(packKey, a) - categoryRank(packKey, b);
      return diff !== 0 ? diff : a.localeCompare(b);
    });
  }

  function itemOptionLabel(item, opts = {}) {
    let label = opts.grouped ? item.name : `${item.category} — ${item.name}`;
    if (opts.showBalance) label += ` (currently ${getBalance(item.id)})`;
    return label;
  }

  function itemOptionHtml(item, selectedId, opts = {}) {
    return `<option value="${item.id}" ${selectedId === item.id ? "selected" : ""}>${esc(itemOptionLabel(item, opts))}</option>`;
  }

  function itemOptions(selectedId, packKey, opts = {}) {
    const pk = packKey || getPackContext();
    let items = sortItemsForPack(pk, { recipeFirst: !!opts.recipeFirst });
    if (opts.limitToIds) {
      const allowed = new Set(opts.limitToIds);
      if (selectedId && !allowed.has(selectedId)) allowed.add(selectedId);
      items = items.filter(i => allowed.has(i.id));
    }
    if (!opts.grouped) {
      return items.map(i => itemOptionHtml(i, selectedId, opts)).join("");
    }
    const recipeIds = opts.recipeFirst ? new Set(recipeItemIds(pk)) : new Set();
    const recipeItems = items.filter(i => recipeIds.has(i.id));
    const otherItems = items.filter(i => !recipeIds.has(i.id));

  function normalizeSubstitutions(substitutions) {
    return (substitutions || []).map(s => ({
      insteadOf: s.insteadOf,
      substitute: s.substitute,
      packCount: Math.max(0, parseInt(s.packCount, 10) || 0),
      qtyPerPack: Math.max(1, parseInt(s.qtyPerPack, 10) || 1),
    })).filter(s => s.insteadOf && s.substitute && s.insteadOf !== s.substitute && s.packCount > 0);
  }

  function normalizeOmissions(omissions) {
    return (omissions || []).map(o => ({
      itemId: o.itemId,
      packCount: Math.max(0, parseInt(o.packCount, 10) || 0),
      qtyPerPack: Math.max(1, parseInt(o.qtyPerPack, 10) || 1),
    })).filter(o => o.itemId && o.packCount > 0);
  }

  function recipeQtyPerPack(packKey, itemId, optionalIncluded, customExtras) {
    const recipe = RECIPES[packKey];
    const core = recipe.core.find(c => c.itemId === itemId);
    if (core) return core.qty;
    if (optionalIncluded.includes(itemId)) return 1;
    const extra = (customExtras || []).find(e => e.itemId === itemId);
    if (extra) return parseInt(extra.qtyPerPack, 10) || 1;
    return 1;
  }

  function computeBuildStockPlan(packKey, qty, optionalIncluded, customExtras, substitutions, omissions) {
    const recipe = RECIPES[packKey];
    const usage = {};
    const subs = normalizeSubstitutions(substitutions);
    const omits = normalizeOmissions(omissions);
    const subPacksSubstitute = {};

    for (const c of recipe.core) {
      usage[c.itemId] = (usage[c.itemId] || 0) + c.qty * qty;
    }
    for (const opt of recipe.optional) {
      const key = opt.itemId || opt.id;
      if (!optionalIncluded.includes(key)) continue;
      if (!opt.decrement || !opt.itemId) continue;
      usage[opt.itemId] = (usage[opt.itemId] || 0) + qty;
    }
    for (const extra of customExtras || []) {
      const perPack = parseInt(extra.qtyPerPack, 10) || 1;
      usage[extra.itemId] = (usage[extra.itemId] || 0) + perPack * qty;
    }

    for (const s of subs) {
      subPacksSubstitute[s.substitute] = (subPacksSubstitute[s.substitute] || 0) + s.packCount;
      const origPerPack = recipeQtyPerPack(packKey, s.insteadOf, optionalIncluded, customExtras);
      usage[s.insteadOf] = (usage[s.insteadOf] || 0) - s.packCount * origPerPack;
      usage[s.substitute] = (usage[s.substitute] || 0) + s.packCount * s.qtyPerPack;
    }

    for (const o of omits) {
      const perPack = recipeQtyPerPack(packKey, o.itemId, optionalIncluded, customExtras);
      usage[o.itemId] = (usage[o.itemId] || 0) - o.packCount * perPack;
    }

    for (const opt of recipe.optional) {
      const key = opt.itemId || opt.id;
      if (!optionalIncluded.includes(key)) continue;
      if (!opt.decrement || !opt.itemId) continue;
      // De-dup only the substitute side: when an included optional is itself used
      // as a substitute, those packs already counted it via the substitute add above.
      // The insteadOf side is already removed in the substitution loop, so re-removing
      // it here would double-subtract and under-deduct the optional (overstating stock).
      const skip = Math.min(qty, (subPacksSubstitute[key] || 0));
      if (skip > 0) usage[key] = (usage[key] || 0) - skip;
    }

    for (const id of Object.keys(usage)) {
      if (usage[id] < 0) usage[id] = 0;
    }
    return { usage, subs, omits };
  }

  function getSubstitutionLineErrors(qty, substitutions) {
    const lineErrors = {};
    const insteadTotals = {};
    (substitutions || []).forEach((raw, idx) => {
      const packCount = parseInt(raw.packCount, 10);
      const hasPackCount = raw.packCount !== "" && raw.packCount !== undefined && !isNaN(packCount) && packCount > 0;
      if (raw.insteadOf && raw.substitute && raw.insteadOf === raw.substitute) {
        lineErrors[idx] = "Pick two different items.";
        return;
      }
      if (!hasPackCount) return;
      if (!qty || qty < 1) {
        lineErrors[idx] = "Enter how many packs you built first (at the top).";
        return;
      }
      if (packCount > qty) {
        lineErrors[idx] = qty === 1
          ? "You only built 1 pack — enter 1 here."
          : `You only built ${qty} packs — enter ${qty} or less here.`;
      }
      if (raw.insteadOf) {
        insteadTotals[raw.insteadOf] = (insteadTotals[raw.insteadOf] || 0) + packCount;
      }
    });
    Object.entries(insteadTotals).forEach(([id, total]) => {
      if (qty > 0 && total > qty) {
        (substitutions || []).forEach((raw, idx) => {
          if (raw.insteadOf === id && !lineErrors[idx]) {
            lineErrors[idx] = qty === 1
              ? "You only built 1 pack — the total here can't be more than 1."
              : `You only built ${qty} packs — the total for ${itemName(id)} can't be more than ${qty}.`;
          }
        });
      }
    });
    return lineErrors;
  }

  function validateSubstitutions(qty, substitutions) {
    return Object.values(getSubstitutionLineErrors(qty, substitutions));
  }

  function substitutionsForPreview(qty, substitutions) {
    const lineErrors = getSubstitutionLineErrors(qty, substitutions);
    return (substitutions || []).filter((_, idx) => !lineErrors[idx]);
  }

  function formatBuildPreview(packKey, qty, included, customExtras, substitutions, compact, omissions) {
    const recipe = RECIPES[packKey];
    const subs = normalizeSubstitutions(substitutionsForPreview(qty, substitutions));
    const omits = normalizeOmissions(omissions);
    const { usage } = computeBuildStockPlan(packKey, qty, included, customExtras, subs, omissions);

    let html = "";

    if (!compact && !subs.length) {
      const perPack = [];
      recipe.core.forEach(c => perPack.push(`${c.qty} ${itemName(c.itemId)}`));
      recipe.optional.forEach(opt => {
        const key = opt.itemId || opt.id;
        if (!included.includes(key)) return;
        if (opt.decrement && opt.itemId) perPack.push(`1 ${itemName(opt.itemId)}`);
        else if (!opt.decrement) perPack.push(`${opt.label || itemName(opt.itemId)} (not tracked)`);
      });
      (customExtras || []).forEach(e => {
        const n = parseInt(e.qtyPerPack, 10) || 1;
        perPack.push(`${n} ${itemName(e.itemId)}`);
      });
      html += `<p style="margin:0 0 6px;color:#555;font-size:0.9rem;"><strong>Each pack:</strong> ${perPack.join(" · ")}</p>`;
    }

    if (subs.length || omits.length) {
      html += `<p style="margin:${compact ? "0" : "10px"} 0 6px;color:#555;font-size:0.9rem;"><strong>Changes:</strong></p>`;
      subs.forEach(s => {
        html += `${s.packCount} pack${s.packCount !== 1 ? "s" : ""} used ${s.qtyPerPack} ${esc(itemName(s.substitute))} instead of ${esc(itemName(s.insteadOf))}<br>`;
      });
      omits.forEach(o => {
        html += `${o.packCount} pack${o.packCount !== 1 ? "s" : ""} left out ${esc(itemName(o.itemId))}<br>`;
      });
    }

    html += `<p style="margin:${compact || subs.length ? "10px" : "12px"} 0 6px;"><strong>From the shelf (${qty} pack${qty !== 1 ? "s" : ""}):</strong></p>`;

    const seen = new Set();
    const shelfLines = [];
    const addShelf = (id) => {
      const n = usage[id] || 0;
      if (n > 0 && !seen.has(id)) {
        seen.add(id);
        shelfLines.push(`${n} × ${itemName(id)}`);
      }
    };
    recipe.core.forEach(c => addShelf(c.itemId));
    recipe.optional.forEach(opt => {
      if (opt.itemId && opt.decrement) addShelf(opt.itemId);
    });
    (customExtras || []).forEach(e => addShelf(e.itemId));
    subs.forEach(s => addShelf(s.substitute));
    Object.keys(usage).forEach(id => addShelf(id));

    html += shelfLines.join("<br>") || "—";
    return html;
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        ITEMS.forEach(i => {
          if (parsed.balances[i.id] === undefined) parsed.balances[i.id] = 0;
        });
        if (!parsed.readyPacks) parsed.readyPacks = { momPack: 0, babyPack: 0 };
        if (!parsed.transactions) parsed.transactions = [];
        if (!parsed.packContext) parsed.packContext = "momPack";
        if (parsed.lastSelectedPacker === undefined) parsed.lastSelectedPacker = "";
        // Migrate single-slot undo (undoSnapshot) to the multi-level undo stack.
        if (!Array.isArray(parsed.undoStack)) {
          parsed.undoStack = parsed.undoSnapshot ? [parsed.undoSnapshot] : [];
        }
        delete parsed.undoSnapshot;
        if (!parsed.donors || !parsed.donors.length) {
          parsed.donors = extractDonorsFromTransactions(parsed.transactions);
        }
        return parsed;
      }
    } catch (e) { /* no-op */ }
    const seeded = buildSyntheticState();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded)); } catch (e) { /* no-op */ }
    return seeded;

  function getSeason() {
    const m = new Date().getMonth();
    if (m >= 11 || m <= 2) return "summer";
    if (m >= 5 && m <= 8) return "winter";
    return "shoulder";
  }

  function isOutOfSeason(item) {
    if (!item.seasonal) return false;
    const s = getSeason();
    if (s === "shoulder") return false;
    return item.season !== s;
  }

  function getBalance(id) {
    return state.balances[id] ?? 0;
  }

  function buildableCount(packKey) {
    const recipe = RECIPES[packKey];
    let min = Infinity;
    for (const c of recipe.core) {
      const stock = getBalance(c.itemId);
      const n = Math.floor(stock / c.qty);
      if (n < min) min = n;
    }
    return min === Infinity ? 0 : min;
  }

  function getLowStock() {
    return ITEMS.filter(i => {
      if (isOutOfSeason(i)) return false;
      return getBalance(i.id) < i.threshold;
    });
  }

  function getSurplusNudges() {
    const nudges = [];
    for (const packKey of ["momPack", "babyPack"]) {
      const recipe = RECIPES[packKey];
      for (const opt of recipe.optional) {
        if (!opt.surplusDriven || !opt.itemId) continue;
        const it = itemMap[opt.itemId];
        if (it && getBalance(it.id) > it.threshold * SURPLUS_NUDGE_MULTIPLIER) {
          if (!nudges.find(n => n.item.id === it.id)) {
            nudges.push({
              item: it,
              packLabel: recipe.label,
              label: opt.label || it.name,
            });
          }
        }
      }
    }
    return nudges;
  }

  function analyticsId(prefix) {
    return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
  }

  function analyticsUpgradeState(st) {
    if (!st.analytics) st.analytics = {};
    if (!st.analytics.schemaVersion) st.analytics.schemaVersion = ANALYTICS_SCHEMA_VERSION;
    if (!st.analytics.installId) st.analytics.installId = analyticsId("install");
    if (!Array.isArray(st.analytics.events)) st.analytics.events = [];
    if (!st.analytics.firstSeenAt) st.analytics.firstSeenAt = new Date().toISOString();
    if (typeof st.analytics.recordingEnabled !== "boolean") st.analytics.recordingEnabled = true;
    st.analytics.lastSeenAt = new Date().toISOString();
    return st;
  }

  function analyticsSafeText(text, max = 80) {
    return String(text || "").replace(/\s+/g, " ").trim().slice(0, max);
  }

  function analyticsHash(str) {
    str = String(str || "");
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
    }
    return (h >>> 0).toString(16);
  }

  function analyticsElementMeta(el) {
    if (!el) return {};
    const label = el.getAttribute("aria-label") || el.innerText || el.value || el.placeholder || "";
    return {
      tag: el.tagName ? el.tagName.toLowerCase() : "",
      id: el.id || "",
      name: el.name || "",
      type: el.type || "",
      classes: el.className && typeof el.className === "string" ? el.className.split(/\s+/).filter(Boolean).slice(0, 5) : [],
      text: analyticsSafeText(label, 60),
      dataGo: el.dataset?.go || "",
      dataTrackExposure: el.getAttribute("data-track-exposure") || "",
      dataExposureLabel: el.getAttribute("data-exposure-label") || "",
    };
  }

  function analyticsFieldName(el) {
    if (!el) return "unknown";
    if (el.id) return el.id;
    if (el.name) return el.name;
    if (el.className && typeof el.className === "string") return el.className.split(/\s+/).filter(Boolean)[0] || "unknown";
    return el.tagName ? el.tagName.toLowerCase() : "unknown";
  }

  function analyticsFieldValue(el) {
    const type = el.type || el.tagName?.toLowerCase();
    const raw = el.value ?? "";
    if (type === "number") return { valueType: "number", value: raw === "" ? "" : Number(raw) };
    if (type === "date") return { valueType: "date", value: raw };
    if (el.tagName?.toLowerCase() === "select") return { valueType: "select", value: raw };
    if (type === "checkbox" || type === "radio") return { valueType: type, checked: !!el.checked, value: raw };
    return { valueType: "text", length: String(raw).length, hash: analyticsHash(raw), empty: !String(raw).trim() };
  }

  function analyticsOperationalSnapshot() {
    return {
      view,
      transactionCount: state.transactions.length,
      readyPacks: { ...state.readyPacks },
      buildable: { momPack: buildableCount("momPack"), babyPack: buildableCount("babyPack") },
      lowStockCount: getLowStock().length,
      donorCount: getDonors().length,
    };
  }

  function analyticsTrack(event, details = {}, opts = {}) {
    try {
      state = analyticsUpgradeState(state);
      if (state.analytics.recordingEnabled === false && !details.forceRecord) return;
      const eventView = opts.viewOverride || view;
      let episodeId = opts.interactionEpisodeId || null;
      let episodeCtrl = null;
      if (event !== "interaction_episode_complete") {
        episodeCtrl = analyticsEpisodeResolveControl(details, eventView);
        if (episodeCtrl) {
          analyticsEpisodeBegin(episodeCtrl.screen, episodeCtrl.controlId, episodeCtrl.label);
          if (!episodeId) episodeId = analyticsEpisodeActiveId(episodeCtrl.screen, episodeCtrl.controlId);
        }
        analyticsEpisodeObserveEvent(event, details, eventView);
      }
      const userFields = ANALYTICS_USER_EVENTS.has(event) ? analyticsUserFields() : {};
      const e = {
        eventId: analyticsId("evt"),
        timestamp: new Date().toISOString(),
        sessionId: ANALYTICS_SESSION_ID || "session_pending",
        installId: state.analytics.installId,
        event,
        view: eventView,
        flowId: analyticsCurrentFlow?.id || "",
        flow: analyticsCurrentFlow?.flow || "",
        ...(episodeId ? { interactionEpisodeId: episodeId } : {}),
        details,
        ...userFields,
      };
      state.analytics.events.push(e);
      if (state.analytics.events.length > ANALYTICS_MAX_EVENTS) {
        state.analytics.events.splice(0, state.analytics.events.length - ANALYTICS_MAX_EVENTS);
      }
      state.analytics.lastSeenAt = e.timestamp;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (err) { /* keep app usable */ }
    } catch (err) { /* analytics must never break the app */ }
  }

  function setAnalyticsRecording(enabled) {
    state = analyticsUpgradeState(state);
    state.analytics.recordingEnabled = !!enabled;
    state.analytics.recordingChangedAt = new Date().toISOString();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (err) { /* keep app usable */ }
    render();
  }

  function analyticsEventsForDate(dateISO) {
    state = analyticsUpgradeState(state);
    return (state.analytics.events || []).filter(e => String(e.timestamp || "").slice(0, 10) === dateISO);
  }

  function clearAnalyticsForDate(dateISO) {
    state = analyticsUpgradeState(state);
    if (!dateISO) { alert("Choose a date first."); return; }
    const before = state.analytics.events.length;
    const matching = analyticsEventsForDate(dateISO).length;
    if (!matching) { alert(`No analytics events found for ${dateISO}.`); return; }
    if (!confirm(`Delete ${matching} analytics event${matching === 1 ? "" : "s"} from ${dateISO}? This will not delete donations, packs, deliveries, stock, or backup data.`)) return;
    state.analytics.events = state.analytics.events.filter(e => String(e.timestamp || "").slice(0, 10) !== dateISO);
    state.analytics.lastClearedAt = new Date().toISOString();
    state.analytics.lastClearedDate = dateISO;
    state.analytics.lastClearedCount = before - state.analytics.events.length;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (err) { /* keep app usable */ }
    alert(`Deleted ${state.analytics.lastClearedCount} analytics event${state.analytics.lastClearedCount === 1 ? "" : "s"} from ${dateISO}.`);
    render();
  }

  function analyticsStartFlow(flowName, source = "navigation") {
    analyticsCurrentFlow = { id: analyticsId("flow"), flow: flowName, startedAt: Date.now(), source };
    analyticsTrack("flow_start", { flow: flowName, source, snapshot: analyticsOperationalSnapshot() });
  }

  function analyticsCompleteFlow(result = {}) {
    if (!analyticsCurrentFlow) return;
    const durationMs = Date.now() - analyticsCurrentFlow.startedAt;
    analyticsTrack("flow_complete", { flow: analyticsCurrentFlow.flow, durationMs, result });
    analyticsCurrentFlow = null;
  }

  function analyticsAbandonFlow(reason = "navigation") {
    if (!analyticsCurrentFlow) return;
    const durationMs = Date.now() - analyticsCurrentFlow.startedAt;
    analyticsTrack("flow_abandoned", { flow: analyticsCurrentFlow.flow, durationMs, reason, formPreview: analyticsFormPreview() });
    analyticsCurrentFlow = null;
  }

  function analyticsFormPreview() {
    const preview = {};
    try {
      Object.entries(form || {}).forEach(([k, v]) => {
        if (v == null) return;
        if (typeof v === "string" || typeof v === "number" || typeof v === "boolean") preview[k] = v;
        else if (Array.isArray(v)) preview[k] = { type: "array", length: v.length };
        else if (typeof v === "object") preview[k] = { type: "object", keys: Object.keys(v).slice(0, 12) };
      });
    } catch (e) { /* no-op */ }
    return preview;
  }

  function analyticsAfterRender() {
    if (analyticsCurrentView !== view) {
      analyticsExposureFlushScreenExit();
      analyticsEpisodeCompleteAllForScreen(analyticsCurrentView, "navigation");
      if (analyticsCurrentView) {
        analyticsTrack("screen_exit", { from: analyticsCurrentView, durationMs: Date.now() - analyticsViewEnteredAt });
      }
      analyticsCurrentView = view;
      analyticsViewEnteredAt = Date.now();
      analyticsTrack("screen_view", { screen: view, snapshot: analyticsOperationalSnapshot() });
    }

    if (errorMsg) {
      const sig = `${view}|${errorMsg}`;
      if (sig !== analyticsLastErrorSignature) {
        analyticsTrack("error_shown", { message: errorMsg, formPreview: analyticsFormPreview() });
        analyticsLastErrorSignature = sig;
        analyticsLastErrorMessage = errorMsg;
      }
    } else {
      if (analyticsLastErrorSignature) {
        analyticsTrack("error_resolved", { previousMessage: analyticsLastErrorMessage || analyticsLastErrorSignature, formPreview: analyticsFormPreview() });
      }
      analyticsLastErrorSignature = "";
      analyticsLastErrorMessage = "";
    }

    analyticsExposureBind();
    analyticsEpisodeTimeoutSweep();
  }

  function analyticsExposureKeyFrom(controlId, screen) {
    return `${screen}|${controlId}`;
  }

  function analyticsExposureKey(el) {
    const controlId = el.getAttribute("data-track-exposure");
    if (!controlId) return "";
    return analyticsExposureKeyFrom(controlId, analyticsExposureScreen());
  }

  function analyticsExposureLabel(el) {
    const controlId = el.getAttribute("data-track-exposure");
    const attr = el.getAttribute("data-exposure-label");
    if (attr) return attr;
    return EXPOSURE_CONTROL_LABELS[controlId] || analyticsSafeText(el.textContent, 80);
  }

  function analyticsExposureTotalMs(entry, now) {
    if (!entry) return 0;
    now = now || Date.now();
    const stint = entry.visibleSince ? now - entry.visibleSince : 0;
    return (entry.accumulatedMs || 0) + stint;
  }

  function analyticsExposureScreen() {
    return analyticsCurrentView || view;
  }

  function analyticsTrackControlExposure(entry, visibleMs, clicked) {
    analyticsTrack("ui_exposure", {
      screen: entry.screen,
      controlId: entry.controlId,
      label: entry.label,
      visibleMs,
      clicked: !!clicked,
    }, { viewOverride: entry.screen });
  }

  function analyticsExposureFlush(controlId, clicked, screenOverride) {
    const screen = screenOverride || view;
    const key = analyticsExposureKeyFrom(controlId, screen);
    const entry = analyticsExposurePending.get(key);
    if (!entry || entry.flushed) return;
    const visibleMs = analyticsExposureTotalMs(entry);
    if (visibleMs < EXPOSURE_MIN_VISIBLE_MS) {
      entry.visibleSince = null;
      entry.accumulatedMs = 0;
      return;
    }
    entry.flushed = true;
    analyticsTrackControlExposure(entry, visibleMs, clicked);
    analyticsExposurePending.delete(key);
  }

  function analyticsExposureFlushScreenExit() {
    const exitingScreen = analyticsCurrentView;
    if (!exitingScreen) return;
    const toDelete = [];
    analyticsExposurePending.forEach((entry, key) => {
      if (entry.screen !== exitingScreen || entry.flushed) return;
      const visibleMs = analyticsExposureTotalMs(entry);
      if (visibleMs >= EXPOSURE_MIN_VISIBLE_MS) {
        entry.flushed = true;
        analyticsTrackControlExposure(entry, visibleMs, false);
      }
      toDelete.push(key);
    });
    toDelete.forEach(k => analyticsExposurePending.delete(k));
  }

  function analyticsExposureOnIntersect(entries) {
    const now = Date.now();
    entries.forEach(ioEntry => {
      const el = ioEntry.target;
      const controlId = el.getAttribute("data-track-exposure");
      if (!controlId) return;
      const screen = analyticsExposureScreen();
      const key = analyticsExposureKeyFrom(controlId, screen);
      if (ioEntry.isIntersecting && ioEntry.intersectionRatio > 0) {
        let entry = analyticsExposurePending.get(key);
        if (!entry || entry.flushed) {
          entry = {
            el,
            controlId,
            label: analyticsExposureLabel(el),
            screen,
            visibleSince: now,
            accumulatedMs: 0,
            flushed: false,
          };
        } else {
          entry.el = el;
          if (!entry.visibleSince) entry.visibleSince = now;
          if (!entry.label) entry.label = analyticsExposureLabel(el);
        }
        analyticsExposurePending.set(key, entry);
        const ep = analyticsEpisodeBegin(screen, controlId, entry.label, el);
        if (ep) {
          if (!ep.visibleSince) ep.visibleSince = now;
          const ratio = ioEntry.intersectionRatio;
          if (ratio > ep.maxVisibility) ep.maxVisibility = ratio;
          ep.el = el;
        }
      } else {
        const entry = analyticsExposurePending.get(key);
        if (!entry || entry.flushed) return;
        if (entry.el && entry.el !== el) return;
        const visibleMs = analyticsExposureTotalMs(entry, now);
        const ep = analyticsInteractionEpisodes.get(analyticsEpisodeMapKey(entry.screen, controlId));
        if (ep) {
          analyticsEpisodeFinalizeVisibility(ep, now);
          if (ioEntry.intersectionRatio > ep.maxVisibility) ep.maxVisibility = ioEntry.intersectionRatio;
        }
        if (visibleMs >= EXPOSURE_MIN_VISIBLE_MS) {
          entry.flushed = true;
          analyticsTrackControlExposure(entry, visibleMs, false);
        }
        analyticsExposurePending.delete(key);
        if (ep && !ep.clicked) analyticsEpisodeComplete(entry.screen, controlId, "hidden");
      }
    });
  }

  function analyticsExposureOnClick(target) {
    const el = target.closest("[data-track-exposure]");
    if (!el) return;
    const controlId = el.getAttribute("data-track-exposure");
    const key = analyticsExposureKeyFrom(controlId, analyticsExposureScreen());
    let entry = analyticsExposurePending.get(key);
    if (!entry || entry.flushed) {
      entry = {
        el,
        controlId,
        label: analyticsExposureLabel(el),
        screen: analyticsExposureScreen(),
        visibleSince: null,
        accumulatedMs: 0,
        flushed: false,
      };
      analyticsExposurePending.set(key, entry);
    } else {
      entry.el = el;
    }
    const visibleMs = analyticsExposureTotalMs(entry);
    if (visibleMs < EXPOSURE_MIN_VISIBLE_MS) return;
    analyticsExposureFlush(controlId, true, entry.screen);
  }

  function analyticsExposureBindNow() {
    if (analyticsExposureObserver) analyticsExposureObserver.disconnect();
    analyticsExposurePending.forEach(entry => {
      if (entry.flushed) return;
      if (entry.el && !document.contains(entry.el)) entry.el = null;
    });
    analyticsInteractionEpisodes.forEach(ep => {
      if (ep.el && !document.contains(ep.el)) ep.el = null;
    });
    if (typeof IntersectionObserver === "undefined") return;
    analyticsExposureObserver = new IntersectionObserver(analyticsExposureOnIntersect, {
      root: null,
      rootMargin: "0px",
      threshold: 0.01,
    });
    document.querySelectorAll("[data-track-exposure]").forEach(el => analyticsExposureObserver.observe(el));
  }

  function analyticsExposureBind() {
    if (analyticsExposureBindRaf) cancelAnimationFrame(analyticsExposureBindRaf);
    analyticsExposureBindRaf = requestAnimationFrame(() => {
      analyticsExposureBindRaf = 0;
      analyticsExposureBindNow();
    });
  }

  function analyticsExposureEnsureClickListener() {
    if (analyticsExposureClickBound) return;
    analyticsExposureClickBound = true;
    document.addEventListener("click", function(e) {
      const target = e.target.closest("button, summary, a, input, select, textarea, [data-track-exposure]");
      if (!target) return;
      analyticsExposureOnClick(target);
    }, true);
  }

  function analyticsIgnoredVisibleControlsFromEvents(events, opts) {
    opts = opts || {};
    const groups = {};
    (events || []).forEach(e => {
      if (e.event !== "ui_exposure") return;
      const d = e.details || {};
      if (!d.controlId || Number(d.visibleMs) < EXPOSURE_MIN_VISIBLE_MS) return;
      const isTester = !!e.isTesterSession;
      if (opts.productionOnly && isTester) return;
      if (opts.testerOnly && !isTester) return;
      const screen = d.screen || e.view || "unknown";
      const gk = `${screen}|${d.controlId}`;
      if (!groups[gk]) {
        groups[gk] = {
          controlId: d.controlId,
          screen,
          label: d.label || EXPOSURE_CONTROL_LABELS[d.controlId] || d.controlId,
          exposures: 0,
          ignored: 0,
          visibleMsTotal: 0,
        };
      }
      const g = groups[gk];
      g.exposures += 1;
      if (!d.clicked) g.ignored += 1;
      g.visibleMsTotal += d.visibleMs;
      if (d.label) g.label = d.label;
    });
    return Object.values(groups)
      .map(g => ({
        controlId: g.controlId,
        screen: g.screen,
        label: g.label,
        exposures: g.exposures,
        ignored: g.ignored,
        ignoredRate: g.exposures ? Math.round((g.ignored / g.exposures) * 100) / 100 : 0,
        averageVisibleMs: g.exposures ? Math.round(g.visibleMsTotal / g.exposures) : 0,
      }))
      .sort((a, b) => b.ignored - a.ignored || b.exposures - a.exposures);
  }

  // ═══════════════════════════════════════════════════════════════════
  // INTERACTION EPISODES — Phase 3D behavioural layer
  // completionReason: clicked | hidden | navigation | timeout | blurred | cancelled | export
  // export: flushed before Analytics JSON / AI Data Pack export; completed only if already clicked
  // ═══════════════════════════════════════════════════════════════════

  function analyticsEpisodeMapKey(screen, controlId) {
    return `${screen}|${controlId}`;
  }

  function generateInteractionEpisodeId(controlId) {
    analyticsEpisodeSeq += 1;
    const slug = String(controlId || "unknown").replace(/_/g, "").slice(0, 20);
    return `ep_${slug}_${String(analyticsEpisodeSeq).padStart(6, "0")}`;
  }

  function analyticsEpisodeResolveControl(details, eventView) {
    if (!details) return null;
    if (details.controlId) {
      return {
        screen: details.screen || eventView,
        controlId: details.controlId,
        label: details.label || EXPOSURE_CONTROL_LABELS[details.controlId] || details.controlId,
      };
    }
    const target = details.target;
    if (target?.dataTrackExposure) {
      return {
        screen: eventView,
        controlId: target.dataTrackExposure,
        label: target.dataExposureLabel || EXPOSURE_CONTROL_LABELS[target.dataTrackExposure] || target.dataTrackExposure,
      };
    }
    const idKey = target?.id || details.field || "";
    if (idKey && EPISODE_FIELD_ID_MAP[idKey]) {
      const controlId = EPISODE_FIELD_ID_MAP[idKey];
      return {
        screen: eventView,
        controlId,
        label: EXPOSURE_CONTROL_LABELS[controlId] || controlId,
      };
    }
    return null;
  }

  function analyticsEpisodeActiveId(screen, controlId) {
    const ep = analyticsInteractionEpisodes.get(analyticsEpisodeMapKey(screen, controlId));
    return ep ? ep.interactionEpisodeId : null;
  }

  function analyticsEpisodeBegin(screen, controlId, label, el) {
    if (!screen || !controlId) return null;
    const key = analyticsEpisodeMapKey(screen, controlId);
    const now = Date.now();
    let ep = analyticsInteractionEpisodes.get(key);
    if (ep) {
      ep.lastActivity = now;
      if (el) ep.el = el;
      if (label && !ep.label) ep.label = label;
      return ep;
    }
    ep = {
      interactionEpisodeId: generateInteractionEpisodeId(controlId),
      screen,
      controlId,
      label: label || EXPOSURE_CONTROL_LABELS[controlId] || controlId,
      el: el || null,
      startedAt: now,
      lastActivity: now,
      visibleSince: null,
      totalVisibleMs: 0,
      hoverCount: 0,
      clickCount: 0,
      focusCount: 0,
      blurCount: 0,
      changeCount: 0,
      hesitationCount: 0,
      maxVisibility: 0,
      clicked: false,
      focused: false,
      changed: false,
      abandoned: false,
      completed: false,
      completionReason: "",
    };
    analyticsInteractionEpisodes.set(key, ep);
    return ep;
  }

  function analyticsEpisodeTouch(screen, controlId) {
    const ep = analyticsInteractionEpisodes.get(analyticsEpisodeMapKey(screen, controlId));
    if (ep) ep.lastActivity = Date.now();
    return ep;
  }

  function analyticsEpisodeClampVisibleMs(visibleMs, durationMs) {
    const d = Math.max(0, Number(durationMs) || 0);
    return Math.max(0, Math.min(Number(visibleMs) || 0, d));
  }

  function analyticsEpisodeIncrement(screen, controlId, field) {
    const ep = analyticsEpisodeTouch(screen, controlId);
    if (!ep || !field) return ep;
    ep[field] = (ep[field] || 0) + 1;
    return ep;
  }

  function analyticsEpisodeFinalizeVisibility(ep, now) {
    if (!ep || !ep.visibleSince) return;
    const stint = now - ep.visibleSince;
    const maxAllowed = Math.max(0, now - ep.startedAt);
    ep.totalVisibleMs = analyticsEpisodeClampVisibleMs(ep.totalVisibleMs + stint, maxAllowed);
    ep.visibleSince = null;
  }

  function analyticsEpisodeComplete(screen, controlId, reason) {
    const key = analyticsEpisodeMapKey(screen, controlId);
    const ep = analyticsInteractionEpisodes.get(key);
    if (!ep) return;
    const now = Date.now();
    analyticsEpisodeFinalizeVisibility(ep, now);
    const durationMs = Math.max(0, now - ep.startedAt);
    const totalVisibleMs = analyticsEpisodeClampVisibleMs(ep.totalVisibleMs, durationMs);
    const clicked = reason === "clicked" || ep.clicked;
    const completed = clicked;
    const abandoned = !clicked && ["navigation", "timeout", "hidden", "blurred", "cancelled"].includes(reason);
    ep.clicked = clicked;
    ep.completed = completed;
    ep.abandoned = abandoned;
    ep.completionReason = reason;
    analyticsInteractionEpisodes.delete(key);
    const endedAt = new Date(now).toISOString();
    const payload = {
      interactionEpisodeId: ep.interactionEpisodeId,
      episodeModelVersion: EPISODE_MODEL_VERSION,
      screen: ep.screen,
      controlId: ep.controlId,
      label: ep.label,
      startedAt: new Date(ep.startedAt).toISOString(),
      endedAt,
      durationMs,
      totalVisibleMs,
      visibleMs: totalVisibleMs,
      hoverCount: ep.hoverCount,
      clickCount: ep.clickCount,
      focusCount: ep.focusCount,
      blurCount: ep.blurCount,
      changeCount: ep.changeCount,
      hesitationCount: ep.hesitationCount,
      maxVisibility: ep.maxVisibility,
      clicked,
      focused: ep.focused,
      changed: ep.changed,
      abandoned,
      completed,
      completionReason: reason,
    };
    analyticsTrack("interaction_episode_complete", payload, {
      viewOverride: ep.screen,
      interactionEpisodeId: ep.interactionEpisodeId,
    });
  }

  function analyticsEpisodeCompleteAllForScreen(screen, reason) {
    if (!screen) return;
    const pending = [];
    analyticsInteractionEpisodes.forEach(ep => {
      if (ep.screen === screen) pending.push(ep.controlId);
    });
    pending.forEach(controlId => analyticsEpisodeComplete(screen, controlId, reason));
  }

  function analyticsEpisodeTimeoutSweep() {
    const now = Date.now();
    const pending = [];
    analyticsInteractionEpisodes.forEach(ep => {
      if (now - ep.lastActivity >= EPISODE_IDLE_TIMEOUT_MS) {
        pending.push({ screen: ep.screen, controlId: ep.controlId });
      }
    });
    pending.forEach(({ screen, controlId }) => analyticsEpisodeComplete(screen, controlId, "timeout"));
  }

  function analyticsEpisodeFlushForExport() {
    const pending = [];
    analyticsInteractionEpisodes.forEach(ep => {
      pending.push({ screen: ep.screen, controlId: ep.controlId });
    });
    pending.forEach(({ screen, controlId }) => analyticsEpisodeComplete(screen, controlId, "export"));
  }

  function analyticsEpisodeObserveEvent(event, details, eventView) {
    const ctrl = analyticsEpisodeResolveControl(details, eventView);
    if (!ctrl) return;
    const { screen, controlId } = ctrl;
    if (event === "click") {
      const ep = analyticsEpisodeIncrement(screen, controlId, "clickCount");
      if (ep) ep.clicked = true;
      analyticsEpisodeComplete(screen, controlId, "clicked");
    } else if (event === "field_focus") {
      const ep = analyticsEpisodeIncrement(screen, controlId, "focusCount");
      if (ep) ep.focused = true;
    } else if (event === "field_blur") {
      analyticsEpisodeIncrement(screen, controlId, "blurCount");
      analyticsEpisodeComplete(screen, controlId, "blurred");
    } else if (event === "field_change") {
      const ep = analyticsEpisodeIncrement(screen, controlId, "changeCount");
      if (ep) ep.changed = true;
    } else if (event === "details_toggled") {
      const ep = analyticsEpisodeIncrement(screen, controlId, "changeCount");
      if (ep) ep.changed = true;
    } else if (event === "mouse_hesitation") {
      analyticsEpisodeIncrement(screen, controlId, "hesitationCount");
      analyticsEpisodeIncrement(screen, controlId, "hoverCount");
    } else if (event === "ui_exposure" && details.controlId) {
      if (details.clicked) {
        const ep = analyticsEpisodeTouch(screen, controlId);
        if (ep) ep.clicked = true;
      }
    }
  }

  function analyticsInteractionEpisodeSummary(events) {
    const episodes = (events || []).filter(e => e.event === "interaction_episode_complete");
    const avg = vals => vals.length ? Math.round(vals.reduce((a, b) => a + b, 0) / vals.length) : 0;
    const durations = episodes.map(e => Number(e.details?.durationMs) || 0);
    const visibleMs = episodes.map(e => Number(e.details?.totalVisibleMs) || 0);
    const clickCounts = episodes.map(e => Number(e.details?.clickCount) || 0);
    const episodesByScreen = {};
    const byControl = {};
    episodes.forEach(e => {
      const d = e.details || {};
      const screen = d.screen || e.view || "unknown";
      episodesByScreen[screen] = (episodesByScreen[screen] || 0) + 1;
      const cid = d.controlId || "unknown";
      if (!byControl[cid]) {
        byControl[cid] = { controlId: cid, screen, label: d.label || cid, episodes: 0 };
      }
      byControl[cid].episodes += 1;
    });
    const episodeRows = episodes.map(e => {
      const d = e.details || {};
      return {
        interactionEpisodeId: d.interactionEpisodeId || e.interactionEpisodeId,
        screen: d.screen || e.view,
        controlId: d.controlId,
        label: d.label,
        durationMs: Number(d.durationMs) || 0,
        totalVisibleMs: Number(d.totalVisibleMs) || 0,
        completionReason: d.completionReason,
        clicked: !!d.clicked,
        abandoned: !!d.abandoned,
      };
    });
    return {
      episodeModelVersion: EPISODE_MODEL_VERSION,
      episodeCount: episodes.length,
      averageEpisodeDuration: avg(durations),
      averageVisibleMs: avg(visibleMs),
      averageClicks: avg(clickCounts),
      abandonedEpisodes: episodes.filter(e => e.details?.abandoned).length,
      completedEpisodes: episodes.filter(e => e.details?.completed).length,
      timeoutEpisodes: episodes.filter(e => e.details?.completionReason === "timeout").length,
      episodesByScreen,
      topControlsByEpisodes: Object.values(byControl).sort((a, b) => b.episodes - a.episodes).slice(0, 15),
      longestEpisodes: episodeRows.slice().sort((a, b) => b.durationMs - a.durationMs).slice(0, 10),
      shortestEpisodes: episodeRows.filter(r => r.durationMs > 0).sort((a, b) => a.durationMs - b.durationMs).slice(0, 10),
    };
  }

  function analyticsTransactionSummary(tx) {
    const base = { txId: tx.id, type: tx.type, date: tx.date };
    if (tx.type === "donation") {
      return { ...base, donor: tx.donor || "", lineCount: tx.lines?.length || 0, unitsAdded: (tx.lines || []).reduce((a, l) => a + (Number(l.unitsAdded) || 0), 0), items: (tx.lines || []).map(l => ({ itemId: l.itemId, qty: l.qty, unitsAdded: l.unitsAdded })) };
    }
    if (tx.type === "build") {
      return { ...base, packKey: tx.packKey, qty: tx.qty, packer: tx.packer, destination: tx.destination, optionalIncluded: tx.optionalIncluded || [], customExtraCount: tx.customExtras?.length || 0, substitutionCount: tx.substitutions?.length || 0, omissionCount: tx.omissions?.length || 0, isTesterUser: isTesterUser(tx.packer) };
    }
    if (tx.type === "deliver") {
      return { ...base, deliverType: tx.deliverType, destination: tx.destination, packKey: tx.packKey || "", itemId: tx.itemId || "", qty: tx.qty };
    }
    if (tx.type === "recount") {
      return { ...base, itemId: tx.itemId, oldQty: tx.oldQty, newQty: tx.newQty, variance: Number(tx.newQty) - Number(tx.oldQty), reason: tx.reason || "" };
    }
    return base;
  }

  function analyticsClassifySessions(events) {
    const bySession = {};
    events.forEach(e => {
      const sid = e.sessionId || "unknown";
      if (!bySession[sid]) bySession[sid] = { sessionUser: "", eventCount: 0 };
      bySession[sid].eventCount += 1;
      if (e.sessionUser) bySession[sid].sessionUser = e.sessionUser;
    });
    let productionVolunteerSessions = 0;
    let testerSessions = 0;
    let unknownSessions = 0;
    Object.values(bySession).forEach(s => {
      if (isTesterUser(s.sessionUser)) testerSessions += 1;
      else if (s.sessionUser) productionVolunteerSessions += 1;
      else unknownSessions += 1;
    });
    const testerEventCount = events.filter(e => e.isTesterSession).length;
    const productionVolunteerEventCount = events.filter(e => e.sessionUser && !e.isTesterSession).length;
    const unknownUserEventCount = events.filter(e => !e.sessionUser && !e.isTesterSession).length;
    return {
      productionVolunteerSessions,
      testerSessions,
      unknownSessions,
      testerEventCount,
      productionVolunteerEventCount,
      unknownUserEventCount,
    };
  }

  function analyticsDerivedSummary(opts) {
    opts = opts || {};
    const events = state.analytics?.events || [];
    const byEvent = {}, byScreen = {}, byFlow = {}, errors = {}, clicks = {};
    const flowStarts = {}, completedDurations = [];
    const fieldChanges = {}, fieldFocusDurations = {}, fieldAbandons = {}, timeBetweenFields = {};
    const rageClicks = [], mouseHesitations = [], scrollDepthByScreen = {}, errorRecoveries = [];
    const detailsToggles = {};

    events.forEach(e => {
      byEvent[e.event] = (byEvent[e.event] || 0) + 1;
      byScreen[e.view || "unknown"] = (byScreen[e.view || "unknown"] || 0) + 1;
      if (e.flow) byFlow[e.flow] = (byFlow[e.flow] || 0) + 1;
      if (e.event === "error_shown") errors[e.details?.message || "unknown"] = (errors[e.details?.message || "unknown"] || 0) + 1;
      if (e.event === "error_resolved") errorRecoveries.push({ view: e.view, message: e.details?.previousMessage || "", timestamp: e.timestamp });
      if (e.event === "click") {
        const k = e.details?.target?.id || e.details?.target?.text || e.details?.target?.dataGo || "unknown";
        clicks[k] = (clicks[k] || 0) + 1;
      }
      if (e.event === "details_toggled") {
        const k = e.details?.summary || "unknown";
        detailsToggles[k] = (detailsToggles[k] || 0) + 1;
      }
      if (e.event === "flow_start") flowStarts[e.details?.flow || e.flow || "unknown"] = (flowStarts[e.details?.flow || e.flow || "unknown"] || 0) + 1;
      if (e.event === "flow_complete" && e.details?.durationMs) completedDurations.push({ flow: e.details.flow || e.flow, durationMs: e.details.durationMs });
      if (e.event === "field_change") fieldChanges[e.details?.field || "unknown"] = (fieldChanges[e.details?.field || "unknown"] || 0) + 1;
      if (e.event === "field_blur" && e.details?.durationMs) {
        const f = e.details.field || "unknown";
        if (!fieldFocusDurations[f]) fieldFocusDurations[f] = [];
        fieldFocusDurations[f].push(e.details.durationMs);
      }
      if (e.event === "field_abandoned") {
        const f = e.details?.field || "unknown";
        fieldAbandons[f] = (fieldAbandons[f] || 0) + 1;
      }
      if (e.event === "time_between_fields") {
        const k = `${e.details?.fromField || "unknown"}→${e.details?.toField || "unknown"}`;
        if (!timeBetweenFields[k]) timeBetweenFields[k] = [];
        timeBetweenFields[k].push(e.details?.durationMs || 0);
      }
      if (e.event === "rage_click") rageClicks.push({ view: e.view, target: e.details?.target, count: e.details?.count, windowMs: e.details?.windowMs, timestamp: e.timestamp });
      if (e.event === "mouse_hesitation") mouseHesitations.push({ view: e.view, target: e.details?.target, durationMs: e.details?.durationMs, timestamp: e.timestamp });
      if (e.event === "scroll_depth") {
        const screen = e.view || "unknown";
        scrollDepthByScreen[screen] = Math.max(scrollDepthByScreen[screen] || 0, e.details?.maxPct || e.details?.pct || 0);
      }
    });

    const tx = state.transactions || [];
    const txByType = {};
    const optionUsage = {};
    tx.forEach(t => {
      txByType[t.type] = (txByType[t.type] || 0) + 1;
      if (t.type === "build") {
        const packKey = t.packKey || "unknown";
        if (!optionUsage[packKey]) optionUsage[packKey] = { builds: 0, optionalIncluded: {}, customExtras: 0, substitutions: 0, omissions: 0 };
        optionUsage[packKey].builds += 1;
        (t.optionalIncluded || []).forEach(opt => {
          optionUsage[packKey].optionalIncluded[opt] = (optionUsage[packKey].optionalIncluded[opt] || 0) + 1;
        });
        optionUsage[packKey].customExtras += t.customExtras?.length || 0;
        optionUsage[packKey].substitutions += t.substitutions?.length || 0;
        optionUsage[packKey].omissions += t.omissions?.length || 0;
      }
    });

    const avg = vals => vals.length ? Math.round(vals.reduce((a,b)=>a+b,0) / vals.length) : 0;
    const avgFieldFocusMs = Object.fromEntries(Object.entries(fieldFocusDurations).map(([k, vals]) => [k, avg(vals)]));
    const avgTimeBetweenFieldsMs = Object.fromEntries(Object.entries(timeBetweenFields).map(([k, vals]) => [k, avg(vals)]));

    const neverUsedOptions = {};
    const alwaysUsedOptions = {};
    Object.entries(RECIPES).forEach(([packKey, recipe]) => {
      const usage = optionUsage[packKey] || { builds: 0, optionalIncluded: {} };
      neverUsedOptions[packKey] = [];
      alwaysUsedOptions[packKey] = [];
      (recipe.optional || []).forEach(opt => {
        const key = opt.itemId || opt.id || opt.label;
        const count = usage.optionalIncluded[key] || 0;
        if (usage.builds > 0 && count === 0) neverUsedOptions[packKey].push(key);
        if (usage.builds > 0 && count === usage.builds) alwaysUsedOptions[packKey].push(key);
      });
    });

    const confusionHotspots = [
      ...mouseHesitations.map(h => ({ type: "mouse_hesitation", score: Math.round((h.durationMs || 0) / 100), target: h.target?.text || h.target?.id || h.target?.dataGo || "unknown", view: h.view })),
      ...rageClicks.map(r => ({ type: "rage_click", score: (r.count || 0) * 10, target: r.target?.text || r.target?.id || r.target?.dataGo || "unknown", view: r.view })),
      ...Object.entries(detailsToggles).filter(([, c]) => c >= 3).map(([target, c]) => ({ type: "repeated_toggle", score: c * 5, target, view: "various" })),
      ...Object.entries(fieldAbandons).map(([target, c]) => ({ type: "field_abandoned", score: c * 8, target, view: "various" })),
      ...Object.entries(errors).map(([target, c]) => ({ type: "error", score: c * 12, target, view: "various" })),
    ].sort((a, b) => b.score - a.score).slice(0, 25);

    const sessionBreakdown = analyticsClassifySessions(events);
    const itemConfidence = opts.itemConfidence || computeAllItemConfidence();
    const confidenceSummary = buildConfidenceSummary(itemConfidence);
    const packingHabitsFull = opts.packingHabits || packingHabitSummary();
    const packingHabitsSummary = packingHabitsSummaryConcise(packingHabitsFull);
    const packingHabitTrends = packingHabitTrendsConcise(packingHabitsFull.trends);
    const operationalIntelligence = opts.operationalIntelligence
      || computeOperationalIntelligence({ itemConfidence, packingHabits: packingHabitsFull });
    const operationalIntelligenceSummary = operationalIntelligenceSummaryConcise(operationalIntelligence);
    const beliefEngine = opts.beliefEngine || computeBeliefEngine({
      itemConfidence, packingHabits: packingHabitsFull, operationalIntelligence,
      synthetic: !!state.sampleData,
    });
    const beliefEngineSummary = beliefEngineSummaryConcise(beliefEngine);
    const operationalMemory = opts.operationalMemory || computeOperationalMemory({
      itemConfidence, packingHabits: packingHabitsFull, operationalIntelligence, beliefEngine,
      synthetic: !!state.sampleData,
    });
    const operationalMemorySummary = operationalMemorySummaryConcise(operationalMemory);
    const productionIgnoredVisibleControls = analyticsIgnoredVisibleControlsFromEvents(events, { productionOnly: true });
    const testerIgnoredVisibleControls = analyticsIgnoredVisibleControlsFromEvents(events, { testerOnly: true });
    const interactionEpisodeSummary = analyticsInteractionEpisodeSummary(events);

    return {
      generatedAt: new Date().toISOString(),
      schemaVersion: ANALYTICS_SCHEMA_VERSION,
      installId: state.analytics?.installId,
      eventCount: events.length,
      transactionCount: tx.length,
      firstSeenAt: state.analytics?.firstSeenAt,
      lastSeenAt: state.analytics?.lastSeenAt,
      byEvent,
      byScreen,
      byFlow,
      flowStarts,
      completedDurations,
      txByType,
      errors,
      errorRecoveries,
      clicks,
      fieldChanges,
      avgFieldFocusMs,
      fieldAbandons,
      avgTimeBetweenFieldsMs,
      rageClicks,
      mouseHesitations,
      scrollDepthByScreen,
      ignoredVisibleControls: productionIgnoredVisibleControls,
      productionIgnoredVisibleControls,
      testerIgnoredVisibleControls,
      optionUsage,
      neverUsedOptions,
      alwaysUsedOptions,
      confusionHotspots,
      operationalSnapshot: analyticsOperationalSnapshot(),
      confidenceSummary,
      packingHabitsSummary,
      packingHabitTrends,
      operationalIntelligenceSummary,
      beliefEngineSummary,
      operationalMemorySummary,
      interactionEpisodeSummary,
      ...sessionBreakdown,
    };
  }

  function analyticsFlattenDetails(details) {
    try { return JSON.stringify(details || {}).replace(/\n/g, " "); }
    catch (e) { return "{}"; }
  }

  function analyticsCsvEscape(v) {
    const s = String(v ?? "");
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }

  function exportAnalyticsCSV() {

      rows.push([e.timestamp, e.sessionId, e.installId, e.event, e.view, e.flow, e.flowId, analyticsFlattenDetails(e.details)]);
    });
    const csv = rows.map(r => r.map(analyticsCsvEscape).join(",")).join("\n");

  function downloadTextFile(content, filename, type) {
    const blob = new Blob([content], { type });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  // ═══════════════════════════════════════════════════════════════════
  // TRANSACTIONS
  // ═══════════════════════════════════════════════════════════════════

  function snapshotForUndo() {
    return JSON.parse(JSON.stringify({
      balances: state.balances,
      readyPacks: state.readyPacks,
      txCount: state.transactions.length,
    }));
  }

  function beginTransaction() {
    if (!Array.isArray(state.undoStack)) state.undoStack = [];
    state.undoStack.push(snapshotForUndo());
    // Keep only the most recent actions so saved state stays bounded.
    if (state.undoStack.length > UNDO_STACK_LIMIT) {
      state.undoStack.splice(0, state.undoStack.length - UNDO_STACK_LIMIT);
    }
  }

  function finishTransaction(tx) {
    state.transactions.push(tx);
    analyticsTrack("transaction_commit", { transaction: analyticsTransactionSummary(tx), snapshot: analyticsOperationalSnapshot() });
    if (["donation", "build", "deliver", "recount"].includes(tx.type)) {
      analyticsCompleteFlow({ transactionType: tx.type, transactionId: tx.id });
    }
    saveState();
  }

  function canUndo() {
    return Array.isArray(state.undoStack) && state.undoStack.length > 0;
  }

  function undoLast() {
    const remainingBefore = Array.isArray(state.undoStack) ? state.undoStack.length : 0;
    analyticsTrack("undo_clicked", { undosAvailable: remainingBefore, snapshot: analyticsOperationalSnapshot() });
    if (!canUndo()) return;
    const snap = state.undoStack.pop();
    state.balances = snap.balances;
    state.readyPacks = snap.readyPacks;
    state.transactions = state.transactions.slice(0, snap.txCount);
    state.transactions.push({ id: uid(), type: "undo", date: todayISO() });
    saveState();
    render();
  }

  function commitDonation(donor, lines, date) {
    beginTransaction();
    const tx = { id: uid(), type: "donation", date: date || todayISO(), donor: donor || "", lines: [] };
    for (const line of lines) {
      const it = itemMap[line.itemId];
      let add = line.qty;
      if (it.unit === "packet" && line.packSize) add = line.qty * line.packSize;
      else if (it.unit === "packet") add = line.qty * (it.packSize || 1);
      state.balances[line.itemId] = getBalance(line.itemId) + add;
      tx.lines.push({ itemId: line.itemId, qty: line.qty, packSize: line.packSize, note: line.note, unitsAdded: add });
    }
    finishTransaction(tx);
    rememberDonor(donor);
  }

  function checkBuild(packKey, qty, optionalIncluded, customExtras, substitutions, omissions) {
    const { usage } = computeBuildStockPlan(packKey, qty, optionalIncluded, customExtras, substitutions, omissions);
    const shortages = [];
    for (const [itemId, need] of Object.entries(usage)) {
      if (need <= 0) continue;
      const have = getBalance(itemId);
      if (have < need) shortages.push({ itemId, name: itemName(itemId), need, have });
    }
    return shortages;
  }

  function getOptionalItemStockWarning(itemId, packQty) {
    const have = getBalance(itemId);
    const name = itemName(itemId);
    const need = packQty > 0 ? packQty : 1;
    if (have < need) {
      return packQty > 0
        ? `${name}: need ${need}, have ${have}`
        : `${name}: only ${have} in stock (1 per pack)`;
    }
    return "";
  }

  function getBuildStockErrorMessage() {
    const qty = parseInt(form.qty, 10);
    if (!qty || qty < 1) return "";
    const included = Object.keys(form.optional || {}).filter(k => form.optional[k]);
    const customExtras = (form.customExtras || []).filter(e => e.itemId);
    const shortages = checkBuild(form.packKey, qty, included, customExtras, form.substitutions || [], form.omissions || []);
    return shortages.length
      ? "Not enough stock: " + shortages.map(s => `${s.name} (need ${s.need}, have ${s.have})`).join("; ")
      : "";
  }

  function syncBuildStockWarning() {
    if (errorMsg && !errorMsg.startsWith("Not enough stock:")) return;
    errorMsg = getBuildStockErrorMessage();
  }

  function updateBuildErrorBannerLive() {
    if (view !== "build") return;
    // Only live-update the stock-shortage banner. Other errors remain tied to Save.
    if (errorMsg && !errorMsg.startsWith("Not enough stock:")) return;
    readBuildForm();
    syncBuildStockWarning();
    const next = errorMsg;
    const box = document.getElementById("build-error");
    if (!box) return;
    if (next) {
      box.textContent = next;
      box.classList.remove("hidden");
    } else {
      box.textContent = "";
      box.classList.add("hidden");
    }
  }

  function commitBuild(packKey, qty, packer, destination, optionalIncluded, customExtras, substitutions, date, omissions) {
    beginTransaction();
    const normalizedExtras = (customExtras || []).map(e => ({
      itemId: e.itemId,
      qtyPerPack: parseInt(e.qtyPerPack, 10) || 1,
    }));
    const normalizedSubs = normalizeSubstitutions(substitutions);
    const normalizedOmissions = normalizeOmissions(omissions);
    const { usage } = computeBuildStockPlan(packKey, qty, optionalIncluded, normalizedExtras, normalizedSubs, normalizedOmissions);
    const tx = {
      id: uid(), type: "build", date: date || todayISO(),
      packKey, qty, packer, destination,
      optionalIncluded: [...optionalIncluded],
      customExtras: normalizedExtras,
      substitutions: normalizedSubs,
      omissions: normalizedOmissions,
    };
    for (const [itemId, deduct] of Object.entries(usage)) {
      if (deduct > 0) state.balances[itemId] = getBalance(itemId) - deduct;
    }
    state.readyPacks[packKey] = (state.readyPacks[packKey] || 0) + qty;
    finishTransaction(tx);
  }

  function commitDeliverAssembled(packKey, qty, destination, date) {
    if ((state.readyPacks[packKey] || 0) < qty) {
      return `Only ${state.readyPacks[packKey] || 0} ${RECIPES[packKey].label}s ready.`;
    }
    beginTransaction();
    state.readyPacks[packKey] -= qty;
    finishTransaction({
      id: uid(), type: "deliver", date, destination, packKey, qty, deliverType: "assembled",
    });
    return null;
  }

  function commitDeliverUnits(itemId, qty, destination, date) {
    if (getBalance(itemId) < qty) {
      return `Only ${getBalance(itemId)} ${itemName(itemId)} in stock.`;
    }
    beginTransaction();
    state.balances[itemId] -= qty;
    finishTransaction({
      id: uid(), type: "deliver", date, destination, itemId, qty, deliverType: "completeUnit",
    });
    return null;
  }

  function commitRecount(itemId, newQty, reason, date) {
