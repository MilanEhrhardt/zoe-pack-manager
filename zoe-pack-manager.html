      ? sessionInfo.unknownSessions / (sessionInfo.productionVolunteerSessions + sessionInfo.testerSessions + sessionInfo.unknownSessions)
      : 0;

    const readinessCtx = {
      synthetic: !!state.sampleData,
      productionPacksCreated: productionPacks,
      uniqueBuildDays,
      donationCount,
      recountCount,
      substitutionPatternCount: substitutionImpact.length,
      optionalPatternCount: optionalImpact.length,
      needsCheckingRatio,
      babyPackProductionPacks,
      testerDominates,
      singlePackerDominates,
      dominantPacker: dominantPacker ? dominantPacker[0] : "",
      unknownSessionRatio,
    };

    const impactReadiness = computeImpactReadiness(readinessCtx);
    const limitations = opBuildLimitations(readinessCtx);
    const summary = opBuildOperationalSummary(
      buildImpact, substitutionImpact, optionalImpact, donationImpact, recountImpact, stockRisk, impactReadiness
    );

    return {
      generatedAt: new Date().toISOString(),
      dataQuality: { synthetic: !!state.sampleData, productionOnlyDefault: true },
      summary,
      buildImpact,
      substitutionImpact,
      optionalImpact,
      donationImpact,
      recountImpact,
      stockRisk,
      impactReadiness,
      limitations,
    };
  }

  function operationalIntelligenceSummaryConcise(full) {
    if (!full) return null;
    const facts = [];

    (full.stockRisk || []).filter(r => r.zeroStock && r.recipeRoles.some(role => role.role === "core")).forEach(r => {
      facts.push({ score: 10000, text: `${r.itemName} is currently at zero balance.` });
    });

    if (!full.impactReadiness?.readyForImpactJudgement) {
      const blockers = full.impactReadiness?.blockers || [];
      const blockerText = blockers.length ? blockers[0] : "insufficient production history";
      facts.push({
        score: 9000,
        text: `Impact judgement is not ready yet: ${blockerText} (measurement only).`,
      });
    }

    const topSub = (full.substitutionImpact || [])[0];
    if (topSub && topSub.packsAffected > 0) {
      facts.push({
        score: 8000 + topSub.packsAffected,
        text: `${topSub.substituteItemName} substituted for ${topSub.insteadOfItemName} affected ${topSub.packsAffected} ${topSub.packLabel} pack records.`,
      });
    }

    const productionPacks = full.summary?.productionPacksCreated || 0;
    if (productionPacks > 0) {
      facts.push({
        score: 7000 + Math.min(productionPacks, 500),
        text: `${productionPacks} production packs have been recorded in total.`,
      });
    }

    const donationsByEnablement = [...(full.donationImpact || [])]
      .map(d => ({ donation: d, maxEnable: d.maxEstimatedPackEnablement || opDonationMaxEnablement(d) }))
      .filter(x => x.maxEnable > 0)
      .sort((a, b) => b.maxEnable - a.maxEnable);

    donationsByEnablement.slice(0, 2).forEach(({ donation: d, maxEnable }) => {
      const topLine = [...(d.lines || [])].sort((a, b) => opDonationLineMaxEnablement(b) - opDonationLineMaxEnablement(a))[0];
      let detail = `may enable up to ${maxEnable} packs (estimated, measurement only)`;
      if (topLine) {
        const coreDesc = Object.values(topLine.corePackEnablement || {})[0]?.description;
        const optDesc = Object.values(topLine.optionalPackSupport || {})[0]?.description;
        const subDesc = Object.values(topLine.substitutionSupport || {})[0]?.description;
        const raw = coreDesc || optDesc || subDesc;
        if (raw) detail = raw.replace(/^This donation /, "may ").replace(/\.$/, " (estimated).");
      }
      facts.push({
        score: 6000 + maxEnable,
        text: `Donation on ${d.date} from ${d.donor || "unknown donor"}: ${detail}`,
      });
    });

    const readyMom = state.readyPacks?.momPack || 0;
    const readyBaby = state.readyPacks?.babyPack || 0;
    if (readyMom > 0) facts.push({ score: 1000 + readyMom, text: `${readyMom} Mom Packs are currently ready.` });
    if (readyBaby > 0) facts.push({ score: 1000 + readyBaby, text: `${readyBaby} Baby Packs are currently ready.` });

    facts.sort((a, b) => b.score - a.score);
    return {
      productionPacksCreated: full.summary?.productionPacksCreated || 0,
      testerPacksExcluded: full.summary?.testerPacksExcluded || 0,
      highRiskItemCount: full.summary?.highRiskItemCount || 0,
      criticalRiskItemCount: full.summary?.criticalRiskItemCount || 0,
      topThreeOperationalFacts: facts.slice(0, 3).map(f => f.text),
      readyForImpactJudgement: full.impactReadiness?.readyForImpactJudgement || false,
    };
  }

  // ═══════════════════════════════════════════════════════════════════
  // BELIEF ENGINE — Phase 3B framework (export / ops only)
  // ═══════════════════════════════════════════════════════════════════

  const BE_MODEL_VERSION = "3B.1";
  const BE_BANNED_COPY = /\b(ai|algorithm|detected|recommendation|should|must|proven|guaranteed|decision|optimis[ez]ation|optimisation|change recipe)\b/gi;

  function beCopySafe(text) {
    if (!text) return "";
    return String(text).replace(BE_BANNED_COPY, m => {
      const lower = m.toLowerCase();
      const map = {
        ai: "analysis", algorithm: "pattern", detected: "observed", recommendation: "note",
        should: "may", must: "may", proven: "supported", guaranteed: "likely", decision: "view",
        optimization: "review", optimisation: "review", optimize: "review", optimise: "review",
        "change recipe": "review pack contents",
      };
      return map[lower] || "note";
    });
  }

  function beConfidenceBand(p) {
    if (p < 0.25) return "very_low";
    if (p < 0.45) return "low";
    if (p < 0.70) return "moderate";
    return "high";
  }

  function computeBeliefConfidence(inputs) {
    inputs = inputs || {};
    let p = 0.35;
    if (inputs.multipleSources) p += 0.10;
    if (inputs.sufficientHistory) p += 0.10;
    if (inputs.strongItemConfidence) p += 0.08;
    if (inputs.repeatedPattern) p += 0.10;
    if (inputs.operationalRelevance) p += 0.07;
    if (inputs.synthetic) p -= 0.08;
    if (inputs.impactReadinessFalse) p -= 0.10;
    if (inputs.earlyEvidence) p -= 0.12;
    if (inputs.fewRecounts) p -= 0.08;
    if (inputs.singlePackerDominance) p -= 0.06;
    if (inputs.weakBabyPackHistory) p -= 0.05;
    if (inputs.insufficientEvidence) p = Math.min(p, 0.25);
    else if (inputs.earlyEvidence) p = Math.min(p, 0.55);
    if (inputs.synthetic) p = Math.min(p, 0.65);
    if (inputs.impactReadinessFalse) p = Math.min(p, 0.70);
    return Math.max(0, Math.min(1, Math.round(p * 100) / 100));
  }

  function beBeliefCtx(deps) {
    return {
      itemConfidence: deps.itemConfidence,
      packingHabits: deps.packingHabits,
      operationalIntelligence: deps.operationalIntelligence,
      synthetic: deps.synthetic != null ? deps.synthetic : !!state.sampleData,
    };
  }

  function beImpactReady(ctx) {
    return !!(ctx.operationalIntelligence?.impactReadiness?.readyForImpactJudgement);
  }

  function beReadinessInputs(ctx) {
    const oi = ctx.operationalIntelligence || {};
    const ir = oi.impactReadiness || {};
    return {
      synthetic: ctx.synthetic,
      impactReadinessFalse: !ir.readyForImpactJudgement,
      fewRecounts: (oi.summary?.recountCount ?? 0) < 5,
      weakBabyPackHistory: (oi.summary?.productionPacksCreated ?? 0) > 0
        && (oi.buildImpact?.byPackKey || []).find(p => p.packKey === "babyPack")?.productionPacksCreated < 10,
      singlePackerDominance: (ir.blockers || []).some(b => /one packer dominates/i.test(b)),
      sufficientHistory: (oi.summary?.productionPacksCreated ?? 0) >= 50,
    };
  }

  function beResolveActionability(status, ctx, confidenceBand, beliefType) {
    if (ctx.synthetic || !beImpactReady(ctx)) {
      if (beliefType === "habit" && ["likely_emerging_practice", "possible_emerging_practice", "established_practice"].includes(status)) {
        return "monitor";
      }
      if (["balance_likely_wrong", "likely_real_shortage", "established_practice", "possible_recipe_mismatch", "likely_recipe_mismatch"].includes(status)
        && (confidenceBand === "moderate" || confidenceBand === "high")) {
        return "monitor";
      }
      return "observe_only";
    }
    if (status === "insufficient_evidence" || confidenceBand === "very_low") return "observe_only";
    if (["established_practice", "balance_likely_wrong", "likely_real_shortage", "likely_recipe_mismatch"].includes(status)
      && confidenceBand === "high") {
      return "ready_for_review";
    }
    if (["likely_emerging_practice", "possible_emerging_practice", "possible_shortage", "balance_uncertain", "possible_recipe_mismatch"].includes(status)) {
      return "monitor";
    }
    return "observe_only";
  }

  function beMakeBelief(partial, ctx) {
    const confidenceProbability = partial.confidenceProbability;
    const confidenceBand = partial.confidenceBand || beConfidenceBand(confidenceProbability);
    const actionability = partial.actionability || beResolveActionability(partial.status, ctx, confidenceBand, partial.beliefType);
    return {
      beliefId: partial.beliefId,
      beliefType: partial.beliefType,
      subject: partial.subject,
      status: partial.status,
      confidenceBand,
      confidenceProbability,
      supportingEvidence: (partial.supportingEvidence || []).map(beCopySafe),
      contradictingEvidence: (partial.contradictingEvidence || []).map(beCopySafe),
      unknowns: (partial.unknowns || []).map(beCopySafe),
      reasoning: beCopySafe(partial.reasoning || ""),
      actionability,
      limitations: (partial.limitations || []).map(beCopySafe),
    };
  }

  function beItemConfidenceRow(ctx, itemId) {
    return (ctx.itemConfidence || []).find(r => r.itemId === itemId);
  }

  function beStockRiskRow(ctx, itemId) {
    return (ctx.operationalIntelligence?.stockRisk || []).find(r => r.itemId === itemId);
  }

  function beImportantItemIds(ctx) {
    const ids = new Set();
    const oi = ctx.operationalIntelligence || {};
    (oi.stockRisk || []).forEach(r => {
      if ((r.recipeRoles || []).some(role => role.role === "core")) ids.add(r.itemId);
      if (r.zeroStock || r.lowStock) ids.add(r.itemId);
      if (r.riskBand === "high" || r.riskBand === "critical") ids.add(r.itemId);
      if (r.recentSubstitutionTouches >= 2) ids.add(r.itemId);
    });
    (oi.recountImpact || []).filter(r => r.varianceAbs >= 3).forEach(r => ids.add(r.itemId));
    (oi.substitutionImpact || []).forEach(s => {
      ids.add(s.insteadOfItemId);
      ids.add(s.substituteItemId);
    });
    return [...ids];
  }

  function beBalanceStatusFromConfidence(band, hasEvidence) {
    if (!hasEvidence) return "insufficient_evidence";
    if (band === "trusted") return "balance_probably_reliable";
    if (band === "probably_right") return "balance_plausible_but_unverified";
    if (band === "uncertain") return "balance_uncertain";
    return "balance_likely_wrong";
  }

  function computeItemBalanceBeliefs(ctx) {
    const beliefs = [];
    const ri = beReadinessInputs(ctx);
    beImportantItemIds(ctx).forEach(itemId => {
      const row = beItemConfidenceRow(ctx, itemId);
      const risk = beStockRiskRow(ctx, itemId);
      if (!row && !risk) return;
      const conf = row?.volunteerConfidence;
      const band = conf?.confidenceBand;
      const hasEvidence = !!(conf && (conf.stats?.totalMovements > 0 || conf.stats?.hasEverBeenRecounted || risk));
      const status = beBalanceStatusFromConfidence(band, hasEvidence);
      const supporting = [];
      const contradicting = [];
      const unknowns = [];
      if (conf) {
        supporting.push(`Volunteer confidence is ${conf.volunteerLabel || band}.`);
        if (conf.confidenceReason) supporting.push(conf.confidenceReason);
      }
      if (risk) {
        if (risk.zeroStock) supporting.push(`${risk.itemName} is at zero balance.`);
        else if (risk.lowStock) supporting.push(`${risk.itemName} is below the low-stock threshold.`);
        if (risk.riskSignals?.length) supporting.push(`Risk signals: ${risk.riskSignals.join(", ")}.`);
      }
      const recount = (ctx.operationalIntelligence?.recountImpact || []).find(r => r.itemId === itemId);
      if (recount && recount.varianceAbs >= 3) {
        supporting.push(`A recent recount showed a variance of ${recount.varianceAbs} units.`);
      }
      if (!conf?.stats?.hasEverBeenRecounted) unknowns.push("No physical recount recorded in this system yet.");
      if (ctx.synthetic) unknowns.push("Limited by synthetic sample data.");
      const confInputs = {
        ...ri,
        multipleSources: supporting.length >= 2,
        strongItemConfidence: band === "trusted" || band === "probably_right",
        operationalRelevance: risk && (risk.riskBand === "high" || risk.riskBand === "critical"),
        insufficientEvidence: status === "insufficient_evidence",
        earlyEvidence: band === "uncertain" || band === "needs_checking",
      };
      const confidenceProbability = computeBeliefConfidence(confInputs);
      beliefs.push(beMakeBelief({
        beliefId: `item_balance:${itemId}`,
        beliefType: "item_balance",
        subject: { itemId, itemName: row?.itemName || risk?.itemName || itemName(itemId) },
        status,
        confidenceProbability,
        supportingEvidence: supporting,
        contradictingEvidence: contradicting,
        unknowns,
        reasoning: `We currently believe the recorded balance for ${row?.itemName || itemName(itemId)} is ${status.replace(/_/g, " ")}. Evidence suggests ${conf?.confidenceReason || "recent storeroom activity matters here"}. Observe only until more recounts are available.`,
        limitations: ctx.synthetic ? ["Synthetic sample data caps belief confidence."] : [],
      }, ctx));
    });
    return beliefs;
  }

  function computeShortageBeliefs(ctx) {
    const beliefs = [];
    const ri = beReadinessInputs(ctx);
    (ctx.operationalIntelligence?.stockRisk || []).forEach(risk => {
      const isCore = (risk.recipeRoles || []).some(role => role.role === "core");
      const meaningful = risk.zeroStock || risk.lowStock || isCore
        || risk.riskBand === "high" || risk.riskBand === "critical"
        || risk.recentSubstitutionTouches >= 2;
      if (!meaningful) return;

      let status = "shortage_uncertain";
      if (!risk.appearsInRecipes && risk.zeroStock) status = "insufficient_evidence";
      else if (risk.zeroStock && isCore) status = "likely_real_shortage";
      else if (risk.zeroStock) status = "possible_shortage";
      else if (risk.lowStock && isCore) status = "possible_shortage";
      else if (risk.riskBand === "critical") status = "likely_real_shortage";
      else if (risk.riskBand === "high") status = "possible_shortage";
      else if (risk.recentSubstitutionTouches >= 2 && (risk.lowStock || risk.zeroStock)) status = "possible_shortage";
      else if (!risk.zeroStock && !risk.lowStock && risk.riskBand === "low") return;

      const row = beItemConfidenceRow(ctx, risk.itemId);
      const supporting = [];
      if (risk.zeroStock) supporting.push(`${risk.itemName} balance is zero.`);
      if (risk.lowStock) supporting.push(`${risk.itemName} is below threshold (${risk.balance} vs ${risk.threshold}).`);
      if (isCore) supporting.push(`${risk.itemName} is a core recipe item.`);
      if (risk.recentSubstitutionTouches >= 2) supporting.push("Substitution pressure appears in recent packing.");
      const unknowns = [];
      if (!row?.volunteerConfidence?.stats?.hasEverBeenRecounted) unknowns.push("Shelf count not recently verified.");
      const confInputs = {
        ...ri,
        multipleSources: supporting.length >= 2,
        strongItemConfidence: row?.volunteerConfidence?.confidenceBand === "trusted",
        operationalRelevance: isCore || risk.riskBand === "critical",
        repeatedPattern: risk.recentSubstitutionTouches >= 2,
        insufficientEvidence: status === "insufficient_evidence",
        earlyEvidence: risk.riskBand === "medium",
      };
      const confidenceProbability = computeBeliefConfidence(confInputs);
      beliefs.push(beMakeBelief({
        beliefId: `shortage:${risk.itemId}`,
        beliefType: "shortage",
        subject: { itemId: risk.itemId, itemName: risk.itemName },
        status,
        confidenceProbability,
        supportingEvidence: supporting,
        contradictingEvidence: risk.balance > risk.threshold && !risk.zeroStock
          ? [`Balance (${risk.balance}) is above the low-stock threshold.`] : [],
        unknowns,
        reasoning: `Evidence suggests a ${status.replace(/_/g, " ")} for ${risk.itemName}. This is export-only — monitor stock and recount when convenient.`,
        limitations: ["Shortage beliefs are cautious measurements, not packing instructions."],
      }, ctx));
    });
    return beliefs;
  }

  function beHabitStatusFromTrend(trend, evidence, percentage) {
    if (trend === "established") return "established_practice";
    if (trend === "emerging" && evidence === "sufficient") return "likely_emerging_practice";
    if (trend === "emerging") return "possible_emerging_practice";
    if (trend === "declining") return "fading_behaviour";
    if (trend === "stable" && percentage < 50) return "occasional_behaviour";
    if (trend === "too_early_to_tell" || evidence === "too_early") return "insufficient_evidence";
    if (percentage >= 40) return "possible_emerging_practice";
    return "occasional_behaviour";
  }

  function computeHabitBeliefs(ctx) {
    const beliefs = [];
    const ri = beReadinessInputs(ctx);
    const seen = new Set();

    (ctx.packingHabits?.observations || []).forEach(obs => {
      const key = `habit:${obs.type}:${obs.packKey}:${obs.itemId}:${obs.replacementItemId || ""}`;
      if (seen.has(key)) return;
      seen.add(key);
      const status = beHabitStatusFromTrend(obs.trend, obs.evidence, obs.percentage);
      const supporting = [obs.volunteerText || `${obs.itemName} pattern in ${obs.packLabel}.`].filter(Boolean);
      if (obs.trendReason) supporting.push(obs.trendReason);
      const unknowns = obs.insufficientHistory ? ["Not enough packing history for a firm conclusion."] : [];
      const confInputs = {
        ...ri,
        multipleSources: !!(obs.trend && obs.possibleCauses?.length),
        repeatedPattern: obs.count >= 3,
        earlyEvidence: obs.evidence === "early" || obs.evidence === "too_early",
        insufficientEvidence: status === "insufficient_evidence",
        operationalRelevance: obs.type === "substitution",
      };
      const confidenceProbability = computeBeliefConfidence(confInputs);
      const subj = {
        type: obs.type,
        packKey: obs.packKey,
        packLabel: obs.packLabel,
        itemId: obs.itemId,
        itemName: obs.itemName,
      };
      if (obs.replacementItemId) {
        subj.replacementItemId = obs.replacementItemId;
        subj.replacementItemName = obs.replacementItemName;
      }
      beliefs.push(beMakeBelief({
        beliefId: key,
        beliefType: "habit",
        subject: subj,
        status,
        confidenceProbability,
        supportingEvidence: supporting,
        contradictingEvidence: [],
        unknowns,
        reasoning: `Evidence suggests ${obs.replacementItemName || obs.itemName} ${obs.type === "substitution" ? "may appear as a substitute" : "may reflect packing practice"} in ${obs.packLabel}. Observe only — this is not a recipe note.`,
        limitations: ["Habit beliefs describe observed patterns, not volunteer instructions."],
      }, ctx));
    });

    (ctx.operationalIntelligence?.substitutionImpact || []).forEach(sub => {
      const key = `habit:substitution:${sub.packKey}:${sub.insteadOfItemId}:${sub.substituteItemId}`;
      if (seen.has(key)) return;
      if (sub.packsAffected < 1) return;
      seen.add(key);
      const habit = sub.relatedHabitObservation;
      const trend = sub.relatedTrend;
      const status = trend?.trend
        ? beHabitStatusFromTrend(trend.trend, trend.evidence, 0)
        : (sub.packsAffected >= 5 ? "likely_emerging_practice" : "possible_emerging_practice");
      const supporting = [
        `${sub.substituteItemName} substituted for ${sub.insteadOfItemName} in ${sub.packsAffected} ${sub.packLabel} pack records.`,
      ];
      if (sub.possibleOperationalMeaning) supporting.push(sub.possibleOperationalMeaning);
      if (habit?.volunteerText) supporting.push(habit.volunteerText);
      const confInputs = {
        ...ri,
        multipleSources: supporting.length >= 2,
        repeatedPattern: sub.packsAffected >= 3,
        operationalRelevance: true,
        earlyEvidence: sub.packsAffected < 5,
        insufficientEvidence: sub.packsAffected < 1,
      };
      const confidenceProbability = computeBeliefConfidence(confInputs);
      beliefs.push(beMakeBelief({
        beliefId: key,
        beliefType: "habit",
        subject: {
          type: "substitution",
          packKey: sub.packKey,
          packLabel: sub.packLabel,
          itemId: sub.insteadOfItemId,
          itemName: sub.insteadOfItemName,
          replacementItemId: sub.substituteItemId,
          replacementItemName: sub.substituteItemName,
        },
        status,
        confidenceProbability,
        supportingEvidence: supporting,
        contradictingEvidence: [],
        unknowns: sub.packsAffected < 5 ? ["Pattern may not be consistent yet."] : [],
        reasoning: `Evidence suggests ${sub.substituteItemName} may replace ${sub.insteadOfItemName} in some ${sub.packLabel} packs. Monitor only — not enough evidence to treat this as a settled practice.`,
        limitations: ["Substitution habit beliefs are observational scaffolding only."],
      }, ctx));
    });

    return beliefs;
  }

  function computeRecipeAlignmentBeliefs(ctx) {
    const beliefs = [];
    const ri = beReadinessInputs(ctx);
    const subImpact = ctx.operationalIntelligence?.substitutionImpact || [];

    Object.keys(RECIPES).forEach(packKey => {
      const recipe = RECIPES[packKey];
      let status = "insufficient_evidence";
      const supporting = [];
      const contradicting = [];
      const unknowns = [];

      if (!recipe.confirmed) {
        status = "unconfirmed_recipe";
        unknowns.push(`${recipe.label} is marked unconfirmed in configuration.`);
        supporting.push("Recipe contents are not yet confirmed for operational use.");
      } else {
        const coreSubs = subImpact.filter(s =>
          s.packKey === packKey && recipe.core.some(c => c.itemId === s.insteadOfItemId)
        );
        const totalAffected = coreSubs.reduce((s, x) => s + x.packsAffected, 0);
        if (totalAffected >= 8) {
          status = "likely_recipe_mismatch";
          supporting.push(`Repeated substitutions touch core items across ${totalAffected} pack records.`);
        } else if (totalAffected >= 3) {
          status = "possible_recipe_mismatch";
          supporting.push(`Some substitutions touch core ${recipe.label} items (${totalAffected} pack records).`);
        } else if ((ctx.operationalIntelligence?.summary?.productionPacksCreated || 0) >= 10) {
          status = "recipe_aligned";
          supporting.push(`No strong substitution pressure on core ${recipe.label} items.`);
        } else {
          unknowns.push("Limited production history for this pack type.");
        }
      }

      const confInputs = {
        ...ri,
        multipleSources: supporting.length >= 1,
        sufficientHistory: (ctx.operationalIntelligence?.summary?.productionPacksCreated || 0) >= 20,
        insufficientEvidence: status === "insufficient_evidence",
        weakBabyPackHistory: packKey === "babyPack" && status === "insufficient_evidence",
        operationalRelevance: packKey === "momPack",
      };
      const confidenceProbability = computeBeliefConfidence(confInputs);
      beliefs.push(beMakeBelief({
        beliefId: `recipe_alignment:${packKey}`,
        beliefType: "recipe_alignment",
        subject: { packKey, packLabel: recipe.label, confirmed: !!recipe.confirmed },
        status,
        confidenceProbability,
        supportingEvidence: supporting,
        contradictingEvidence: contradicting,
        unknowns,
        reasoning: status === "unconfirmed_recipe"
          ? `We currently believe ${recipe.label} alignment is unconfirmed. Not enough evidence to treat this recipe as settled. Observe only.`
          : `Evidence suggests ${recipe.label} is ${status.replace(/_/g, " ")}. This is a cautious read — monitor only.`,
        limitations: ["Recipe alignment beliefs do not alter pack recipes."],
      }, ctx));
    });
    return beliefs;
  }

  function computeReadinessBeliefs(ctx) {
    const ir = ctx.operationalIntelligence?.impactReadiness || {};
    const ri = beReadinessInputs(ctx);
    let status = "not_ready";
    if (ctx.synthetic) status = "blocked";
    else if (ir.readyForImpactJudgement) status = "ready";
    else if ((ir.readinessScore || 0) >= 50) status = "nearly_ready";
    else if ((ir.blockers || []).length >= 3) status = "blocked";

    const supporting = (ir.reasons || []).slice(0, 5);
    const unknowns = (ir.blockers || []).slice(0, 5);
    const confInputs = {
      ...ri,
      multipleSources: supporting.length >= 2,
      sufficientHistory: (ctx.operationalIntelligence?.summary?.productionPacksCreated || 0) >= 50,
      insufficientEvidence: status === "blocked" && !supporting.length,
      impactReadinessFalse: !ir.readyForImpactJudgement,
    };
    const confidenceProbability = computeBeliefConfidence(confInputs);
    return [beMakeBelief({
      beliefId: "readiness:overall",
      beliefType: "readiness",
      subject: { scope: "operational_readiness" },
      status,
      confidenceProbability,
      supportingEvidence: supporting,
      contradictingEvidence: [],
      unknowns,
      reasoning: ctx.synthetic
        ? "We currently believe operational readiness is blocked. Limited by synthetic sample data — observe only."
        : `Evidence suggests overall readiness is ${status.replace(/_/g, " ")}. ${ir.readyForImpactJudgement ? "Impact judgement gate is open." : "Impact judgement is not ready yet — monitor data collection."}`,
      limitations: ["Readiness beliefs are framework scaffolding, not volunteer messaging."],
      actionability: "observe_only",
    }, ctx)];
  }

  function beCountBy(beliefs, keyFn) {
    const counts = {};
    beliefs.forEach(b => {
      const k = keyFn(b);
      counts[k] = (counts[k] || 0) + 1;
    });
    return counts;
  }

  function beReadyForRecommendations(beliefs, ctx) {
    if (ctx.synthetic) return false;
    if (!beImpactReady(ctx)) return false;
    if (beliefs.some(b => b.status === "insufficient_evidence" && b.confidenceBand === "very_low")) return false;
    const avg = beliefs.length
      ? beliefs.reduce((s, b) => s + b.confidenceProbability, 0) / beliefs.length
      : 0;
    return avg >= 0.45 && !beliefs.some(b => b.actionability === "ready_for_review");
  }

  function beBuildBeliefSummary(beliefs, ctx) {
    const sorted = [...beliefs].sort((a, b) => b.confidenceProbability - a.confidenceProbability);
    const uncertain = [...beliefs].sort((a, b) => a.confidenceProbability - b.confidenceProbability);
    return {
      totalBeliefs: beliefs.length,
      byType: beCountBy(beliefs, b => b.beliefType),
      byStatus: beCountBy(beliefs, b => b.status),
      byConfidenceBand: beCountBy(beliefs, b => b.confidenceBand),
      byActionability: beCountBy(beliefs, b => b.actionability),
      topBeliefs: sorted.slice(0, 5).map(b => ({
        beliefId: b.beliefId,
        beliefType: b.beliefType,
        subject: b.subject,
        status: b.status,
        confidenceProbability: b.confidenceProbability,
      })),
      highestUncertaintyBeliefs: uncertain.slice(0, 5).map(b => ({
        beliefId: b.beliefId,
        beliefType: b.beliefType,
        subject: b.subject,
        status: b.status,
        confidenceProbability: b.confidenceProbability,
      })),
      readyForRecommendations: beReadyForRecommendations(beliefs, ctx),
    };
  }

  function computeBeliefEngine(deps) {
    const ctx = beBeliefCtx(deps || {});
    const beliefs = [
      ...computeItemBalanceBeliefs(ctx),
      ...computeShortageBeliefs(ctx),
      ...computeHabitBeliefs(ctx),
      ...computeRecipeAlignmentBeliefs(ctx),
      ...computeReadinessBeliefs(ctx),
    ];
    const limitations = [
      "Beliefs are export-only scaffolding, not volunteer instructions.",
      ctx.synthetic ? "Synthetic sample data limits belief confidence." : null,
      !beImpactReady(ctx) ? "Impact readiness gate is closed — beliefs remain cautious." : null,
    ].filter(Boolean);
    return {
      generatedAt: new Date().toISOString(),
      modelVersion: BE_MODEL_VERSION,
      dataQuality: { synthetic: ctx.synthetic, productionOnlyDefault: true },
      summary: beBuildBeliefSummary(beliefs, ctx),
      beliefs,
      limitations,
    };
  }

  function beliefEngineSummaryConcise(beliefEngine) {
    if (!beliefEngine) return null;
    const beliefs = beliefEngine.beliefs || [];
    const sorted = [...beliefs].sort((a, b) => b.confidenceProbability - a.confidenceProbability);
    const uncertain = [...beliefs].sort((a, b) => a.confidenceProbability - b.confidenceProbability);
    const byAction = beliefEngine.summary?.byActionability || beCountBy(beliefs, b => b.actionability);
    return {
      totalBeliefs: beliefs.length,
      readyForRecommendations: beliefEngine.summary?.readyForRecommendations ?? false,
      monitorBeliefCount: byAction.monitor || 0,
      observeOnlyBeliefCount: byAction.observe_only || 0,
      topThreeBeliefs: sorted.slice(0, 3).map(b => ({
        beliefId: b.beliefId,
        beliefType: b.beliefType,
        status: b.status,
        confidenceProbability: b.confidenceProbability,
      })),
      highestUncertaintyBeliefs: uncertain.slice(0, 3).map(b => ({
        beliefId: b.beliefId,
        status: b.status,
        confidenceProbability: b.confidenceProbability,
      })),
    };
  }

  // ═══════════════════════════════════════════════════════════════════
  // OPERATIONAL MEMORY — Phase 3C layer (export / ops only)
  // ═══════════════════════════════════════════════════════════════════

  const OM_MODEL_VERSION = "3C.1.1";
  const OM_BANNED_COPY = /\b(ai|algorithm|detected|recommendation|should|must|proven|guaranteed|decision|optimis[ez]ation|optimisation|change recipe)\b/gi;

  function omCopySafe(text) {
    if (!text) return "";
    return String(text).replace(OM_BANNED_COPY, m => {
      const lower = m.toLowerCase();
      const map = {
        ai: "analysis", algorithm: "pattern", detected: "observed", recommendation: "note",
        should: "may", must: "may", proven: "supported", guaranteed: "likely", decision: "view",
        optimization: "review", optimisation: "review", optimize: "review", optimise: "review",
        "change recipe": "review pack contents",
      };
      return map[lower] || "note";
    });
  }

  function omConfidenceBand(p) {
    if (p < 0.25) return "very_low";
    if (p < 0.45) return "low";
    if (p < 0.70) return "moderate";
    return "high";
  }

  function computeMemoryConfidence(inputs) {
    inputs = inputs || {};
    let p = 0.35;
    if (inputs.multipleSources) p += 0.10;
    if (inputs.sufficientHistory) p += 0.10;
    if (inputs.strongItemConfidence) p += 0.08;
    if (inputs.repeatedPattern) p += 0.10;
    if (inputs.operationalRelevance) p += 0.07;
    if (inputs.longObservationWindow) p += 0.05;
    if (inputs.synthetic) p -= 0.08;
    if (inputs.impactReadinessFalse) p -= 0.10;
    if (inputs.earlyEvidence) p -= 0.12;
    if (inputs.fewRecounts) p -= 0.08;
    if (inputs.singlePackerDominance) p -= 0.06;
    if (inputs.weakBabyPackHistory) p -= 0.05;
    if (inputs.insufficientEvidence) p = Math.min(p, 0.25);
    else if (inputs.earlyEvidence) p = Math.min(p, 0.55);
    if (inputs.synthetic) p = Math.min(p, 0.65);
    if (inputs.impactReadinessFalse) p = Math.min(p, 0.70);
    if (inputs.configFact) p = Math.max(p, 0.35);
    return Math.max(0, Math.min(1, Math.round(p * 100) / 100));
  }

  function omDedupeStrings(arr) {
    const seen = new Set();
    const out = [];
    (arr || []).forEach(s => {
      const key = String(s || "").trim();
      if (!key || seen.has(key)) return;
      seen.add(key);
      out.push(s);
    });
    return out;
  }

  function buildMemoryCtx(deps) {
    return {
      itemConfidence: deps.itemConfidence,
      packingHabits: deps.packingHabits,
      operationalIntelligence: deps.operationalIntelligence,
      beliefEngine: deps.beliefEngine || null,
      synthetic: deps.synthetic != null ? deps.synthetic : !!state.sampleData,
    };
  }

  function omImpactReady(ctx) {
    return !!(ctx.operationalIntelligence?.impactReadiness?.readyForImpactJudgement);
  }

  function omReadinessInputs(ctx) {
    const oi = ctx.operationalIntelligence || {};
    const ir = oi.impactReadiness || {};
    return {
      synthetic: ctx.synthetic,
      impactReadinessFalse: !ir.readyForImpactJudgement,
      fewRecounts: (state.transactions || []).filter(t => t.type === "recount").length < 5,
      weakBabyPackHistory: (oi.buildImpact?.byPackKey || []).find(p => p.packKey === "babyPack")?.productionPacksCreated < 10,
      singlePackerDominance: (ir.blockers || []).some(b => /one packer dominates/i.test(b)),
      sufficientHistory: (oi.summary?.productionPacksCreated ?? 0) >= 50,
    };
  }

  function omMakeMemory(partial, ctx) {
    const confidenceProbability = partial.confidenceProbability;
    const confidenceBand = partial.confidenceBand || omConfidenceBand(confidenceProbability);
    return {
      memoryId: partial.memoryId,
      memoryType: partial.memoryType,
      subject: partial.subject,
      status: partial.status,
      confidenceBand,
      confidenceProbability,
      firstSeen: partial.firstSeen || null,
      lastSeen: partial.lastSeen || null,
      evidence: omDedupeStrings((partial.evidence || []).map(omCopySafe)),
      reasoning: omCopySafe(partial.reasoning || ""),
      limitations: omDedupeStrings((partial.limitations || []).map(omCopySafe)),
    };
  }

  function omBelief(ctx, beliefId) {
    return (ctx.beliefEngine?.beliefs || []).find(b => b.beliefId === beliefId) || null;
  }

  function omItemDates(itemId) {
    const dates = [];
    (state.transactions || []).forEach(tx => {
      if (tx.type === "undo") return;
      if (tx.type === "recount" && tx.itemId === itemId) dates.push(tx.date);
      if (tx.type === "donation") {
        (tx.lines || []).forEach(line => { if (line.itemId === itemId) dates.push(tx.date); });
      }
      if (tx.type === "build") {
        const { usage } = opConsumptionFromBuild(tx);
        if (usage[itemId] > 0) dates.push(tx.date);
        normalizeSubstitutions(tx.substitutions || []).forEach(sub => {
          if (sub.insteadOf === itemId || sub.substitute === itemId) dates.push(tx.date);
        });
      }
    });
    const sorted = dates.filter(Boolean).sort();
    return { firstSeen: sorted[0] || null, lastSeen: sorted[sorted.length - 1] || null };
  }

  function omDaysSince(dateStr) {
    if (!dateStr) return Infinity;
    return opDaysBetween(dateStr, todayISO());
  }

  function omLongWindow(firstSeen, lastSeen) {
    if (!firstSeen || !lastSeen) return false;
    return opDaysBetween(firstSeen, lastSeen) >= 30;
  }

  function computeStockMemories(ctx) {
    const memories = [];
    const ri = omReadinessInputs(ctx);
    const itemId = "pads";
    const risk = (ctx.operationalIntelligence?.stockRisk || []).find(r => r.itemId === itemId);
    const shortageBelief = omBelief(ctx, `shortage:${itemId}`);
    const balanceBelief = omBelief(ctx, `item_balance:${itemId}`);
    if (!risk && !shortageBelief && !balanceBelief) return memories;

    const isCore = (risk?.recipeRoles || []).some(role => role.role === "core");
    const dates = omItemDates(itemId);
    let status = "insufficient_evidence";
    if (risk?.zeroStock && isCore) status = "active";
    else if (risk?.lowStock && isCore) status = "active";
    else if (risk?.riskBand === "critical" || risk?.riskBand === "high") status = "active";
    else if (risk?.recentSubstitutionTouches >= 2) status = "emerging";
    else if (risk && risk.balance > risk.threshold * 1.5 && !risk.zeroStock) status = "resolved";
    else if (omDaysSince(dates.lastSeen) > 90 && risk && !risk.lowStock && !risk.zeroStock) status = "stale";

    const evidence = [];
    if (risk?.zeroStock) evidence.push(`${risk.itemName} balance is zero.`);
    if (risk?.lowStock) evidence.push(`${risk.itemName} is below threshold (${risk.balance} vs ${risk.threshold}).`);
    if (isCore) evidence.push("Pads is a core Mom Pack item.");
    if (shortageBelief) evidence.push(...(shortageBelief.supportingEvidence || []).slice(0, 2));
    if (balanceBelief) evidence.push(...(balanceBelief.supportingEvidence || []).slice(0, 1));

    const confInputs = {
      ...ri,
      multipleSources: evidence.length >= 2,
      strongItemConfidence: balanceBelief?.confidenceBand === "moderate" || balanceBelief?.confidenceBand === "high",
      operationalRelevance: isCore,
      repeatedPattern: (risk?.recentSubstitutionTouches || 0) >= 2,
      longObservationWindow: omLongWindow(dates.firstSeen, dates.lastSeen),
      insufficientEvidence: status === "insufficient_evidence",
      earlyEvidence: status === "emerging",
    };
    memories.push(omMakeMemory({
      memoryId: "stock_memory:pads:constraint",
      memoryType: "stock_memory",
      subject: { itemId, itemName: itemName(itemId) },
      status,
      confidenceProbability: computeMemoryConfidence(confInputs),
      firstSeen: dates.firstSeen,
      lastSeen: dates.lastSeen,
      evidence,
      reasoning: "The system remembers Pads as an ongoing stock constraint in Mom Pack operations. Evidence suggests shelf availability may need monitoring — observe only.",
      limitations: ctx.synthetic ? ["Limited by synthetic sample data."] : ["Derived at export time; not a persisted memory store."],
    }, ctx));
    return memories;
  }

  function computeHabitMemories(ctx) {
    const memories = [];
    const ri = omReadinessInputs(ctx);

    const subImpact = (ctx.operationalIntelligence?.substitutionImpact || []).find(s =>
      s.packKey === "momPack" && s.insteadOfItemId === "pads" && s.substituteItemId === "breast-pads"
    );
    const subObs = (ctx.packingHabits?.observations || []).find(o =>
      o.type === "substitution" && o.packKey === "momPack" && o.itemId === "pads" && o.replacementItemId === "breast-pads"
    );
    const subBelief = omBelief(ctx, "habit:substitution:momPack:pads:breast-pads");

    if (subImpact || subObs || subBelief) {
      const packsAffected = subImpact?.packsAffected || subObs?.count || 0;
      const firstSeen = subImpact?.firstSeen || subObs?.firstSeen || null;
      const lastSeen = subImpact?.lastSeen || subObs?.lastSeen || null;
      let status = "insufficient_evidence";
      if (packsAffected < 3 && !subObs) status = "insufficient_evidence";
      else if (subObs?.trend === "declining") status = "stale";
      else if (subObs?.trend === "established" || packsAffected >= 5) status = "active";
      else status = "emerging";

      const evidence = [];
      if (subImpact) evidence.push(`${subImpact.substituteItemName} substituted for ${subImpact.insteadOfItemName} in ${subImpact.packsAffected} Mom Pack records.`);
      if (subObs?.volunteerText) evidence.push(subObs.volunteerText);
      if (subBelief) evidence.push(...(subBelief.supportingEvidence || []).slice(0, 1));

      memories.push(omMakeMemory({
        memoryId: "habit_memory:substitution:momPack:pads:breast-pads",
        memoryType: "habit_memory",
        subject: {
          type: "substitution", packKey: "momPack", packLabel: "Mom Pack",
          itemId: "pads", itemName: itemName("pads"),
          replacementItemId: "breast-pads", replacementItemName: itemName("breast-pads"),
        },
        status,
        confidenceProbability: computeMemoryConfidence({
          ...ri, multipleSources: evidence.length >= 2, repeatedPattern: packsAffected >= 3,
          operationalRelevance: true, earlyEvidence: status === "emerging",
          insufficientEvidence: status === "insufficient_evidence",
          longObservationWindow: omLongWindow(firstSeen, lastSeen),
        }),
        firstSeen, lastSeen, evidence,
        reasoning: "The system remembers Breast Pads may replace Pads in some Mom Packs. Evidence suggests an emerging packing pattern — observe only, not a recipe note.",
        limitations: ["Habit memory describes observed practice, not volunteer instructions."],
      }, ctx));
    }

    const deoOpt = (ctx.operationalIntelligence?.optionalImpact || []).find(o =>
      o.packKey === "momPack" && o.itemId === "deo"
    );
    const deoObs = (ctx.packingHabits?.observations || []).find(o =>
      o.type === "optional_usage" && o.packKey === "momPack" && o.itemId === "deo"
    );
    if (deoOpt || (deoObs && deoObs.percentage >= 40)) {
      const inclusionRate = deoOpt?.inclusionRateByPacks ?? (deoObs ? deoObs.percentage / 100 : 0);
      const firstSeen = deoObs?.firstSeen || null;
      const lastSeen = deoObs?.lastSeen || null;
      let status = "insufficient_evidence";
      if ((deoObs?.denominator || 0) < 5 && !deoOpt) status = "insufficient_evidence";
      else if (inclusionRate >= 0.7 && deoObs?.evidence === "sufficient") status = "active";
      else if (inclusionRate >= 0.4) status = "emerging";

      const evidence = [];
      if (deoOpt) evidence.push(`Deo included in ${Math.round(inclusionRate * 100)}% of Mom Pack records.`);
      if (deoObs?.volunteerText) evidence.push(deoObs.volunteerText);

      const deoConf = computeMemoryConfidence({
        ...ri, multipleSources: evidence.length >= 2, repeatedPattern: inclusionRate >= 0.5,
        earlyEvidence: status === "emerging", insufficientEvidence: status === "insufficient_evidence",
        longObservationWindow: omLongWindow(firstSeen, lastSeen),
      });
      const deoBand = omConfidenceBand(deoConf);
      const deoReasoning = status === "active" && (deoBand === "moderate" || deoBand === "high") && deoObs?.evidence === "sufficient"
        ? "The system remembers Deo as a commonly included optional in Mom Packs. Evidence suggests recurring optional usage — monitor only."
        : "The system has started seeing Deo included in Mom Packs, but there is not enough evidence yet to treat it as a stable habit.";

      memories.push(omMakeMemory({
        memoryId: "habit_memory:optional_usage:momPack:deo",
        memoryType: "habit_memory",
        subject: { type: "optional_usage", packKey: "momPack", packLabel: "Mom Pack", itemId: "deo", itemName: itemName("deo") },
        status,
        confidenceProbability: deoConf,
        firstSeen, lastSeen, evidence,
        reasoning: deoReasoning,
        limitations: ["Optional habit memory does not alter pack recipes."],
      }, ctx));
    }

    return memories;
  }

  function computeRecipeMemories(ctx) {
    const memories = [];
    const ri = omReadinessInputs(ctx);
    const packKey = "babyPack";
    const recipe = RECIPES[packKey];
    if (!recipe || recipe.confirmed) return memories;

    const belief = omBelief(ctx, `recipe_alignment:${packKey}`);
    const prodBuilds = (ctx.operationalIntelligence?.buildImpact?.byPackKey || []).find(p => p.packKey === packKey);
    const buildDates = (state.transactions || []).filter(t => t.type === "build" && t.packKey === packKey && !isTesterUser(t.packer))
      .map(t => t.date).filter(Boolean).sort();
    const firstSeen = buildDates[0] || null;
    const lastSeen = buildDates[buildDates.length - 1] || null;

    const evidence = ["Baby Pack is marked unconfirmed in configuration."];
    if (belief) evidence.push(...(belief.supportingEvidence || []).slice(0, 1));
    if (prodBuilds?.productionPacksCreated) evidence.push(`${prodBuilds.productionPacksCreated} production Baby Packs recorded.`);

    const babyConf = computeMemoryConfidence({
      ...ri,
      multipleSources: evidence.length >= 1,
      insufficientEvidence: false,
      configFact: true,
      weakBabyPackHistory: false,
    });
    const historyNote = (prodBuilds?.productionPacksCreated || 0) >= 10
      ? "Production history exists, but operational conclusions about recipe alignment remain limited — observe only."
      : "There is not enough production history to draw operational conclusions — observe only.";

    memories.push(omMakeMemory({
      memoryId: "recipe_memory:babyPack:unconfirmed",
      memoryType: "recipe_memory",
      subject: { packKey, packLabel: recipe.label, confirmed: false },
      status: "active",
      confidenceProbability: babyConf,
      firstSeen: firstSeen || new Date().toISOString().slice(0, 10),
      lastSeen: lastSeen || new Date().toISOString().slice(0, 10),
      evidence,
      reasoning: `The system remembers that Baby Pack is marked unconfirmed. ${historyNote}`,
      limitations: ["Recipe memory does not alter pack configuration."],
    }, ctx));
    return memories;
  }

  function computeDonationMemories(ctx) {
    const memories = [];
    const donations = [...(ctx.operationalIntelligence?.donationImpact || [])]
      .map(d => ({ donation: d, maxEnable: opDonationMaxEnablement(d) }))
      .filter(x => x.maxEnable >= 5)
      .sort((a, b) => b.maxEnable - a.maxEnable)
      .slice(0, 2);

    donations.forEach(({ donation: d, maxEnable }) => {
      const topLine = [...(d.lines || [])].sort((a, b) => opDonationLineMaxEnablement(b) - opDonationLineMaxEnablement(a))[0];
      if (!topLine) return;
      const itemId = topLine.itemId;
      const donationId = d.donationId || d.id || `${d.date}-${d.donor || "unknown"}`;
      const dates = { firstSeen: d.date, lastSeen: d.date };
      memories.push(omMakeMemory({
        memoryId: `donation_memory:${itemId}:${donationId}`,
        memoryType: "donation_memory",
        subject: { itemId, itemName: itemName(itemId), donor: d.donor, date: d.date, donationId },
        status: maxEnable >= 10 ? "active" : "emerging",
        confidenceProbability: computeMemoryConfidence({
          ...omReadinessInputs(ctx), operationalRelevance: true, repeatedPattern: false,
          insufficientEvidence: maxEnable < 5,
        }),
        firstSeen: dates.firstSeen, lastSeen: dates.lastSeen,
        evidence: [`Donation on ${d.date} from ${d.donor || "unknown donor"} may enable up to ${maxEnable} packs (estimated).`],
        reasoning: `The system remembers a meaningful donation of ${itemName(itemId)}. Evidence suggests it may have enabled packing capacity — observe only.`,
        limitations: ["Donation enablement is an estimate, not a guarantee."],
      }, ctx));
    });
    return memories;
  }

  function computeConfidenceMemories(ctx) {
    const memories = [];
    const ri = omReadinessInputs(ctx);
    const ir = ctx.operationalIntelligence?.impactReadiness || {};
    const confSummary = buildConfidenceSummary(ctx.itemConfidence || []);
    const lowRatio = (ctx.itemConfidence || []).length > 0
      ? (confSummary.volunteer.uncertain + confSummary.volunteer.needs_checking) / ctx.itemConfidence.length
      : 1;

    if (!ir.readyForImpactJudgement || lowRatio > 0.3 || ri.fewRecounts) {
      let status = "active";
      if (ctx.synthetic && (ctx.operationalIntelligence?.summary?.productionPacksCreated || 0) === 0) status = "insufficient_evidence";
      else if ((ir.readinessScore || 0) >= 50 && (ir.readinessScore || 0) < 70) status = "emerging";

      const evidence = (ir.blockers || []).slice(0, 3);
      if (lowRatio > 0.3) evidence.push(`${Math.round(lowRatio * 100)}% of items have low volunteer confidence.`);
      if (ri.fewRecounts) evidence.push("Few physical recounts recorded.");

      memories.push(omMakeMemory({
        memoryId: "confidence_memory:system:immaturity",
        memoryType: "confidence_memory",
        subject: { scope: "system_confidence" },
        status,
        confidenceProbability: computeMemoryConfidence({
          ...ri, multipleSources: evidence.length >= 2,
          insufficientEvidence: status === "insufficient_evidence",
          impactReadinessFalse: !ir.readyForImpactJudgement,
        }),
        firstSeen: (state.transactions || []).map(t => t.date).filter(Boolean).sort()[0] || null,
        lastSeen: todayISO(),
        evidence,
        reasoning: "The system remembers confidence across the storeroom is still immature. Evidence suggests more recounts and production history are needed — observe only.",
        limitations: ["Confidence memory reflects export-time signals, not volunteer messaging."],
      }, ctx));
    }
    return memories;
  }

  function computeReadinessMemories(ctx) {
    const memories = [];
    const ri = omReadinessInputs(ctx);
    const ir = ctx.operationalIntelligence?.impactReadiness || {};
    const readinessBelief = omBelief(ctx, "readiness:overall");
    let status = "emerging";
    if (ctx.synthetic) status = "insufficient_evidence";
    else if (ir.readyForImpactJudgement) status = "active";
    else if ((ir.blockers || []).length >= 3) status = "insufficient_evidence";

    const evidence = (ir.blockers || []).slice(0, 3);
    if (readinessBelief) evidence.push(...(readinessBelief.supportingEvidence || []).slice(0, 2));

    memories.push(omMakeMemory({
      memoryId: "readiness_memory:overall",
      memoryType: "readiness_memory",
      subject: { scope: "operational_readiness" },
      status,
      confidenceProbability: computeMemoryConfidence({
        ...ri, multipleSources: evidence.length >= 1,
        insufficientEvidence: status === "insufficient_evidence",
        impactReadinessFalse: !ir.readyForImpactJudgement,
      }),
      firstSeen: (state.transactions || []).map(t => t.date).filter(Boolean).sort()[0] || null,
      lastSeen: todayISO(),
      evidence,
      reasoning: ctx.synthetic
        ? "The system remembers operational readiness is limited by synthetic sample data. Observe only."
        : "The system remembers impact judgement is not ready yet. Evidence suggests continued data collection — monitor only.",
      limitations: ["Readiness memory is observation-only scaffolding."],
    }, ctx));
    return memories;
  }

  function omCountBy(items, keyFn) {
    const counts = {};
    items.forEach(item => {
      const k = keyFn(item);
      counts[k] = (counts[k] || 0) + 1;
    });
    return counts;
  }

  function omReadyForOperationalRecall(memories, ctx) {
    if (ctx.synthetic) return false;
    if (!omImpactReady(ctx)) return false;
    if (memories.some(m => m.status === "insufficient_evidence" && m.confidenceBand === "very_low")) return false;
    const avg = memories.length
      ? memories.reduce((s, m) => s + m.confidenceProbability, 0) / memories.length
      : 0;
    return avg >= 0.45;
  }

  function omBuildMemorySummary(memories, ctx) {
    const sorted = [...memories].sort((a, b) => b.confidenceProbability - a.confidenceProbability);
    const uncertain = [...memories].sort((a, b) => a.confidenceProbability - b.confidenceProbability);
    return {
      totalMemories: memories.length,
      byType: omCountBy(memories, m => m.memoryType),
      byStatus: omCountBy(memories, m => m.status),
      byConfidenceBand: omCountBy(memories, m => m.confidenceBand),
      activeMemories: memories.filter(m => m.status === "active").map(m => ({
        memoryId: m.memoryId, memoryType: m.memoryType, status: m.status,
      })),
      emergingMemories: memories.filter(m => m.status === "emerging").map(m => ({
        memoryId: m.memoryId, memoryType: m.memoryType, status: m.status,
      })),
      topMemories: sorted.slice(0, 5).map(m => ({
        memoryId: m.memoryId, memoryType: m.memoryType, subject: m.subject,
        status: m.status, confidenceProbability: m.confidenceProbability,
      })),
      highestUncertaintyMemories: uncertain.slice(0, 5).map(m => ({
        memoryId: m.memoryId, memoryType: m.memoryType, status: m.status,
        confidenceProbability: m.confidenceProbability,
      })),
      readyForOperationalRecall: omReadyForOperationalRecall(memories, ctx),
    };
  }

  function computeOperationalMemory(deps) {
    const ctx = buildMemoryCtx(deps || {});
    const memories = [
      ...computeStockMemories(ctx),
      ...computeHabitMemories(ctx),
      ...computeRecipeMemories(ctx),
      ...computeDonationMemories(ctx),
      ...computeConfidenceMemories(ctx),
      ...computeReadinessMemories(ctx),
    ].slice(0, 10);
    const limitations = [
      "Memories are export-only recall objects, not volunteer instructions.",
      "Memories are derived at export time from transaction history — not persisted across sessions.",
      ctx.synthetic ? "Synthetic sample data limits memory confidence." : null,
      !omImpactReady(ctx) ? "Impact readiness gate is closed — memories remain cautious." : null,
    ].filter(Boolean);
    return {
      generatedAt: new Date().toISOString(),
      modelVersion: OM_MODEL_VERSION,
      dataQuality: { synthetic: ctx.synthetic, productionOnlyDefault: true },
      memories,
      summary: omBuildMemorySummary(memories, ctx),
      limitations,
    };
  }

  function operationalMemorySummaryConcise(operationalMemory) {
    if (!operationalMemory) return null;
    const memories = operationalMemory.memories || [];
    const sorted = [...memories].sort((a, b) => b.confidenceProbability - a.confidenceProbability);
    const uncertain = [...memories].sort((a, b) => a.confidenceProbability - b.confidenceProbability);
    return {
      totalMemories: memories.length,
      readyForOperationalRecall: operationalMemory.summary?.readyForOperationalRecall ?? false,
      activeMemoryCount: memories.filter(m => m.status === "active").length,
      emergingMemoryCount: memories.filter(m => m.status === "emerging").length,
      topThreeMemories: sorted.slice(0, 3).map(m => ({
        memoryId: m.memoryId,
        memoryType: m.memoryType,
        status: m.status,
        confidenceProbability: m.confidenceProbability,
      })),
      highestUncertaintyMemories: uncertain.slice(0, 3).map(m => ({
        memoryId: m.memoryId,
        status: m.status,
        confidenceProbability: m.confidenceProbability,
      })),
    };
  }

  function render() {
    const app = document.getElementById("app");
    let body = "";
    if (view === "home") body = renderHome();
    else if (view === "donation") body = renderDonation();
    else if (view === "build") body = renderBuild();
    else if (view === "deliver") body = renderDeliver();
    else if (view === "stock") body = renderStock();
    const viewClass = view === "home" ? "view-content view-content--home" : "view-content";
    app.innerHTML = renderHeader() + `<div class="${viewClass}">` + body + `</div>`;
    bindEvents();
    analyticsAfterRender();

  function renderStockLevelsList(packContextSelectId) {
    let html = `<div style="margin-bottom:12px;">${renderPackContextSelector(packContextSelectId, getPackContext())}</div><div class="stock-list">`;
    const byCat = {};
    ITEMS.forEach(i => {
      if (getBalance(i.id) <= 0) return;
      if (!byCat[i.category]) byCat[i.category] = [];
      byCat[i.category].push(i);
    });
    const cats = sortCategoriesForPack(Object.keys(byCat), getPackContext());
    if (!cats.length) html += `<em>No stock on hand.</em>`;
    for (const cat of cats) {
      html += `<strong>${esc(cat)}</strong><br>`;
      byCat[cat].sort((a, b) => getBalance(b.id) - getBalance(a.id)).forEach(i => {
        html += `${esc(i.name)}: ${getBalance(i.id)}<br>`;
      });
      html += `<br>`;
    }
    html += `</div>`;
    return html;
  }

  function getDonationQtyErrors(lines) {
    const errors = {};
    lines.forEach((line, idx) => {
      const qty = parseInt(line.qty, 10);
      if (!qty || qty < 1) errors[idx] = "Please enter a quantity.";
    });
    return errors;
  }

  function renderDonation() {
    if (!form.lines) form.lines = [{ itemId: sortItemsForPack(getPackContext())[0].id, qty: "", packSize: "", note: "" }];
    if (!form.donationDate) form.donationDate = todayISO();
    const packCtx = getPackContext();
    let html = `
      ${renderPackContextSelector("donation-pack-context", packCtx)}

      <div id="donation-lines">`;

    form.lines.forEach((line, idx) => {
      const it = itemMap[line.itemId];
      const isPacket = it && it.unit === "packet";
      const qtyErr = qtyErrors[idx];
      const qtyClass = qtyErr ? " field-error-input" : "";

            <div><label>Per packet</label>
              <select class="line-packsize" data-idx="${idx}">
                ${[8,10,12,32].map(s => `<option value="${s}" ${String(line.packSize) === String(s) ? "selected" : ""}>${s}</option>`).join("")}

            </div>
          </div>` : `

  function renderRecipeOptionalToggles(packKey) {
    const recipe = RECIPES[packKey];
    const qty = parseInt(form.qty, 10) || 0;
    let html = `<div class="common-extras" data-track-exposure="build_optional_toggles" data-exposure-label="Did you include these?">
      <h3>Did you include these?</h3>
      <p class="screen-subtitle">Tap Yes for anything extra that went into each pack.</p>`;
    recipe.optional.forEach(opt => {
      const key = opt.itemId || opt.id;
      const label = opt.label || itemName(opt.itemId);
      const on = !!form.optional[key];
      let stockHint = "";
      if (opt.decrement && opt.itemId) {
        const warn = on ? getOptionalItemStockWarning(opt.itemId, qty) : "";
        if (warn) {
          stockHint = `<div class="optional-stock-warn">${esc(warn)}</div>`;
        } else if (!on && getBalance(opt.itemId) === 0) {
          stockHint = `<div class="optional-stock-hint">0 in stock</div>`;
        }
      }
      html += `<div class="toggle-row">
        <div class="toggle-label-col">
          <label>${esc(label)}</label>
          ${stockHint}
        </div>
        <button type="button" class="toggle-btn ${on ? "on" : ""}" data-opt="${esc(key)}">${on ? "Yes" : "No"}</button>
      </div>`;
    });
    html += `</div>`;
    return html;
  }

  function renderSubstitutionLines(packKey, qty, included, customExtras) {
    let html = "";
    const packIds = packItemIdsForSubstitution(packKey, included, customExtras);
    const insteadOpts = { recipeFirst: true, grouped: true, limitToIds: packIds };
    const substituteOpts = { recipeFirst: true, grouped: true };
    form.substitutions.forEach((sub, idx) => {
      const defaultQty = sub.insteadOf
        ? String(recipeQtyPerPack(packKey, sub.insteadOf, included, customExtras))
        : String(sub.qtyPerPack ?? "1");
      const packErr = form.subLineErrors[idx];
      html += `<div class="custom-extra-line sub-line" data-sub-idx="${idx}">
        <label>Instead of</label>
        <select class="sub-instead ${packErr ? "field-error-input" : ""}" data-sub-idx="${idx}"><option value="">—</option>${itemOptions(sub.insteadOf, packKey, insteadOpts)}</select>
        <label>We used</label>
        <select class="sub-substitute ${packErr ? "field-error-input" : ""}" data-sub-idx="${idx}"><option value="">—</option>${itemOptions(sub.substitute, packKey, substituteOpts)}</select>
        <label>How many packs?</label>
        <input type="number" class="sub-packs ${packErr ? "field-error-input" : ""}" data-sub-idx="${idx}" min="1" ${qty > 0 ? `max="${qty}"` : ""} value="${esc(String(sub.packCount ?? ""))}" placeholder="e.g. 3">
        ${packErr ? `<div class="field-error" data-sub-error="${idx}">${esc(packErr)}</div>` : ""}
        <label>How many per pack?</label>
        <input type="number" class="sub-qty" data-sub-idx="${idx}" min="1" value="${esc(String(sub.qtyPerPack ?? defaultQty))}" placeholder="e.g. 2">
        <button type="button" class="btn-small remove-sub" data-sub-idx="${idx}" style="margin-top:8px;">Remove</button>
      </div>`;
    });
    return html;
  }

      html += `<div class="custom-extra-line omission-line" data-omit-idx="${idx}">

  function renderCustomExtraLines(packKey) {
    let html = "";
    const itemOpts = { recipeFirst: true, grouped: true };
    form.customExtras.forEach((extra, idx) => {
      html += `<div class="custom-extra-line" data-ce-idx="${idx}">
        <label>Item</label>
        <select class="ce-item" data-ce-idx="${idx}">${itemOptions(extra.itemId, packKey, itemOpts)}</select>

  function renderBuildExceptions(packKey, qty, included, customExtras) {
    const extraCount = form.customExtras.filter(e => e.itemId).length;
    const subCount = form.substitutions.filter(s => s.insteadOf || s.substitute || s.packCount).length;
    const omitCount = (form.omissions || []).filter(o => o.itemId || o.packCount).length;
    const hasExceptions = extraCount || subCount || omitCount;
    if (form.exceptionsOpen === undefined) form.exceptionsOpen = false;
    if (hasExceptions) form.exceptionsOpen = true;

    const summaryParts = [];
    if (subCount) summaryParts.push(`${subCount} swap${subCount !== 1 ? "s" : ""}`);
    if (omitCount) summaryParts.push(`${omitCount} left out`);
    if (extraCount) summaryParts.push(`${extraCount} extra${extraCount !== 1 ? "s" : ""}`);
    const summaryText = summaryParts.length ? summaryParts.join(" · ") : "Swaps, omissions, or extras not on the main screen";

    return `<details class="advanced-section exceptions-panel" id="exceptions-panel" data-track-exposure="build_something_different" data-exposure-label="Something was different" ${form.exceptionsOpen ? "open" : ""}>
      <summary id="open-add-item">${summaryParts.length ? esc(summaryText) : "+ Something else happened?"}</summary>
      <div class="advanced-body">
        <p class="screen-subtitle" style="margin-bottom:18px;">Record swaps, items left out, or extras not listed above — all on this screen.</p>

        <div class="exception-section" data-track-exposure="build_substitution_controls" data-exposure-label="Swapped items">
          <h4>Swapped items</h4>
          <div id="substitutions">${renderSubstitutionLines(packKey, qty, included, customExtras)}</div>
          <button type="button" class="btn-small" id="choice-substitution">+ Add swap</button>
        </div>

        <div class="exception-section" data-track-exposure="build_omission_controls" data-exposure-label="Left out items">
          <h4>Left out items</h4>
          <div id="omissions">${renderOmissionLines(packKey, qty)}</div>
          <button type="button" class="btn-small" id="choice-leftout">+ Add left out</button>
        </div>

        <div class="exception-section" data-track-exposure="build_custom_extra_controls" data-exposure-label="Extra items">
          <h4>Extra items</h4>
          <div id="custom-extras">${renderCustomExtraLines(packKey)}</div>
          <button type="button" class="btn-small" id="choice-extra">+ Add extra</button>
        </div>
      </div>
    </details>`;
  }

  function renderBuild() {
    if (!form.packKey) form.packKey = getPackContext();
    if (!form.packer) form.packer = state.lastSelectedPacker || PACKERS[0];
    if (!analyticsSessionUser && form.packer) setSelectedPacker(form.packer);
    if (!form.destination) form.destination = CLINICS[0];
    if (!form.qty) form.qty = "";
    if (!form.optional) {
      form.optional = {};
      initOptionalDefaults(form.packKey);
    }
    if (!form.customExtras) form.customExtras = [];
    if (!form.substitutions) form.substitutions = [];
    if (!form.omissions) form.omissions = [];
    if (!form.buildDate) form.buildDate = todayISO();
    if (!form.subLineErrors) form.subLineErrors = {};

    const recipe = RECIPES[form.packKey];
    const qty = parseInt(form.qty, 10) || 0;
    const included = Object.keys(form.optional).filter(k => form.optional[k]);
    const customExtras = form.customExtras.filter(e => e.itemId);
    form.subLineErrors = getSubstitutionLineErrors(qty, form.substitutions);

    let html = `<div class="form-shell">
      <div class="screen-kicker">Pack creation</div>
      <h2>Enter today’s packs</h2>
      <p class="screen-subtitle">Record what was packed. The stock will update in the background.</p>`;

    if (!recipe.confirmed) {
      html += `<div class="banner banner-draft">Baby Pack recipe is a draft — please confirm with the volunteers what goes in each pack.</div>`;
    }

    html += `<div class="form-grid">
      <div class="field-card">
        <label>Packing for</label>
        <select id="build-pack">
          <option value="momPack" ${form.packKey === "momPack" ? "selected" : ""}>Mom Pack</option>
          <option value="babyPack" ${form.packKey === "babyPack" ? "selected" : ""}>Baby Pack</option>
        </select>
      </div>
      <div class="field-card">
        <label>How many packs?</label>
        <input type="number" id="build-qty" class="primary-number" min="1" value="${esc(String(form.qty))}" placeholder="0">
      </div>
      <div class="row">
        <div class="field-card">
          <label>Who packed?</label>
          <select id="build-packer">${PACKERS.map(p => `<option ${form.packer === p ? "selected" : ""}>${esc(p)}</option>`).join("")}</select>
        </div>
        <div class="field-card">
          <label>Destination</label>
          <select id="build-dest">${CLINICS.map(c => `<option ${form.destination === c ? "selected" : ""}>${esc(c)}</option>`).join("")}</select>
        </div>
      </div>
      <div class="field-card">
        <label>Date packed</label>
        <input type="date" id="build-date" value="${esc(form.buildDate)}">
      </div>
    </div>`;

    html += renderRecipeOptionalToggles(form.packKey);

    if (qty > 0) {
      html += `<div class="core-preview"><strong>Stock this save will use</strong><br>${formatBuildPreview(form.packKey, qty, included, customExtras, form.substitutions, true, form.omissions)}</div>`;
    }

    html += renderBuildExceptions(form.packKey, qty, included, customExtras);

    html += `<div id="build-error" class="error ${errorMsg ? "" : "hidden"}">${errorMsg ? esc(errorMsg) : ""}</div>`;
    html += `<div class="actions"><button class="btn btn-primary" id="build-save" data-track-exposure="build_save_packs" data-exposure-label="Save packs">Save packs</button></div></div>`;
    return html;
  }

  function initOptionalDefaults(packKey) {
    form.optional = {};
    RECIPES[packKey].optional.forEach(opt => {
      const key = opt.itemId || opt.id;
      if (opt.defaultOff) {
        form.optional[key] = false;
      } else if (opt.surplusDriven && opt.itemId) {
        const it = itemMap[opt.itemId];
        form.optional[key] = it && getBalance(it.id) > it.threshold * SURPLUS_NUDGE_MULTIPLIER;
      } else if (opt.decrement === false) {
        form.optional[key] = true;
      } else {
        form.optional[key] = false;
      }
    });
  }

        <select id="del-dest">${CLINICS.map(c => `<option ${form.deliverDest === c ? "selected" : ""}>${esc(c)}</option>`).join("")}</select>
        <label>Date</label>
        <input type="date" id="del-date" value="${esc(form.deliverDate)}">`;
    }

    if (errorMsg) html += `<div class="error">${esc(errorMsg)}</div>`;
    html += `<div class="actions"><button class="btn btn-primary" id="deliver-save">Confirm Delivery</button></div>${renderFooter()}`;
    return html;
  }

  function renderStock() {
    const packCtx = getPackContext();
    const shortcuts = PACK_STOCK_SHORTCUTS[packCtx];
    if (!form.stockItem || !itemMap[form.stockItem]) form.stockItem = shortcuts[0];
    if (!form.stockDate) form.stockDate = todayISO();
    let html = `<p style="color:#666;font-size:0.95rem;">Count one item at a time, whenever you like. No need to count everything.</p>
      ${renderPackContextSelector("stock-pack-context", packCtx)}
      <label>Date</label>
      <input type="date" id="stock-date" value="${esc(form.stockDate)}">
      <div class="shortcut-btns">
        ${shortcuts.map(id => `<button type="button" class="stock-shortcut" data-id="${id}">${esc(itemName(id))}</button>`).join("")}
      </div>
      <label>Item</label>
      <select id="stock-item" data-track-exposure="stock_item_selector" data-exposure-label="Item">
        ${itemOptions(form.stockItem, packCtx, { showBalance: true })}
      </select>
      <label>Physical count</label>
      <input type="number" id="stock-count" data-track-exposure="stock_count_input" data-exposure-label="Physical count" min="0" value="${esc(String(form.stockCount ?? ""))}" placeholder="What you counted on the shelf">
      <label>Reason (optional)</label>
      <input type="text" id="stock-reason" value="${esc(form.stockReason || "")}" placeholder="e.g. counting correction">
      ${errorMsg ? `<div class="error">${esc(errorMsg)}</div>` : ""}
      <div class="actions"><button class="btn btn-primary" id="stock-save" data-track-exposure="stock_save_correction" data-exposure-label="Save Count">Save Count</button></div>
